function Continuity({ project, onChange }) {
  const [dayIdx, setDayIdx] = React.useState(0);
  const [sceneFilter, setSceneFilter] = React.useState('');
  const shootDays = project.shootDays || [];

  const dayShots = React.useMemo(() => {
    const allShots = [...(project.shots||[])].sort((a,b)=>(a.shootOrder||0)-(b.shootOrder||0));
    const dayDividers = allShots.filter(s=>s.type==='divider'&&s.dividerType==='day');
    const thisDivider = dayDividers[dayIdx];
    const nextDivider = dayDividers[dayIdx+1];
    if (!thisDivider) return [];
    const startOrder = thisDivider.shootOrder||0;
    const endOrder = nextDivider?.shootOrder ?? Infinity;
    return allShots.filter(s=>
      s.type==='shot' &&
      (s.shootOrder||0)>startOrder &&
      (s.shootOrder||0)<endOrder
    );
  }, [project.shots, shootDays, dayIdx]);

  // Local reorder state — stored in project.shootDays[dayIdx].continuityOrder
  const day = shootDays[dayIdx];
  const savedOrder = day?.continuityOrder || null;

  // Build ordered list: use savedOrder if present, else dayShots order
  const [localOrder, setLocalOrder] = React.useState(null);

  const orderedShots = React.useMemo(() => {
    const extras = day?.continuityExtraShots || [];
    const allItems = [...dayShots, ...extras];
    const orderIds = savedOrder || dayShots.map(s=>s.id);
    const existing = new Set(orderIds);
    // Add new regular shots and extra shots not yet in order
    const newIds = allItems.filter(s=>!existing.has(s.id)).map(s=>s.id);
    const fullOrder = [...orderIds, ...newIds];
    return fullOrder.map(id=>allItems.find(s=>s.id===id)).filter(Boolean);
  }, [dayShots, savedOrder, day?.continuityExtraShots]);

  const drag = useDrag(orderedShots.map(s=>({id:s.id})), reordered => {
    const newOrder = reordered.map(r=>r.id);
    const days = [...shootDays];
    days[dayIdx] = {...days[dayIdx], continuityOrder: newOrder};
    // Keep extra shots in sync
    onChange({...project, shootDays:days});
  });

  const filteredShots = sceneFilter
    ? orderedShots.filter(s=>{
        const sc = project.scenes.find(sc=>sc.id===s.scene);
        return (sc?.number+'').includes(sceneFilter)||(sc?.title||'').toLowerCase().includes(sceneFilter.toLowerCase());
      })
    : orderedShots;

  // Extra shots stored ONLY in shootDays[dayIdx].continuityExtraShots
  // They do NOT appear in project.shots (= not in Shotlist or AD-Sheet)
  const getExtraShots = () => day?.continuityExtraShots || [];
  const saveExtraShots = (extras) => {
    const days = [...shootDays];
    days[dayIdx] = {...days[dayIdx], continuityExtraShots: extras};
    onChange({...project, shootDays: days});
  };

  const addExtraShot = () => {
    const newShot = {
      id: uid(), isExtraInContinuity: true,
      shotNum: 'X', shotLetter: '', sceneNum: '', description: 'Extra Shot',
      dayNight: 'TAG', shootTime: '', continuityNote: '', takes: [],
    };
    const extras = getExtraShots();
    const days = [...shootDays];
    const curOrder = days[dayIdx]?.continuityOrder || dayShots.map(s=>s.id);
    days[dayIdx] = {...days[dayIdx],
      continuityExtraShots: [...extras, newShot],
      continuityOrder: [...curOrder, newShot.id]};
    onChange({...project, shootDays: days});
  };

  const updExtraShot = (shotId, patch) => {
    saveExtraShots(getExtraShots().map(s=>s.id===shotId?{...s,...patch}:s));
  };

  const delExtraShot = (shotId) => {
    if (!window.confirm('Extra-Shot löschen?')) return;
    const days = [...shootDays];
    const extras = getExtraShots().filter(s=>s.id!==shotId);
    const curOrder = (days[dayIdx]?.continuityOrder||[]).filter(id=>id!==shotId);
    days[dayIdx] = {...days[dayIdx], continuityExtraShots: extras, continuityOrder: curOrder};
    onChange({...project, shootDays: days});
  };

  const totalTakes = filteredShots.reduce((a,s)=>a+(s.takes?.length||0),0);

  const [printing, doPrint] = usePrint();
  if (!shootDays.length) return <div style={{padding:32,color:C.dim}}>Bitte zuerst Drehtage anlegen.</div>;

  return (
    <div className={printing ? "print-root doc-a4 print-landscape" : undefined}>
      {printing && <h2 style={{ ...S.h1, fontSize:18, marginBottom:14 }}>Continuity — Tag {dayIdx+1}{shootDays[dayIdx]?.date?" ("+fmtDate(shootDays[dayIdx].date)+")":""}</h2>}
      <div className="no-print" style={{ ...S.row, marginBottom:18, flexWrap:'wrap' }}>
        <h1 style={{ ...S.h1, marginBottom:0 }}>Continuity</h1>
        <select value={dayIdx} onChange={e=>setDayIdx(Number(e.target.value))}
          style={{ ...S.input, width:'auto', padding:'7px 12px' }}>
          {shootDays.map((d,i)=>(
            <option key={d.id} value={i}>Tag {i+1}{d.date?' – '+fmtDate(d.date):''}</option>
          ))}
        </select>
        <input value={sceneFilter} onChange={e=>setSceneFilter(e.target.value)}
          placeholder="Szene filtern…"
          style={{ ...S.input, width:150, padding:'7px 12px' }}/>
        <div style={{ flex:1 }} />
        <span style={{ fontSize:12, color:C.dim }}>{filteredShots.length} Shots · {totalTakes} Takes</span>
        <button style={S.btn('xs')} onClick={addExtraShot}><Icon name="plus" size={12}/> Extra-Shot</button>
        <button style={S.btn()} onClick={doPrint}>🖨 PDF</button>
      </div>

      <div>
        {filteredShots.length===0&&(
          <div style={{ ...S.card, padding:32, textAlign:'center', color:C.dim }}>Keine Shots für diesen Drehtag.</div>
        )}
        {filteredShots.map(shot=>(
          <div key={shot.id} style={{display:'flex',gap:6,alignItems:'flex-start',marginBottom:10}}>
            {/* Drag handle */}
            <div style={{paddingTop:10,flexShrink:0}}>
              <span {...drag.handle(shot.id)}
                style={{cursor:'grab',color:'var(--c-mid)',fontSize:16,
                  userSelect:'none',display:'block',padding:'4px 2px'}}>⠿</span>
            </div>
            <div {...drag.row(shot.id)}
              style={{flex:1,background:drag.over===shot.id?'var(--t-green)':'transparent',
                borderRadius:8,transition:'background 0.1s'}}>
              <ContinuityShotCard
                shot={shot}
                project={project}
                printing={printing}
                onChange={onChange}
                onUpdExtra={shot.isExtraInContinuity ? (patch=>updExtraShot(shot.id,patch)) : null}
                onDelExtra={shot.isExtraInContinuity ? (()=>delExtraShot(shot.id)) : null}
              />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


// ─── Kalkulation ─────────────────────────────────────────────────────────────
const DEFAULT_GEWERKE_KALK = [
  'Regie','Kamera','Licht','Ton','Schnitt & Post','Musik','Maske','Kostüm',
  'Requisite','Szenenbild','Catering','Transport','Produktionsleitung','Sonstiges'
];
const KOSTENARTEN = ['Gage','Leihe','Anschaffung','Verbrauchsmaterial','Pauschal','Sonstiges'];

function parseKalkDays(val, numDays) {
  // "" or null → use numDays (auto)
  // "+N" → numDays + N
  // "-N" → numDays - N
  // number string → fixed
  if (!val || val.trim() === '') return { auto: true, value: numDays };
  const trimmed = val.trim();
  const plus = trimmed.match(/^\+(-?\d+)$/);
  const minus = trimmed.match(/^-(-?\d+)$/);
  if (plus) return { auto: 'plus', offset: parseInt(plus[1]), value: numDays + parseInt(plus[1]) };
  if (minus) return { auto: 'minus', offset: parseInt(minus[1]), value: Math.max(0, numDays - parseInt(minus[1])) };
  const n = parseFloat(trimmed);
  if (!isNaN(n)) return { auto: false, value: n };
  return { auto: true, value: numDays };
}

function kalkRowTotal(row, numDays) {
  const menge = parseFloat(row.menge)||0;
  const ep = parseFloat(row.einzelpreis)||0;
  const days = parseKalkDays(row.drehtage, numDays).value;
  return menge * ep * days;
}


// ─── PDF Export Helpers ───────────────────────────────────────────────────────
function pdfHeader(doc, project, title, subtitle) {
  const {W,ML,MR,CW,MT} = doc;
  const st = project.settings||{};
  doc.rect(ML, 8, CW, 10, [20,20,32]);
  doc.text(pdfSafe(st.title||'Setdeck'), ML+2, 14.5, 7, false, [140,160,180]);
  doc.text(pdfSafe(title), ML+2, 14.5, 9, true, [200,180,140]);
  if (subtitle) doc.text(pdfSafe(subtitle), W-MR-2, 14.5, 7, false, [140,140,140], 'right');
  doc.setY(22);
}

function pdfFinish(doc, filename) {
  const pdfStr = buildPdf(doc.pages());
  openPdf(pdfStr, filename+'.pdf');
}

// ─── Cast & Crew PDF ──────────────────────────────────────────────────────────
function exportCastCrewPdf(project) {
  try {
    const doc = makeDoc();
    const {ML,CW} = doc;
    pdfHeader(doc, project, 'CAST & CREW', project.settings?.title||'');
    const crew = project.crew||[];
    const cast = (project.cast||[]).filter(p=>p.name);

    if (cast.length > 0) {
      doc.sectionHeader('CAST');
      const cols = [{w:50,label:'Name'},{w:50,label:'Rolle'},{w:CW-100,label:'Anmerkungen'}];
      doc.tableHeader(cols);
      cast.forEach((p,i) => doc.tableRow(cols,[p.name||'',p.role||'',p.castingNote||''],i));
      doc.addY(4);
    }
    if (crew.length > 0) {
      doc.sectionHeader('CREW');
      const cols = [{w:50,label:'Name'},{w:50,label:'Department'},{w:CW-100,label:'Kontakt'}];
      doc.tableHeader(cols);
      crew.forEach((p,i) => doc.tableRow(cols,[p.name||'',p.department||'',p.contact||''],i));
    }
    pdfFinish(doc, (project.settings?.title||'projekt')+'-cast-crew');
  } catch(e) { console.error(e); }
}

// ─── Kalkulation PDF ─────────────────────────────────────────────────────────
function exportKalkulationPdf(project) {
  try {
    const doc = makeDoc();
    const {ML,CW} = doc;
    pdfHeader(doc, project, 'KALKULATION', project.settings?.title||'');
    const kalk = project.kalkulation||{};
    const gewerke = kalk.gewerke||[];
    const positionen = kalk.positionen||{};
    const numDays = (project.shootDays||[]).length;
    const fmt = n => n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' \u20ac';
    const cols=[{w:60,label:'Bezeichnung'},{w:28,label:'Kostenart'},{w:16,label:'Menge'},{w:16,label:'Einheit'},{w:20,label:'EP \u20ac'},{w:18,label:'Drehtage'},{w:CW-158,label:'Gesamt \u20ac'}];
    let grandTotal = 0;
    gewerke.forEach(g => {
      const rows = positionen[g]||[];
      if (rows.length === 0) return;
      doc.sectionHeader(g);
      doc.tableHeader(cols);
      let gTotal = 0;
      rows.forEach((r,i) => {
        const t = kalkRowTotal(r, numDays);
        gTotal += t;
        grandTotal += t;
        doc.tableRow(cols,[r.bezeichnung||'',r.kostenart||'',r.menge||'',r.einheit||'',r.einzelpreis||'',r.drehtage||'auto',fmt(t)],i);
      });
      doc.checkY(6);
      doc.rect(ML, doc.getY(), CW, 5.5, [40,40,55]);
      doc.text('Gesamt '+g+': '+fmt(gTotal), ML+CW-2, doc.getY()+3.8, 8, true, [200,180,140], 'right');
      doc.addY(7);
    });
    // Zuschläge
    const zuschlaege = kalk.zuschlage||[];
    if (zuschlaege.length > 0) {
      doc.sectionHeader('ZUSCHLÄGE & SICHERHEITEN');
      zuschlaege.forEach((z,i) => {
        const pct = parseFloat(z.prozent)||0;
        const betrag = grandTotal * (pct/100);
        doc.tableRow([{w:80},{w:20},{w:CW-100}],[z.bezeichnung||'',pct+'%',fmt(betrag)],i);
      });
    }
    // Gesamtsumme
    const totalZuschlag = zuschlaege.reduce((a,z)=>a+grandTotal*((parseFloat(z.prozent)||0)/100),0);
    doc.checkY(10);
    doc.addY(3);
    doc.rect(ML, doc.getY(), CW, 8, [20,20,32]);
    doc.text('GESAMTBUDGET: '+fmt(grandTotal+totalZuschlag), ML+CW-2, doc.getY()+5.5, 11, true, [232,160,32], 'right');
    doc.addY(10);
    pdfFinish(doc, (project.settings?.title||'projekt')+'-kalkulation');
  } catch(e) { console.error(e); }
}

// ─── Continuity Sheet PDF ─────────────────────────────────────────────────────
function exportContinuityPdf(project, dayIdx) {
  try {
    const doc = makeDoc();
    const {ML,CW} = doc;
    const day = project.shootDays[dayIdx]||{};
    const shootDayNum = dayIdx+1;
    const dateStr = day.date ? new Date(day.date+'T12:00').toLocaleDateString('de-DE') : '';
    pdfHeader(doc, project, 'CONTINUITY — TAG '+shootDayNum, dateStr);

    const allShots = [...(project.shots||[])].sort((a,b)=>(a.shootOrder||0)-(b.shootOrder||0));
    const groups = buildGroups(allShots);
    const group = groups.find(g=>{
      const linked = (project.shootDays||[]).find(d=>d.id===g.divider.shootDayId);
      return linked && project.shootDays.indexOf(linked) === dayIdx;
    });
    const dayShots = group ? group.shots.filter(s=>s.type==='shot'&&!s.hidden) : [];
    const contOrder = day.dispoData?.continuityOrder||[];
    const ordered = contOrder.length>0
      ? contOrder.map(id=>dayShots.find(s=>s.id===id)).filter(Boolean)
      : dayShots;

    const cols=[{w:12,label:'#'},{w:22,label:'Klappe'},{w:22,label:'Szene'},{w:CW-120,label:'Beschreibung'},{w:20,label:'Takes'},{w:20,label:'Notiz'},{w:24,label:'Status'}];
    doc.tableHeader(cols);
    ordered.forEach((s,i) => {
      const takes = s.takes||[];
      const bestTake = takes.find(t=>t.rating==='best')||takes.find(t=>t.rating==='good');
      doc.tableRow(cols,[
        String(i+1),
        s.shotNum!=null?String(s.shotNum)+(s.shotLetter||''):'',
        pdfSafe(s.scene||''),
        pdfSafe(s.description||''),
        String(takes.length),
        pdfSafe(s.continuityNote||''),
        bestTake?'OK ('+takes.indexOf(bestTake+1)+')':takes.length>0?takes.length+' Takes':'—'
      ],i);
    });

}

function Kalkulation({ project, onChange }) {
  const numDays = (project.shootDays||[]).length;
  const kalk = project.kalkulation || {};
  const gewerke = kalk.gewerke || DEFAULT_GEWERKE_KALK;
  const positionen = kalk.positionen || {};

  const [openGewerk, setOpenGewerk] = React.useState('__alle__');
  const [addTo, setAddTo] = React.useState(gewerke[0]||'');
  const [showAddGewerk, setShowAddGewerk] = React.useState(false);
  const [newGewerk, setNewGewerk] = React.useState('');
  const modus = kalk.modus || 'top-down';
  const [showPositionen, setShowPositionen] = React.useState(true); // Positions-Tabelle ein-/ausklappbar
  const [showBudgets, setShowBudgets] = React.useState(true); // Budget-Vorgaben ein-/ausklappbar
  const topDownBudgets = kalk.topDownBudgets || {}; // { [gewerk]: budgetValue }
  const setModus = m => save({ modus: m });
  const setTopDownBudget = (g, v) => save({ topDownBudgets: {...topDownBudgets, [g]: v} });
  const gesamtTopDown = Object.values(topDownBudgets).reduce((a,v)=>a+(parseFloat(v)||0),0);

  const save = patch => onChange({...project,
    kalkulation:{...kalk, ...patch}});

  const getPosi = g => positionen[g] || [];
  const setPosi = (g, rows) => save({ positionen:{...positionen, [g]:rows} });

  const addRow = g => setPosi(g, [...getPosi(g), {
    id:uid(), bezeichnung:'', kostenart:'Pauschal',
    menge:'1', einheit:'Stk.', einzelpreis:'', drehtage:'', notiz:''
  }]);
  const updRow = (g, id, patch) => setPosi(g,
    getPosi(g).map(r=>r.id===id?{...r,...patch}:r));
  const remRow = (g, id) => setPosi(g, getPosi(g).filter(r=>r.id!==id));

  const addGewerk = () => {
    if (!newGewerk.trim()) return;
    save({ gewerke:[...gewerke, newGewerk.trim()] });
    setOpenGewerk(newGewerk.trim());
    setNewGewerk(''); setShowAddGewerk(false);
  };
  const remGewerk = g => {
    if (!window.confirm(`Gewerk "${g}" und alle Positionen löschen?`)) return;
    const newP = {...positionen}; delete newP[g];
    const newB = {...topDownBudgets}; delete newB[g];
    save({ gewerke:gewerke.filter(x=>x!==g), positionen:newP, topDownBudgets:newB });
    setOpenGewerk(gewerke.filter(x=>x!==g)[0]||'');
  };

  // Totals
  const gewerkTotal = g => getPosi(g).reduce((a,r)=>a+kalkRowTotal(r,numDays),0);
  const grandTotal = gewerke.reduce((a,g)=>a+gewerkTotal(g),0);

  // Ausgaben total from project.ausgaben
  const ausgaben = project.ausgaben||[];

  // Auslagen
  const fmt = n => isNaN(n)?'—':n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';

  const thS = {padding:'5px 8px',fontSize:10,fontWeight:700,color:C.dim,
    background:C.card,textAlign:'left',borderBottom:'1px solid '+C.border,whiteSpace:'nowrap'};
  const tdS = {padding:'4px 6px',verticalAlign:'middle',fontSize:11,color:C.text,borderBottom:'1px solid '+C.border};
  const inp = {border:'1px solid '+C.border,borderRadius:3,fontSize:11,fontFamily:'inherit',padding:'2px 5px',background:C.inp,color:C.text,outline:'none'};
  const autoInp = (val,auto) => ({...inp,
    background:auto?'#eef7ec':'var(--c-hover)',
    color:auto?'#3636a1':'var(--c-text)',
    fontStyle:auto?'italic':'normal'});
  const cellInp = { border:'none', background:'transparent', width:'100%', fontSize:13, fontFamily:'inherit', color:C.text, outline:'none', padding:'4px 2px' };
  const [printing, doPrint] = usePrint();

  return (
    <div className={printing ? "print-root doc-a4" : undefined}>
      {printing && <h2 style={{ ...S.h1, fontSize:18, marginBottom:14 }}>Kalkulation — {project.settings.title||"Projekt"}</h2>}
      {/* Header */}
      <div className="no-print" style={{ ...S.row, marginBottom: 22 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Kalkulation</h1>
        <div style={{ flex: 1 }} />
        <div style={{ display: 'flex', background: C.hover, borderRadius: 980, padding: 3, gap: 2 }}>
          {[{ key: 'top-down', label: 'Top-Down' }, { key: 'bottom-up', label: 'Aufbau' }].map(m => (
            <button key={m.key} onClick={() => setModus(m.key)}
              style={{ padding: '5px 16px', fontSize: 13, borderRadius: 980, border: 'none', cursor: 'pointer',
                fontWeight: modus === m.key ? 600 : 500,
                background: modus === m.key ? C.card : 'transparent',
                color: modus === m.key ? C.text : C.dim,
                boxShadow: modus === m.key ? '0 1px 2px rgba(0,0,0,0.08)' : 'none', transition: 'all .15s' }}>
              {m.label}
            </button>
          ))}
        </div>
        <button style={S.btn()} onClick={doPrint}>🖨 PDF</button>
      </div>

      {/* Übersicht */}
      {(() => {
        const base = modus === 'top-down' && gesamtTopDown > 0 ? gesamtTopDown : grandTotal;
        const zuschlagSum = (kalk.zuschlage || []).reduce((a, z) => a + base * ((parseFloat(z.prozent) || 0) / 100), 0);
        const gesamtInkl = base + zuschlagSum;
        const diff = gesamtTopDown - grandTotal;
        const pct = gesamtTopDown > 0 ? Math.min(100, (grandTotal / gesamtTopDown) * 100) : 0;
        return (
          <div style={{ ...S.card, marginBottom: 18 }}>
            <div style={{ display: 'flex', gap: 36, flexWrap: 'wrap', alignItems: 'flex-end' }}>
              <div>
                <div style={{ fontSize: 12, color: C.dim, marginBottom: 4 }}>Kalkuliert</div>
                <div style={{ fontSize: 22, fontWeight: 600 }}>{fmt(grandTotal)}</div>
              </div>
              {modus === 'top-down' && (
                <div>
                  <div style={{ fontSize: 12, color: C.dim, marginBottom: 4 }}>Budget gesamt</div>
                  <div style={{ fontSize: 22, fontWeight: 600, color: C.mid }}>{fmt(gesamtTopDown)}</div>
                </div>
              )}
              {modus === 'top-down' && gesamtTopDown > 0 && (
                <div>
                  <div style={{ fontSize: 12, color: C.dim, marginBottom: 4 }}>{diff >= 0 ? 'Verbleibend' : 'Über Budget'}</div>
                  <div style={{ fontSize: 22, fontWeight: 600, color: diff >= 0 ? '#1a8a4a' : '#ff3b30' }}>{fmt(Math.abs(diff))}</div>
                </div>
              )}
              <div style={{ flex: 1 }} />
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 12, color: C.dim, marginBottom: 4 }}>Gesamt inkl. Zuschläge</div>
                <div style={{ fontSize: 26, fontWeight: 700, color: C.accent }}>{fmt(gesamtInkl)}</div>
              </div>
            </div>
            {modus === 'top-down' && gesamtTopDown > 0 && (
              <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: 'hidden', marginTop: 16 }}>
                <div style={{ height: '100%', width: pct + '%', borderRadius: 3, transition: 'width .3s',
                  background: pct < 70 ? '#34c759' : pct < 90 ? C.accent : '#ff3b30' }} />
              </div>
            )}
          </div>
        );
      })()}

      {/* Budget-Vorgaben pro Department (Top-Down) */}
      {modus === 'top-down' && (
        <div style={{ ...S.card, marginBottom: 18, padding: showBudgets ? 24 : '16px 24px' }}>
          <div style={{ ...S.row }}>
            <button onClick={() => setShowBudgets(v => !v)}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.dim, fontSize: 13, padding: 0, marginRight: 4, display: 'flex', alignItems: 'center' }}>
              <span style={{ display: 'inline-block', transform: showBudgets ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▸</span>
            </button>
            <div style={{ ...S.ct, marginBottom: 0 }}>Budget-Vorgaben</div>
            <div style={{ flex: 1 }} />
            {showAddGewerk ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <input style={{ ...S.input, maxWidth: 220, padding: '5px 10px' }} value={newGewerk} autoFocus placeholder="Name des Departments…"
                  onChange={e => setNewGewerk(e.target.value)} onKeyDown={e => e.key === 'Enter' && addGewerk()} />
                <button style={S.btn('primary')} onClick={addGewerk}>Hinzufügen</button>
                <button style={S.btn()} onClick={() => { setShowAddGewerk(false); setNewGewerk(''); }}>Abbrechen</button>
              </div>
            ) : (
              <button style={S.btn('xs')} onClick={() => setShowAddGewerk(true)}><Icon name="plus" size={12} /> Department</button>
            )}
          </div>
          {(showBudgets || printing) && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(210px, 1fr))', gap: 12, marginTop: 16 }}>
            {gewerke.map(g => {
              const budget = parseFloat(topDownBudgets[g]) || 0;
              const ist = gewerkTotal(g);
              const rest = budget - ist;
              const pct = budget > 0 ? Math.min(100, (ist / budget) * 100) : 0;
              return (
                <div key={g} style={{ border: '1px solid ' + C.border, borderRadius: 12, padding: '12px 14px', background: C.card }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{g}</div>
                    {!DEFAULT_GEWERKE_KALK.includes(g) && (
                      <span title="Entfernen" onClick={() => remGewerk(g)}
                        style={{ fontSize: 14, color: C.dim, cursor: 'pointer', lineHeight: 1 }}>×</span>
                    )}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: budget > 0 ? 10 : 0 }}>
                    <input style={{ ...S.input, padding: '6px 10px', fontSize: 14 }} value={topDownBudgets[g] || ''} placeholder="Budget" inputMode="decimal"
                      onChange={e => setTopDownBudget(g, e.target.value)} />
                    <span style={{ fontSize: 13, color: C.dim }}>€</span>
                  </div>
                  {budget > 0 && (
                    <>
                      <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: 'hidden', marginBottom: 6 }}>
                        <div style={{ height: '100%', width: pct + '%', borderRadius: 3, transition: 'width .3s',
                          background: pct < 70 ? '#34c759' : pct < 90 ? C.accent : '#ff3b30' }} />
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11 }}>
                        <span style={{ color: C.dim }}>Ist {fmt(ist)}</span>
                        <span style={{ color: rest >= 0 ? '#1a8a4a' : '#ff3b30', fontWeight: 600 }}>
                          {rest >= 0 ? 'Rest ' : 'Über '}{fmt(Math.abs(rest))}
                        </span>
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
          )}
        </div>
      )}

      {/* Einzelpositionen — eine einklappbare Tabelle mit Department-Auswahl */}
      {(() => {
        const isAlle = openGewerk === '__alle__' || printing;
        const posRows = isAlle
          ? gewerke.flatMap(g => getPosi(g).map(r => ({ g, r })))
          : getPosi(openGewerk).map(r => ({ g: openGewerk, r }));
        const visTotal = isAlle ? grandTotal : gewerkTotal(openGewerk);
        const target = isAlle ? (gewerke.includes(addTo) ? addTo : gewerke[0]) : openGewerk;
        return (
          <div style={{ ...S.card, padding: 0, overflow: 'hidden', marginBottom: 18 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 20px', borderBottom: showPositionen ? '1px solid ' + C.border : 'none', flexWrap: 'wrap' }}>
              <button onClick={() => setShowPositionen(v => !v)}
                style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.dim, fontSize: 13, padding: 0, display: 'flex', alignItems: 'center' }}>
                <span style={{ display: 'inline-block', transform: showPositionen ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▸</span>
              </button>
              <div style={{ ...S.ct, marginBottom: 0 }}>Einzelpositionen</div>
              <select className="no-print" value={openGewerk} onChange={e => setOpenGewerk(e.target.value)}
                style={{ ...S.input, width: 230, padding: '6px 10px' }}>
                <option value="__alle__">Alle Departments{grandTotal > 0 ? ' — ' + fmt(grandTotal) : ''}</option>
                {gewerke.map(g => (
                  <option key={g} value={g}>{g}{gewerkTotal(g) > 0 ? ' — ' + fmt(gewerkTotal(g)) : ''}</option>
                ))}
              </select>
              <div style={{ flex: 1 }} />
              <span style={{ fontSize: 12, color: C.dim }}>{posRows.length} Position{posRows.length !== 1 ? 'en' : ''}</span>
            </div>
            {(showPositionen || printing) && (
              <>
                {posRows.length > 0 ? (
                  <table style={S.tbl}>
                    <thead><tr>
                      {isAlle && <th style={{ ...S.th, paddingLeft: 20, width: 150 }}>Department</th>}
                      <th style={{ ...S.th, paddingLeft: isAlle ? 8 : 20 }}>Bezeichnung</th>
                      <th style={{ ...S.th, width: 130 }}>Kostenart</th>
                      <th style={{ ...S.th, width: 64, textAlign: 'right' }}>Menge</th>
                      <th style={{ ...S.th, width: 80 }}>Einheit</th>
                      <th style={{ ...S.th, width: 110, textAlign: 'right' }}>Einzelpreis</th>
                      <th style={{ ...S.th, width: 80, textAlign: 'center' }}>Drehtage</th>
                      <th style={{ ...S.th, width: 100, textAlign: 'right' }}>Gesamt</th>
                      <th style={{ ...S.th, width: 40, paddingRight: 20 }} />
                    </tr></thead>
                    <tbody>
                      {posRows.map(({ g, r: row }) => {
                        const dInfo = parseKalkDays(row.drehtage, numDays);
                        const rowTotal = kalkRowTotal(row, numDays);
                        return (
                          <tr key={g + row.id}>
                            {isAlle && (
                              <td style={{ ...S.td, paddingLeft: 20 }}>
                                <select style={{ ...cellInp, cursor: 'pointer', color: C.dim, fontSize: 12 }} value={g}
                                  onChange={e => {
                                    const newG = e.target.value;
                                    if (newG === g) return;
                                    const np = { ...positionen };
                                    np[g] = (np[g] || []).filter(x => x.id !== row.id);
                                    np[newG] = [...(np[newG] || []), row];
                                    save({ positionen: np });
                                  }}>
                                  {gewerke.map(x => <option key={x} value={x}>{x}</option>)}
                                </select>
                              </td>
                            )}
                            <td style={{ ...S.td, paddingLeft: isAlle ? 8 : 20 }}><input style={cellInp} value={row.bezeichnung} placeholder="Bezeichnung…" onChange={e => updRow(g, row.id, { bezeichnung: e.target.value })} /></td>
                            <td style={S.td}><select style={{ ...cellInp, cursor: 'pointer' }} value={row.kostenart} onChange={e => updRow(g, row.id, { kostenart: e.target.value })}>{KOSTENARTEN.map(k => <option key={k} value={k}>{k}</option>)}</select></td>
                            <td style={S.td}><input style={{ ...cellInp, textAlign: 'right' }} value={row.menge} placeholder="0" inputMode="decimal" onChange={e => updRow(g, row.id, { menge: e.target.value })} /></td>
                            <td style={S.td}><input style={cellInp} value={row.einheit} placeholder="Stk." onChange={e => updRow(g, row.id, { einheit: e.target.value })} /></td>
                            <td style={S.td}><input style={{ ...cellInp, textAlign: 'right' }} value={row.einzelpreis} placeholder="0,00" inputMode="decimal" onChange={e => updRow(g, row.id, { einzelpreis: e.target.value })} /></td>
                            <td style={S.td}><input style={{ ...cellInp, textAlign: 'center', color: dInfo.auto !== false ? C.accent : C.text, fontStyle: dInfo.auto !== false ? 'italic' : 'normal' }} value={row.drehtage || ''} placeholder={dInfo.value + 'd'} title="Leer = Projektdrehtage, +N / -N relativ" onChange={e => updRow(g, row.id, { drehtage: e.target.value })} /></td>
                            <td style={{ ...S.td, textAlign: 'right', fontWeight: 600, color: '#1a8a4a', whiteSpace: 'nowrap' }}>{fmt(rowTotal)}</td>
                            <td style={{ ...S.td, textAlign: 'center', paddingRight: 20 }}><span onClick={() => remRow(g, row.id)} style={{ color: C.dim, cursor: 'pointer', fontSize: 16 }}>×</span></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                ) : (
                  <div style={{ padding: '20px', color: C.dim, fontSize: 13 }}>Noch keine Positionen{isAlle ? '' : ' in „' + openGewerk + '"'}.</div>
                )}
                <div style={{ padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 10, borderTop: '1px solid ' + C.border, flexWrap: 'wrap' }}>
                  <button style={S.btn('xs')} onClick={() => addRow(target)}><Icon name="plus" size={12} /> Position</button>
                  {isAlle && (
                    <>
                      <span style={{ fontSize: 12, color: C.dim }}>zu</span>
                      <select value={target} onChange={e => setAddTo(e.target.value)}
                        style={{ ...S.input, width: 170, padding: '4px 8px', fontSize: 12 }}>
                        {gewerke.map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    </>
                  )}
                  {!isAlle && !DEFAULT_GEWERKE_KALK.includes(openGewerk) && (
                    <span onClick={() => remGewerk(openGewerk)} style={{ fontSize: 12, color: '#ff3b30', cursor: 'pointer', marginLeft: 4 }}>Department löschen</span>
                  )}
                  <div style={{ flex: 1 }} />
                  <span style={{ fontSize: 13, fontWeight: 600, color: '#1a8a4a' }}>Summe: {fmt(visTotal)}</span>
                </div>
              </>
            )}
          </div>
        );
      })()}

      {/* Department hinzufügen — nur im Aufbau-Modus (Top-Down hat den Button bei den Budget-Vorgaben) */}
      {modus !== 'top-down' && (
        showAddGewerk ? (
          <div style={{ ...S.card, ...S.row, marginBottom: 18, gap: 10 }}>
            <input style={{ ...S.input, maxWidth: 260 }} value={newGewerk} autoFocus placeholder="Name des Departments…"
              onChange={e => setNewGewerk(e.target.value)} onKeyDown={e => e.key === 'Enter' && addGewerk()} />
            <button style={S.btn('primary')} onClick={addGewerk}>Hinzufügen</button>
            <button style={S.btn()} onClick={() => { setShowAddGewerk(false); setNewGewerk(''); }}>Abbrechen</button>
          </div>
        ) : (
          <button style={{ ...S.btn(), marginBottom: 18 }} onClick={() => setShowAddGewerk(true)}><Icon name="plus" size={13} /> Department</button>
        )
      )}

      {/* Zuschläge */}
      <ZuschlageSection kalk={kalk} baseBudget={modus==='top-down'&&gesamtTopDown>0?gesamtTopDown:grandTotal} numDays={numDays}
        onChange={patch=>save(patch)} fmt={fmt}/>
    </div>
  );
}

// ─── Ausgaben ─────────────────────────────────────────────────────────────────
function Ausgaben({ project, onChange }) {
  const [filterGewerk, setFilterGewerk] = React.useState('Alle');
  const [showBelege, setShowBelege] = React.useState({});
  const [lightbox, setLightbox] = React.useState(null);

  const ausgaben = project.ausgaben || [];
  const kalk = project.kalkulation || {};
  const gewerke = ['Alle', ...(kalk.gewerke || DEFAULT_GEWERKE_KALK)];
  const positionen = kalk.positionen || {};
  const numDays = (project.shootDays||[]).length;

  const saveAusgaben = list => onChange({...project, ausgaben:list});
  const addAusgabe = () => saveAusgaben([...ausgaben, {
    id:uid(), bezeichnung:'', gewerk:filterGewerk==='Alle'?'Sonstiges':filterGewerk,
    kostenart:'Pauschal', betrag:'', datum:new Date().toISOString().slice(0,10),
    person:'', notiz:'', belege:[]
  }]);
  const updA = (id,patch) => saveAusgaben(ausgaben.map(a=>a.id===id?{...a,...patch}:a));
  const remA = id => { if(window.confirm('Ausgabe löschen?')) saveAusgaben(ausgaben.filter(a=>a.id!==id)); };

  const addBeleg = (id, files) => {
    const a = ausgaben.find(x=>x.id===id);
    const existing = a?.belege||[];
    let pending = files.length;
    const newBelege = [...existing];
    Array.from(files).forEach(file=>{
      const reader = new FileReader();
      reader.onload = e=>{
        newBelege.push({id:uid(),src:e.target.result,name:file.name});
        pending--;
        if(pending===0) updA(id,{belege:newBelege});
      };
      reader.readAsDataURL(file);
    });
  };
  const remBeleg = (ausgabeId, belegId) => {
    const a = ausgaben.find(x=>x.id===ausgabeId);
    updA(ausgabeId,{belege:(a?.belege||[]).filter(b=>b.id!==belegId)});
  };

  // Soll from Kalkulation per Gewerk
  const kalkSoll = g => {
    if(g==='Alle') return Object.values(positionen)
      .flat().reduce((a,r)=>a+kalkRowTotal(r,numDays),0);
    return (positionen[g]||[]).reduce((a,r)=>a+kalkRowTotal(r,numDays),0);
  };
  const ausgabenIst = g => {
    const list = g==='Alle'?ausgaben:ausgaben.filter(a=>a.gewerk===g);
    return list.reduce((a,x)=>a+(parseFloat(x.betrag)||0),0);
  };

  const filtered = filterGewerk==='Alle'?ausgaben:ausgaben.filter(a=>a.gewerk===filterGewerk);
  const fmt = n => isNaN(n)?'—':n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';

  const soll = kalkSoll(filterGewerk);
  const ist  = ausgabenIst(filterGewerk);
  const pct  = soll>0?Math.min(100,(ist/soll)*100):0;
  const over = ist>soll;

  const cellInp = { border:'none', background:'transparent', width:'100%', fontSize:13, fontFamily:'inherit', color:C.text, outline:'none', padding:'4px 2px' };

  return (
    <div>
      <div style={{ ...S.row, marginBottom:22 }}>
        <h1 style={{ ...S.h1, marginBottom:0 }}>Ausgaben</h1>
        <div style={{ flex:1 }} />
        <button style={S.btn('primary')} onClick={addAusgabe}><Icon name="plus" size={13} /> Ausgabe</button>
      </div>

      {/* Filter */}
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:18 }}>
        {gewerke.map(g => (
          <button key={g} onClick={() => setFilterGewerk(g)}
            style={{ padding:'5px 14px', fontSize:13, borderRadius:980, cursor:'pointer', transition:'all .15s',
              border:'1px solid '+(filterGewerk===g?C.accent:C.border),
              background: filterGewerk===g?C.accent:C.card,
              color: filterGewerk===g?'#fff':C.text, fontWeight: filterGewerk===g?600:500 }}>
            {g}
          </button>
        ))}
      </div>

      {/* Übersicht: Soll vs. Ist */}
      <div style={{ ...S.card, marginBottom:18 }}>
        <div style={{ display:'flex', gap:36, flexWrap:'wrap', alignItems:'flex-end' }}>
          <div>
            <div style={{ fontSize:12, color:C.dim, marginBottom:4 }}>Soll ({filterGewerk})</div>
            <div style={{ fontSize:22, fontWeight:600, color:C.mid }}>{fmt(soll)}</div>
          </div>
          <div>
            <div style={{ fontSize:12, color:C.dim, marginBottom:4 }}>Ausgegeben</div>
            <div style={{ fontSize:22, fontWeight:600, color: over?'#ff3b30':'#1a8a4a' }}>{fmt(ist)}</div>
          </div>
          <div style={{ flex:1 }} />
          {soll>0 && (
            <div style={{ textAlign:'right' }}>
              <div style={{ fontSize:12, color:C.dim, marginBottom:4 }}>{over?'Über Budget':'Verbleibend'}</div>
              <div style={{ fontSize:26, fontWeight:700, color: over?'#ff3b30':C.accent }}>{fmt(Math.abs(soll-ist))}</div>
            </div>
          )}
        </div>
        {soll>0 && (
          <div style={{ height:8, background:C.border, borderRadius:4, overflow:'hidden', marginTop:16 }}>
            <div style={{ height:'100%', borderRadius:4, transition:'width .3s', width:pct+'%',
              background: pct<70?'#34c759':pct<90?C.accent:'#ff3b30' }} />
          </div>
        )}
        {/* Pro-Department Balken (in Alle-Ansicht) */}
        {filterGewerk==='Alle' && (
          <div style={{ marginTop:18, display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(220px, 1fr))', gap:14 }}>
            {(kalk.gewerke||DEFAULT_GEWERKE_KALK).map(g => {
              const gs = kalkSoll(g), gi = ausgabenIst(g);
              if (gs===0 && gi===0) return null;
              const gp = gs>0?Math.min(100,(gi/gs)*100):(gi>0?100:0);
              const gover = gi>gs;
              return (
                <div key={g}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4 }}>
                    <span style={{ color:C.text, fontWeight:500 }}>{g}</span>
                    <span style={{ color: gover?'#ff3b30':C.dim }}>{fmt(gi)} / {fmt(gs)}</span>
                  </div>
                  <div style={{ height:6, background:C.border, borderRadius:3, overflow:'hidden' }}>
                    <div style={{ height:'100%', borderRadius:3, width:gp+'%',
                      background: gp<70?'#34c759':gp<90?C.accent:'#ff3b30' }} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Ausgaben-Tabelle */}
      <div style={{ ...S.card, padding:0, overflow:'hidden' }}>
        {filtered.length>0 ? (
          <table style={S.tbl}>
            <thead><tr>
              <th style={{ ...S.th, paddingLeft:20 }}>Bezeichnung</th>
              <th style={{ ...S.th, width:120 }}>Department</th>
              <th style={{ ...S.th, width:120 }}>Kostenart</th>
              <th style={{ ...S.th, width:100, textAlign:'right' }}>Betrag</th>
              <th style={{ ...S.th, width:140 }}>Datum</th>
              <th style={{ ...S.th, width:150 }}>Person</th>
              <th style={{ ...S.th }}>Notiz</th>
              <th style={{ ...S.th, width:90, textAlign:'center' }}>Belege</th>
              <th style={{ ...S.th, width:40, paddingRight:20 }} />
            </tr></thead>
            <tbody>
              {filtered.map(a => (
                <tr key={a.id}>
                  <td style={{ ...S.td, paddingLeft:20 }}><input style={cellInp} value={a.bezeichnung} placeholder="Bezeichnung…" onChange={e=>updA(a.id,{bezeichnung:e.target.value})} /></td>
                  <td style={S.td}><select style={{ ...cellInp, cursor:'pointer' }} value={a.gewerk} onChange={e=>updA(a.id,{gewerk:e.target.value})}>{(kalk.gewerke||DEFAULT_GEWERKE_KALK).map(g=><option key={g} value={g}>{g}</option>)}</select></td>
                  <td style={S.td}><select style={{ ...cellInp, cursor:'pointer' }} value={a.kostenart} onChange={e=>updA(a.id,{kostenart:e.target.value})}>{KOSTENARTEN.map(k=><option key={k} value={k}>{k}</option>)}</select></td>
                  <td style={S.td}><input style={{ ...cellInp, textAlign:'right' }} value={a.betrag} placeholder="0,00" inputMode="decimal" onChange={e=>updA(a.id,{betrag:e.target.value})} /></td>
                  <td style={S.td}><input type="date" style={cellInp} value={a.datum} onChange={e=>updA(a.id,{datum:e.target.value})} /></td>
                  <td style={S.td}>
                    {(() => {
                      const people = [...(project.crew||[]).map(p=>p.name), ...(project.cast||[]).filter(p=>p.castingStatus==='besetzt'&&p.name).map(p=>p.name)].filter(Boolean);
                      const known = new Set(['Produktion', ...people]);
                      return (
                        <select style={{ ...cellInp, cursor:'pointer', fontWeight: a.person==='Produktion'?700:400 }}
                          value={a.person||''} onChange={e=>updA(a.id,{person:e.target.value})}>
                          <option value="" style={{ fontWeight:400, color:C.dim }}>– wer hat gezahlt? –</option>
                          <option value="Produktion" style={{ fontWeight:700 }}>Produktion (Kasse)</option>
                          <option value="__sep__" disabled>──────────────</option>

                  </td>

                        <input type="file" accept="image/*,application/pdf" multiple style={{ display:'none' }} onChange={e=>addBeleg(a.id,e.target.files)} />
                      </label>
                    </div>
                  </td>
                  <td style={{ ...S.td, textAlign:'center', paddingRight:20 }}><span onClick={()=>remA(a.id)} style={{ color:C.dim, cursor:'pointer', fontSize:16 }}>×</span></td>
                </tr>
              ))}

          </table>
        ) : (
          <div style={{ padding:'24px 20px', color:C.dim, fontSize:13 }}>Keine Ausgaben{filterGewerk!=='Alle'?' in dieser Kategorie':''}.</div>
        )}
        <datalist id="ausg-crew-list">
          <option value="Produktion" />
          {[...(project.crew||[]),...(project.cast||[]).filter(p=>p.castingStatus==='besetzt'&&p.name)].map(p=><option key={p.id} value={p.name}/>)}
        </datalist>
        <div style={{ padding:'12px 20px', borderTop:'1px solid '+C.border, display:'flex', alignItems:'center', gap:10 }}>
          <button style={S.btn('xs')} onClick={addAusgabe}><Icon name="plus" size={12} /> Ausgabe</button>
          <div style={{ flex:1 }} />
          <span style={{ fontSize:13, fontWeight:600, color: over?'#ff3b30':'#1a8a4a' }}>Gesamt: {fmt(ist)}</span>
        </div>
      </div>

      {/* Lightbox */}
      {lightbox && (
        <div onClick={()=>setLightbox(null)}
          style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
          <img src={lightbox} alt="Beleg" style={{ maxWidth:'95vw', maxHeight:'95vh', objectFit:'contain', borderRadius:6, boxShadow:'0 4px 32px rgba(0,0,0,0.8)' }} onClick={e=>e.stopPropagation()} />
          <span onClick={()=>setLightbox(null)} style={{ position:'absolute', top:16, right:24, color:'#fff', fontSize:28, cursor:'pointer', fontWeight:700 }}>×</span>
        </div>
      )}
    </div>
  );
}


// ─── Zuschläge (prozentuale Positionen) ──────────────────────────────────────
function Zuschlage({ project, onChange }) {
  const kalk = project.kalkulation || {};
  const zuschlage = kalk.zuschlage || [];
  const positionen = kalk.positionen || {};
  const numDays = (project.shootDays||[]).length;

  // Base budget = sum of all Kalkulation rows
  const baseBudget = (kalk.gewerke||DEFAULT_GEWERKE_KALK)
    .reduce((a,g)=>(a+(positionen[g]||[]).reduce((b,r)=>b+kalkRowTotal(r,numDays),0)),0);

  const save = z => onChange({...project, kalkulation:{...kalk, zuschlage:z}});
  const add = () => save([...zuschlage, {
    id:uid(), bezeichnung:'', prozent:'', typ:'kosten',
    // typ: 'kosten' = fixer Aufschlag, 'sicherheit' = verfügbares Budget (Gewinn wenn unverbraucht)
    notiz:''
  }]);
  const upd = (id,patch) => save(zuschlage.map(z=>z.id===id?{...z,...patch}:z));
  const rem = id => { if(window.confirm('Zuschlag löschen?')) save(zuschlage.filter(z=>z.id!==id)); };

  const fmt = n => isNaN(n)?'—':n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
  const pctVal = z => baseBudget * ((parseFloat(z.prozent)||0)/100);
  const totalKosten = zuschlage.filter(z=>z.typ==='kosten').reduce((a,z)=>a+pctVal(z),0);
  const totalSicherheit = zuschlage.filter(z=>z.typ==='sicherheit').reduce((a,z)=>a+pctVal(z),0);
  const gesamtBudget = baseBudget + totalKosten + totalSicherheit;

  const thS = {padding:'5px 8px',fontSize:10,fontWeight:700,color:C.dim,
    background:C.card,textAlign:'left',borderBottom:'1px solid '+C.border};
  const tdS = {padding:'5px 8px',verticalAlign:'middle',fontSize:11,color:C.text,borderBottom:'1px solid '+C.border};
  const inp = {border:'1px solid '+C.border,borderRadius:3,fontSize:11,fontFamily:'inherit',padding:'2px 5px',background:C.inp,color:C.text,outline:'none'};

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <h1 style={S.h1}>Zuschläge & Sicherheiten</h1>
        <button style={S.btn('primary')} onClick={add}>+ Zuschlag</button>
      </div>

      {/* Budget-Übersicht */}
      <div style={{...S.card,marginBottom:16}}>
        <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:2}}>Basis-Kalkulation</div>
            <div style={{fontSize:16,fontWeight:700,color:C.mid}}>{fmt(baseBudget)}</div>
          </div>
          <div style={{color:C.dim,alignSelf:'center'}}>+</div>
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:2}}>Aufschläge</div>
            <div style={{fontSize:16,fontWeight:700,color:'#3aaa35'}}>{fmt(totalKosten)}</div>
          </div>
          <div style={{color:C.dim,alignSelf:'center'}}>+</div>
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:2}}>Sicherheiten</div>
            <div style={{fontSize:16,fontWeight:700,color:'#3636a1'}}>{fmt(totalSicherheit)}</div>
          </div>
          <div style={{color:C.dim,alignSelf:'center'}}>=</div>
          <div>
            <div style={{fontSize:10,color:C.dim,marginBottom:2}}>Gesamtbudget</div>
            <div style={{fontSize:18,fontWeight:800,color:'var(--c-text)'}}>{fmt(gesamtBudget)}</div>
          </div>
        </div>
      </div>

      <div style={{...S.card,padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr>
              <th style={thS}>Bezeichnung</th>
              <th style={{...thS,width:80}}>%</th>
              <th style={{...thS,width:90}}>Betrag</th>
              <th style={{...thS,width:160}}>Art</th>
              <th style={thS}>Notiz</th>
              <th style={{...thS,width:24}}/>
            </tr>
          </thead>
          <tbody>
            {zuschlage.map(z=>(
              <tr key={z.id} style={{borderBottom:'1px solid '+C.border,
                background:z.typ==='sicherheit'?'#eeeef7':C.card}}>
                <td style={tdS}>
                  <input style={{...inp,width:'100%'}} value={z.bezeichnung}
                    placeholder="zB Produktionsversicherung, Markup, Sicherheit..."
                    onChange={e=>upd(z.id,{bezeichnung:e.target.value})}/>
                </td>
                <td style={tdS}>
                  <div style={{display:'flex',alignItems:'center',gap:3}}>
                    <input style={{...inp,width:50,textAlign:'right'}}
                      value={z.prozent} placeholder="0"
                      onChange={e=>upd(z.id,{prozent:e.target.value})}/>
                    <span style={{fontSize:11,color:C.dim}}>%</span>
                  </div>
                </td>
                <td style={{...tdS,fontWeight:700,
                  color:z.typ==='sicherheit'?'#57b94f':'#3aaa35',textAlign:'right'}}>
                  {fmt(pctVal(z))}
                </td>
                <td style={tdS}>
                  <div style={{display:'flex',gap:6}}>
                    {[
                      {key:'kosten',     label:'Aufschlag / Kosten',   color:'#3aaa35'},
                      {key:'sicherheit', label:'Sicherheit / Reserve',  color:'#57b94f'},
                    ].map(opt=>(
                      <label key={opt.key} style={{display:'flex',alignItems:'center',
                        gap:4,cursor:'pointer',fontSize:10}}>
                        <input type="radio" checked={z.typ===opt.key}
                          onChange={()=>upd(z.id,{typ:opt.key})}
                          style={{accentColor:opt.color}}/>
                        <span style={{color:z.typ===opt.key?opt.color:C.dim}}>
                          {opt.label}
                        </span>
                      </label>
                    ))}
                  </div>
                  {z.typ==='sicherheit'&&(
                    <div style={{fontSize:9,color:'#57b94f',marginTop:2}}>
                      Wird als Gewinn verbucht wenn nicht verbraucht
                    </div>
                  )}
                </td>
                <td style={tdS}>
                  <input style={{...inp,width:'100%'}} value={z.notiz}
                    placeholder="Notiz..."
                    onChange={e=>upd(z.id,{notiz:e.target.value})}/>
                </td>
                <td style={{...tdS,textAlign:'center'}}>
                  <span onClick={()=>rem(z.id)}
                    style={{color:C.dim,cursor:'pointer',fontSize:16}}>×</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {zuschlage.length===0&&(
          <div style={{padding:32,textAlign:'center',color:C.dim}}>
            Noch keine Zuschläge. Klicke auf "+ Zuschlag" um zB Versicherungen,
            Markups oder Sicherheiten hinzuzufügen.
          </div>
        )}
        <div style={{padding:'6px 12px',borderTop:'1px solid '+C.border}}>
          <span onClick={add}
            style={{fontSize:10,color:C.dim,cursor:'pointer',textDecoration:'underline'}}>
            + Zuschlag hinzufügen
          </span>
        </div>
      </div>
    </div>
  );
}

// ─── Finanz-Übersicht ─────────────────────────────────────────────────────────
function AuslagenTab({ project, onChange }) {
  const kalk = project.kalkulation || {};
  const auslagen = kalk.auslagen || [];
  const ausgaben = project.ausgaben || [];
  const allCrew = [...(project.crew||[]),
    ...(project.cast||[]).filter(p=>p.castingStatus==='besetzt'&&p.name)];

  const saveAuslagen = al => onChange({...project,
    kalkulation:{...kalk, auslagen:al}});
  const addAuslage = () => saveAuslagen([...auslagen,
    {id:uid(), person:'', betrag:'', datum:'', notiz:''}]);
  const updA = (id,patch) => saveAuslagen(auslagen.map(a=>a.id===id?{...a,...patch}:a));
  const remA = id => saveAuslagen(auslagen.filter(a=>a.id!==id));

  const fmt = n => isNaN(n)||n===undefined?'—':
    n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';

  // Per-person overview: all people who have auslagen OR ausgaben (außer "Produktion" — die Produktionskasse braucht keine Erstattung)
  const personNames = new Set([
    ...auslagen.map(a=>a.person).filter(Boolean),
    ...ausgaben.map(a=>a.person).filter(Boolean),
  ].filter(n => n !== 'Produktion'));
  const personOverview = [...personNames].map(name=>{
    const auslage = auslagen.filter(a=>a.person===name)
      .reduce((s,a)=>s+(parseFloat(a.betrag)||0),0);
    const gezahlt = ausgaben.filter(a=>a.person===name)
      .reduce((s,a)=>s+(parseFloat(a.betrag)||0),0);
    const rest = auslage - gezahlt;
    return { name, auslage, gezahlt,
      restBetrag: rest>=0?rest:0,
      nochZahlen: rest<0?Math.abs(rest):0 };
  });

  const cellInp = { border:'none', background:'transparent', width:'100%', fontSize:13, fontFamily:'inherit', color:C.text, outline:'none', padding:'4px 2px' };
  const auslagenTotal = auslagen.reduce((s,a)=>s+(parseFloat(a.betrag)||0),0);

  return (
    <div>
      <h1 style={S.h1}>Auslagen &amp; Erstattungen</h1>

      {/* Auslagen erfassen */}
      <div style={{ ...S.card, padding:0, overflow:'hidden', marginBottom:24 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 20px', borderBottom:'1px solid '+C.border }}>
          <div style={{ ...S.ct, marginBottom:0 }}>Auslagen</div>
          <div style={{ flex:1 }} />
          <span style={{ fontSize:12, color:C.dim }}>{auslagen.length} Eintrag{auslagen.length!==1?'e':''}</span>
        </div>
        {auslagen.length>0 ? (
          <table style={S.tbl}>
            <thead><tr>
              <th style={{ ...S.th, paddingLeft:20 }}>Person</th>
              <th style={{ ...S.th, width:120, textAlign:'right' }}>Betrag</th>
              <th style={{ ...S.th, width:150 }}>Datum</th>
              <th style={{ ...S.th }}>Notiz</th>
              <th style={{ ...S.th, width:40, paddingRight:20 }} />
            </tr></thead>
            <tbody>
              {auslagen.map(a => (
                <tr key={a.id}>
                  <td style={{ ...S.td, paddingLeft:20 }}><input style={cellInp} value={a.person} placeholder="Name…" list="ausl-crew-list" onChange={e=>updA(a.id,{person:e.target.value})} /></td>
                  <td style={S.td}><input style={{ ...cellInp, textAlign:'right' }} value={a.betrag} placeholder="0,00" inputMode="decimal" onChange={e=>updA(a.id,{betrag:e.target.value})} /></td>
                  <td style={S.td}><input type="date" style={cellInp} value={a.datum} onChange={e=>updA(a.id,{datum:e.target.value})} /></td>
                  <td style={S.td}><input style={cellInp} value={a.notiz} placeholder="Notiz…" onChange={e=>updA(a.id,{notiz:e.target.value})} /></td>
                  <td style={{ ...S.td, textAlign:'center', paddingRight:20 }}><span onClick={()=>remA(a.id)} style={{ color:C.dim, cursor:'pointer', fontSize:16 }}>×</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : (
          <div style={{ padding:'24px 20px', color:C.dim, fontSize:13 }}>Noch keine Auslagen eingetragen.</div>
        )}
        <datalist id="ausl-crew-list">{allCrew.map(p=><option key={p.id} value={p.name}/>)}</datalist>
        <div style={{ padding:'12px 20px', borderTop:'1px solid '+C.border, display:'flex', alignItems:'center', gap:10 }}>
          <button style={S.btn('xs')} onClick={addAuslage}><Icon name="plus" size={12} /> Auslage</button>
          <div style={{ flex:1 }} />
          <span style={{ fontSize:13, fontWeight:600, color:'#1a8a4a' }}>Summe: {fmt(auslagenTotal)}</span>
        </div>
      </div>

      {/* Übersicht Erstattungen */}
      <div style={{ ...S.ct, marginBottom:12 }}>Erstattungen &amp; offene Beträge</div>
      {personOverview.length===0 ? (
        <div style={{ ...S.card, color:C.dim, textAlign:'center', padding:32 }}>
          Noch keine Auslagen oder Ausgaben mit Personenzuordnung.
        </div>
      ) : (
        <div style={{ ...S.card, padding:0, overflow:'hidden' }}>
          <table style={S.tbl}>
            <thead><tr>
              <th style={{ ...S.th, paddingLeft:20 }}>Person</th>
              <th style={{ ...S.th, width:130, textAlign:'right' }}>Auslage erhalten</th>
              <th style={{ ...S.th, width:130, textAlign:'right' }}>Ausgaben getätigt</th>
              <th style={{ ...S.th, width:130, textAlign:'right' }}>Auslage offen</th>
              <th style={{ ...S.th, width:140, textAlign:'right' }}>Noch zu erstatten</th>
              <th style={{ ...S.th, width:200 }}>Status</th>
            </tr></thead>
            <tbody>
              {personOverview.map(({name,auslage,gezahlt,restBetrag,nochZahlen}) => (
                <tr key={name}>
                  <td style={{ ...S.td, paddingLeft:20, fontWeight:600 }}>{name}</td>
                  <td style={{ ...S.td, textAlign:'right' }}>{auslage>0?fmt(auslage):'—'}</td>
                  <td style={{ ...S.td, textAlign:'right' }}>{gezahlt>0?fmt(gezahlt):'—'}</td>
                  <td style={{ ...S.td, textAlign:'right', fontWeight:600, color: restBetrag>0?'#1a8a4a':C.dim }}>{restBetrag>0?fmt(restBetrag):'—'}</td>
                  <td style={{ ...S.td, textAlign:'right', fontWeight:600, color: nochZahlen>0?'#ff3b30':C.dim }}>{nochZahlen>0?fmt(nochZahlen):'—'}</td>
                  <td style={S.td}>
                    {nochZahlen>0 ? (
                      <span style={{ background:'rgba(255,59,48,0.1)', color:'#ff3b30', borderRadius:980, padding:'3px 10px', fontSize:12, fontWeight:600 }}>Produktion schuldet {fmt(nochZahlen)}</span>
                    ) : restBetrag>0 ? (
                      <span style={{ background:'rgba(58,170,53,0.12)', color:'#1a8a4a', borderRadius:980, padding:'3px 10px', fontSize:12, fontWeight:600 }}>Auslage noch offen</span>
                    ) : (
                      <span style={{ color:C.dim, fontSize:12 }}>Ausgeglichen</span>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// Multi-scene tag input
function SzenenTagInput({ value, onChange, allScenes }) {
  const [input, setInput] = React.useState('');
  const tags = value ? value.split(',').map(s=>s.trim()).filter(Boolean) : [];
  const add = v => {
    const t = v.trim();
    if (t && !tags.includes(t)) onChange([...tags, t].join(', '));
    setInput('');
  };
  const rem = t => onChange(tags.filter(x=>x!==t).join(', '));
  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center',
      border:'1px solid '+C.border,borderRadius:3,padding:'2px 4px',background:C.inp,
      minHeight:28}}>
      {tags.map(t=>(
        <span key={t} style={{background:'#e0e8ff',color:'#3636a1',fontSize:10,
          borderRadius:3,padding:'1px 5px',display:'flex',alignItems:'center',gap:3}}>
          Sz.{t}
          <span onClick={()=>rem(t)} style={{cursor:'pointer',fontWeight:700,
            color:C.dim,lineHeight:1}}>×</span>
        </span>
      ))}
      <input
        style={{border:'none',outline:'none',fontSize:11,background:'transparent',
          width:40,minWidth:40,fontFamily:'inherit'}}
        value={input} placeholder="Nr."
        list="szenen-tag-list"
        onChange={e=>setInput(e.target.value)}
        onKeyDown={e=>{
          if(e.key==='Enter'||e.key===','||e.key===' '){e.preventDefault();add(input);}
          if(e.key==='Backspace'&&!input&&tags.length) rem(tags[tags.length-1]);
        }}
        onBlur={()=>{if(input.trim())add(input);}}/>
      <datalist id="szenen-tag-list">
        {allScenes.map((n,i)=><option key={i} value={n}/>)}
      </datalist>
    </div>
  );
}

// Multi-photo field
function FotoMulti({ fotos, onChange, size=44 }) {
  const [lightbox, setLightbox] = React.useState(null);
  const add = files => {
    let pending = files.length;
    const newF = [...fotos];
    Array.from(files).forEach(file=>{
      const r = new FileReader();
      r.onload = e => {
        newF.push({id:uid(), src:e.target.result, name:file.name});
        if(--pending===0) onChange(newF);
      };
      r.readAsDataURL(file);
    });
  };
  const rem = id => onChange(fotos.filter(f=>f.id!==id));
  return (
    <>
      <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
        {fotos.map(f=>(
          <div key={f.id} style={{position:'relative'}}>
            <img src={f.src} alt={f.name}
              style={{width:size,height:size,objectFit:'cover',borderRadius:3,
                cursor:'pointer',border:'1px solid '+C.border}}
              onClick={()=>setLightbox(f.src)}/>
            <span onClick={()=>rem(f.id)}
              style={{position:'absolute',top:-4,right:-4,background:'#ff3b30',
                color:'#fff',borderRadius:'50%',width:14,height:14,fontSize:9,
                fontWeight:700,display:'flex',alignItems:'center',
                justifyContent:'center',cursor:'pointer',lineHeight:1}}>×</span>

// ─── Technikliste ─────────────────────────────────────────────────────────────
const DEFAULT_TECHNIK_DEPS = [
  'Kamera','Licht','Ton','Grip','Produktion','Sonstiges'
];
const TECHNIK_STATUS = [
  { key: 'offen',       label: 'Offen',       color: 'var(--c-dim)' },
  { key: 'reserviert',  label: 'Reserviert',  color: '#a1a136' },
  { key: 'bestätigt',   label: 'Bestätigt',   color: '#3aaa35' },
  { key: 'vorhanden',   label: 'Vorhanden',   color: '#34c759' },
];

function Technikliste({ project, onChange }) {
  const [view, setView] = React.useState('liste');    // 'liste' | 'rental'
  const [filterKat, setFilterKat] = React.useState('Alle');
  const [filterText, setFilterText] = React.useState('');
  const [printSource, setPrintSource] = React.useState(null); // rental/person name to print

  const data = project.technik || [];
  const save = list => onChange({...project, technik: list});

  const add = () => save([...data, {
    id: uid(), bezeichnung: '', kategorie: departments[0]||'Sonstiges', menge: '1', einheit: 'Stk.',
    quelle: '', preis: '', tage: '',
    vonDatum: defaultVon, bisDatum: defaultBis,
    selbstMitbringen: false,
    shotlistShow: false, shotlistSection: 'sonstiges',
    status: 'offen', notiz: '',
  }]);
  const upd = (id, patch) => save(data.map(r => r.id===id ? {...r,...patch} : r));
  const rem = id => { if(window.confirm('Eintrag löschen?')) save(data.filter(r=>r.id!==id)); };

  // Departments (default + custom from project)
  const departments = project.technikDeps || DEFAULT_TECHNIK_DEPS;
  const saveDeps = deps => onChange({...project, technikDeps: deps});
  const [showAddDep, setShowAddDep] = React.useState(false);
  const [newDep, setNewDep] = React.useState('');

  // Default date range from shoot days
  const shootDaysArr = project.shootDays || [];
  const datedDays = shootDaysArr.filter(d=>d.date).sort((a,b)=>a.date.localeCompare(b.date));
  const defaultVon = datedDays.length>0 ? datedDays[0].date : '';
  const defaultBis = datedDays.length>0 ? datedDays[datedDays.length-1].date : '';

  // All Rentals / sources
  const allSources = [...new Set(data.map(r=>r.quelle).filter(Boolean))].sort();

  // Group-level data (ladetermin, rueckgabe, tage override) stored in project.technikGruppen
  const gruppenData = project.technikGruppen || {};
  const saveGruppe = (key, patch) => onChange({...project,
    technikGruppen: {...gruppenData, [key]: {...(gruppenData[key]||{}), ...patch}}});

  // Compute auto days from vonDatum to bisDatum (inclusive)
  const autoDays = (von, bis) => {
    if (!von || !bis) return 1;
    const d1 = new Date(von), d2 = new Date(bis);
    const diff = Math.round((d2-d1)/(1000*60*60*24))+1;
    return diff > 0 ? diff : 1;
  };
  const getGruppeTage = (key, von, bis) => {
    const manual = gruppenData[key]?.tage;
    if (manual && manual.trim() !== '') return parseFloat(manual)||1;
    return autoDays(von, bis);
  };
  const allPeople = [
    ...(project.crew||[]).map(p=>p.name).filter(Boolean),
    ...(project.cast||[]).filter(p=>p.castingStatus==='besetzt'&&p.name).map(p=>p.name),
  ];

  // Budget health bars from Kalkulation (Kamera, Licht, Ton)
  const kalk = project.kalkulation || {};
  const numDays = (project.shootDays||[]).length;
  const budgetGewerke = ['Kamera','Licht','Ton'];
  const kalkBudget = gewerk => (kalk.positionen?.[gewerk]||[])
    .reduce((a,r)=>a+kalkRowTotal(r,numDays),0);
  const technikKosten = gewerk => data
    .filter(r=>r.kategorie===gewerk)
    .reduce((a,r)=>a+itemTotal(r),0);

  // Totals
  const getItemTage = r => {
    if (r.tage && r.tage.trim() !== '') return parseFloat(r.tage)||1;
    return autoDays(r.vonDatum, r.bisDatum);
  };
  const itemTotal = (r) => {
    const p = parseFloat(r.preis)||0;
    const m = parseFloat(r.menge)||1;
    return p * m * getItemTage(r);
  };
  const gesamtPreis = data.reduce((a,r)=>a+itemTotal(r), 0);
  const fmt = n => n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';

  // Filtered for list view
  const filtered = data.filter(r => {
    if (filterKat !== 'Alle' && r.kategorie !== filterKat) return false;
    if (filterText && ![r.bezeichnung,r.kategorie,r.quelle,r.notiz].some(v=>
      (v||'').toLowerCase().includes(filterText.toLowerCase()))) return false;
    return true;
  });

  // Group by source for rental view
  const bySource = React.useMemo(() => {
    const groups = {};
    data.forEach(r => {
      const quelle = r.quelle || '— Keine Quelle angegeben —';
      const zeitraum = (r.vonDatum||'')+'_'+(r.bisDatum||'');
      const key = quelle + '|||' + zeitraum;
      if (!groups[key]) groups[key] = {
        key, name: quelle,
        vonDatum: r.vonDatum||'', bisDatum: r.bisDatum||'',
        items: [], selbst: false
      };
      groups[key].items.push(r);
      if (r.selbstMitbringen) groups[key].selbst = true;
    });
    return Object.values(groups).sort((a,b) => {
      if (a.selbst && !b.selbst) return 1;
      if (!a.selbst && b.selbst) return -1;
      const nameSort = a.name.localeCompare(b.name);
      if (nameSort !== 0) return nameSort;
      return (a.vonDatum||'').localeCompare(b.vonDatum||'');
    });
  }, [data]);

  const statusColor = key => TECHNIK_STATUS.find(s=>s.key===key)?.color||'var(--c-dim)';
  const statusLabel = key => TECHNIK_STATUS.find(s=>s.key===key)?.label||key;

  const thS = {padding:'9px 8px',fontSize:10.5,fontWeight:600,color:C.dim,
    background:C.card,textAlign:'left',borderBottom:'1px solid '+C.border,whiteSpace:'nowrap'};
  const tdS = {padding:'5px 8px',verticalAlign:'middle',fontSize:12};
  const inp = (w) => ({border:'none',background:'transparent',fontSize:13,
    fontFamily:'inherit',padding:'4px 4px',outline:'none',color:C.text,
    width:w||'100%'});

  // ── Print view ──────────────────────────────────────────────────────────────
  if (printSource !== null) {
    const isAllPrint = printSource==='__all__';
    const grp = isAllPrint ? null : bySource.find(g=>g.key===printSource||g.name===printSource);
    const items = isAllPrint ? data : (grp?.items || []);
    const isSelbst = !isAllPrint && (grp?.selbst || false);
    return (
      <div>
        <button onClick={()=>setPrintSource(null)}
          style={{...S.btn(), marginBottom:16}}>
          ← Zurück
        </button>
        <button onClick={()=>window.print()}
          style={{...S.btn('primary'), marginBottom:16, marginLeft:8}}>
          🖨 Drucken
        </button>

function NavGroups({ groups, hiddenTabs, tab, setTab }) {

function GuestImport({ onClose, onAdd }) {
  const [code, setCode] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState('');
  const [fileName, setFileName] = React.useState('');
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setFileName(f.name);
    const r = new FileReader();
    r.onload = ev => { setCode(String(ev.target.result || '')); setErr(''); };
    r.onerror = () => setErr('Datei konnte nicht gelesen werden.');
    r.readAsText(f);
  };
  const submit = () => {
    const pkg = parseGuestPackage(code);
    if (!pkg) { setErr('Ungültiger Code / Datei. Bitte den kompletten Zugangs-Code einfügen.'); return; }
    if ((pkg.pw || '') !== pw) { setErr('Falsches Passwort.'); return; }
    onAdd(pkg);
  };
  const overlay = { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 9000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 };
  const panel = { background: C.card, borderRadius: 14, padding: 22, maxWidth: 440, width: '100%', maxHeight: '92vh', overflow: 'auto' };
  return (
    <div style={overlay} onClick={onClose}>
      <div style={panel} onClick={e => e.stopPropagation()}>
        <h2 style={{ ...S.h2, marginTop: 0 }}>🔒 Gastzugang hinzufügen</h2>

        </p>
        <label style={{ display: 'block', marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: C.dim, marginBottom: 4 }}>Zugangs-Code</div>
          <textarea style={{ ...S.ta, width: '100%', minHeight: 90, fontFamily: 'monospace', fontSize: 11 }}
            value={code} onChange={e => { setCode(e.target.value); setErr(''); }} placeholder="SDG1:…" />
        </label>
        <div style={{ marginBottom: 12 }}>
          <label style={{ ...S.btn(), display: 'inline-flex', cursor: 'pointer', fontSize: 12 }}>
            Datei wählen…
            <input type="file" accept=".txt,text/plain" style={{ display: 'none' }} onChange={onFile} />
          </label>
          {fileName && <span style={{ fontSize: 11, color: C.dim, marginLeft: 8 }}>{fileName}</span>}
        </div>
        <label style={{ display: 'block', marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: C.dim, marginBottom: 4 }}>Passwort</div>
          <input style={{ ...S.input, width: '100%' }} type="password" value={pw}
            onChange={e => { setPw(e.target.value); setErr(''); }}
            onKeyDown={e => { if (e.key === 'Enter') submit(); }} placeholder="Passwort" />
        </label>
        {err && <div style={{ color: C.danger, fontSize: 12, marginBottom: 10 }}>{err}</div>}
        <button style={{ ...S.btn('primary'), width: '100%', marginBottom: 8 }} onClick={submit}>Gastzugang hinzufügen</button>
        <button style={{ ...S.btn(), width: '100%' }} onClick={onClose}>Abbrechen</button>
      </div>
    </div>
  );
}

function App() {
  const [projects, setProjects] = useState(loadProjects);
  const [activeId, setActiveId] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [shotlistMode, setShotlistMode] = useState("script");
  const [showPatchnotes, setShowPatchnotes] = useState(() => {
    try { return localStorage.getItem('setdeck_last_seen_patch') !== 'v2.0.3'; }
    catch(e) { return false; }
  });
  const closePatchnotes = () => {
    try { localStorage.setItem('setdeck_last_seen_patch', 'v2.0.3'); } catch(e){}
    setShowPatchnotes(false);
  };
  const [showArchiveSidebar, setShowArchiveSidebar] = useState(false);
  const [saveStatus, setSaveStatus] = useState("gespeichert");
  const [showConsent, setShowConsent] = useState(false);
  const [showImpressum, setShowImpressum] = useState(false);
  const [showDatenschutz, setShowDatenschutz] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);

  // ── Dark Mode ───────────────────────────────────────────────────────────────
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem('setdeck_theme') || 'light'; } catch(e) { return 'light'; } });
  useEffect(() => {
    try { document.documentElement.dataset.theme = theme; localStorage.setItem('setdeck_theme', theme); } catch(e) {}
  }, [theme]);
  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  // ── Gastzugang (geräteübergreifend, als Projekt-Flag) ───────────────────────
  const [showGuestImport, setShowGuestImport] = useState(false);
  const addGuestProject = (pkg) => {
    const isCoprod = pkg.kind === 'coproducer';
    const tabs = (pkg.tabs && pkg.tabs.length) ? pkg.tabs : ['adsheet'];
    if (pkg.mode === 'live' && pkg.shareId) {
      const dup = projects.find(p => p.guestShareId === pkg.shareId);
      if (dup) { setShowGuestImport(false); setActiveId(dup.id); setTab((dup.guestTabs && dup.guestTabs[0]) || 'overview'); return; }
      const base = makeProject(pkg.name || 'Projekt');
      const gp = {
        ...base, id: 'guest-' + uid(), name: pkg.name || 'Projekt',
        __guest: !isCoprod, __coproducer: isCoprod,
        guestRole: pkg.role || (isCoprod ? 'Mitproducer' : 'Gast'),
        guestTabs: isCoprod ? undefined : tabs,
        guestCode: pkg.code || '', guestShareId: pkg.shareId, guestSyncing: true,
        archived: false, lastEdited: Date.now(),
      };
      setProjects(prev => [...prev, gp]);
      setShowGuestImport(false);
      setActiveId(gp.id);
      setTab(isCoprod ? 'overview' : (tabs[0] || 'adsheet'));
      return;
    }
    // Offline-Snapshot (alte Pakete)
    const src = pkg.project || {};
    const gp = {
      ...src, id: 'guest-' + uid(),
      __guest: !isCoprod, __coproducer: isCoprod,
      guestRole: pkg.role || (isCoprod ? 'Mitproducer' : 'Gast'),
      guestTabs: isCoprod ? undefined : tabs, guestCode: pkg.code || '',
      archived: false, lastEdited: Date.now(),
    };
    if (gp.settings) gp.settings = { ...gp.settings, guestAccess: undefined };
    setProjects(prev => [...prev, gp]);
    setShowGuestImport(false);
    setActiveId(gp.id);
    setTab(isCoprod ? 'overview' : (tabs[0] || 'adsheet'));
  };

  // Firebase Cloud Sync
  const { cloudStatus, lastCloudSync, syncToCloud, loadFromCloud,
          isSignedIn, currentUser, signIn, signOut,
          signInEmail, signUpEmail, resetPassword } = useFirebaseSync(projects, setProjects);
  useGuestSync(projects, setProjects);

  // Selbstheilung: Ein eigenes Projekt (kein guestShareId) darf keine Follower-Flags tragen
  useEffect(() => {
    setProjects(prev => {
      let changed = false;
      const next = prev.map(p => {
        if (!p.guestShareId && (p.__guest || p.__coproducer)) {
          changed = true;
          const { __guest, __coproducer, guestRole, guestTabs, guestCode, guestSyncing, ...rest } = p;
          return rest;
        }
        return p;
      });
      return changed ? next : prev;
    });
  }, []);
  const handleConsentAccept = () => { setShowConsent(false); signIn(); };

  // Auto-save to localStorage whenever projects change
  useEffect(() => {
    setSaveStatus("speichert...");
    const t = setTimeout(() => {
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        setSaveStatus("gespeichert");
        if (isSignedIn && typeof syncToCloud === "function") syncToCloud(projects);
      } catch(e) {
        setSaveStatus("fehler: " + (e.message || "Speicher voll?"));
      }
    }, 600); // debounce 600ms
    return () => clearTimeout(t);
  }, [projects]);

  const active = projects.find(p => p.id === activeId);
  _displayDateFormat = active?.settings?.displayDateFormat || 'DDMMYYYY';

  // Gastzugang: gesperrt auf erlaubte Seiten, wenn das geöffnete Projekt ein Gastprojekt ist
  const guestActive = !!active && !!active.__guest;
  const guestTabs = guestActive ? (active.guestTabs && active.guestTabs.length ? active.guestTabs : ['adsheet']) : null;
  useEffect(() => {
    if (!guestActive) return;
    if (!guestTabs.includes(tab)) setTab(guestTabs[0]);
  }, [guestActive, tab, activeId]);
  // Gefilterte Navigation für Gäste
  const guestGroups = guestActive
    ? NAV_GROUPS.map(g => ({ ...g, items: g.items.filter(it => guestTabs.includes(it.key)) })).filter(g => g.items.length)
    : null;

  // ── Undo/Redo-History (session only, max 50 states per project) ─────────
  const historyRef = React.useRef({}); // { [projectId]: { past: [...], future: [...] } }
  const [canUndo, setCanUndo] = React.useState(false);
  const [canRedo, setCanRedo] = React.useState(false);

  const getHist = id => {
    if (!historyRef.current[id]) historyRef.current[id] = { past: [], future: [] };
    return historyRef.current[id];
  };
  const syncFlags = id => {
    const h = getHist(id);
    setCanUndo(h.past.length > 0);
    setCanRedo(h.future.length > 0);
  };

  const pushHistory = React.useCallback((projectId, snapshot) => {
    const h = getHist(projectId);
    h.past = [...h.past.slice(-49), snapshot];
    h.future = []; // clear redo stack on new change
    syncFlags(projectId);
  }, []);

  const undo = React.useCallback(() => {
    if (!activeId) return;
    const h = getHist(activeId);
    if (h.past.length === 0) return;
    const prev = h.past[h.past.length - 1];
    const current = projects.find(x => x.id === activeId);
    if (current) h.future = [current, ...h.future.slice(0, 49)];
    h.past = h.past.slice(0, -1);
    syncFlags(activeId);
    setProjects(ps => ps.map(x => x.id === activeId ? prev : x));
  }, [activeId, projects]);

  const redo = React.useCallback(() => {
    if (!activeId) return;
    const h = getHist(activeId);
    if (h.future.length === 0) return;
    const next = h.future[0];

              </button>
            )) : (
              <span style={{ fontSize:10, color:"var(--c-dim)" }} title="Firebase nicht konfiguriert - nur lokale Speicherung">Lokal</span>
            ))}
          </div>
        </div>
        <div style={S.body}>

          {tab === "profil" && <Profile />}
          {tab === "dashboard" && <Dashboard projects={projects} onSelect={openProject} onNew={newProject} onDelete={delProject} onDemo={demoProject} onExport={exportProject} onImport={importProject} onArchive={archiveProject} showArchive={showArchiveSidebar} setShowArchive={setShowArchiveSidebar} isSignedIn={isSignedIn} onSignIn={() => setShowConsent(true)} firebaseReady={FIREBASE_READY} onAddGuest={() => setShowGuestImport(true)} />}
          {tab === "overview"  && active && <Overview  project={active} />}
          {tab === "settings"  && active && <Settings  project={active} onChange={updSync} />}
          {tab === "shootdays" && active && <ShootDays project={active} onChange={upd} />}
          {tab === "castcrew"  && active && <CastCrew  project={active} onChange={upd} />}
          {tab === "casting"   && active && <CastingTab project={active} onChange={upd} />}
          {tab === "catering"  && active && <Catering  project={active} onChange={upd} />}
          {tab === "locations" && active && <LocationsTab project={active} onChange={upd} />}
          {tab === "todos"     && active && <TodoTab     project={active} onChange={upd} />}
          {tab === "fahrzeuge" && active && <FahrzeugeTab project={active} onChange={upd} />}
          {tab === "unterkunft" && active && <UnterkunftTab project={active} onChange={upd} />}
          {tab === "scenes"    && active && <Scenes    project={active} onChange={upd} />}
          {tab === "shotlist"  && active && <Shotlist  project={active} onChange={upd} mode={shotlistMode} setMode={setShotlistMode} />}
          {tab === "storyboard" && active && <StoryboardTab project={active} onChange={upd} />}
          {tab === "drehplan"  && active && <Drehplan  project={active} />}
          {tab === "dispos"    && active && <Dispos    project={active} onChange={upd} />}
          {tab === "adsheet"   && active && <ADSheet    project={active} onChange={upd} />}
          {tab === "continuity" && active && <Continuity project={active} onChange={upd} />}
          {tab === "requisite"  && active && <AbteilungsListe project={active} onChange={upd} abteilung="requisite"  label="Requisite" />}
          {tab === "kostuem"    && active && <AbteilungsListe project={active} onChange={upd} abteilung="kostuem"    label="Kostüm" />}
          {tab === "maske"      && active && <AbteilungsListe project={active} onChange={upd} abteilung="maske"      label="Maske" />}
          {tab === "technik"    && active && <Technikliste   project={active} onChange={upd} />}
          {tab === "kalkulation" && active && <Kalkulation project={active} onChange={upd} />}
          {tab === "ausgaben"    && active && <Ausgaben    project={active} onChange={upd} />}
          {tab === "finanzen"    && active && <AuslagenTab project={active} onChange={upd} />}
        </div>
      </main>
    </div>
  );
}


  </script>
</body>
</html>
