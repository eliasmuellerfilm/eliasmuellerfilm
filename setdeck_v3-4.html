function UnterkunftTab({ project, onChange }) {
  const [printing, doPrint] = usePrint();
  const unterkuenfte = project.unterkuenfte || [];
  const bookings = project.unterbringungen || [];
  const upK = list => onChange({ ...project, unterkuenfte: list });
  const upB = list => onChange({ ...project, unterbringungen: list });
  const UTYPEN = ['Hotel', 'Apartment', 'Pension', 'Ferienwohnung', 'Privat', 'Sonstiges'];
  const addK = () => upK([...unterkuenfte, { id: uid(), name: '', typ: 'Hotel', adresse: '', telefon: '', kontakt: '', preis: '', zimmer: '', notiz: '' }]);
  const updK = (id, patch) => upK(unterkuenfte.map(k => k.id === id ? { ...k, ...patch } : k));
  const remK = id => { if (window.confirm('Unterkunft löschen? Belegungen bleiben erhalten, verlieren aber die Zuordnung.')) upK(unterkuenfte.filter(k => k.id !== id)); };
  const addB = (person = '', unterkunftId = '') => upB([...bookings, { id: uid(), person, unterkunftId: unterkunftId || unterkuenfte[0]?.id || '', von: '', bis: '', zimmer: '', notiz: '' }]);
  const updB = (id, patch) => upB(bookings.map(b => b.id === id ? { ...b, ...patch } : b));
  const remB = id => upB(bookings.filter(b => b.id !== id));

  // Personen-Vorschläge (Cast + Crew)
  const people = [...new Set([
    ...(project.cast || []).map(p => p.name).filter(Boolean),
    ...(project.crew || []).map(p => p.name).filter(Boolean),
  ])];

  // Farben pro Unterkunft
  const PAL = ['#3aaa35', '#1a73e8', '#e4002b', '#f4b400', '#9c27b0', '#00897b', '#ff7043', '#5e35b1'];
  const colorOf = id => { const i = unterkuenfte.findIndex(k => k.id === id); return PAL[(i < 0 ? 0 : i) % PAL.length]; };
  const kName = id => unterkuenfte.find(k => k.id === id)?.name || '—';
  const priceOf = id => parseFloat(String(unterkuenfte.find(k => k.id === id)?.preis || '').replace(',', '.')) || 0;

  // Nächte & Kosten
  const nights = b => { if (!b.von || !b.bis) return 0; const a = new Date(b.von + 'T12:00'), c = new Date(b.bis + 'T12:00'); return Math.max(0, Math.round((c - a) / 86400000)); };
  const costOf = b => nights(b) * priceOf(b.unterkunftId);
  const totalCost = bookings.reduce((s, b) => s + costOf(b), 0);
  const totalNights = bookings.reduce((s, b) => s + nights(b), 0);
  const fmtEur = n => n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

  // Offene Bedarfe aus Casting UND Crew (braucht Unterkunft, aber keine Belegung)
  const bookedPeople = [...new Set(bookings.map(b => b.person).filter(Boolean))];
  const needPeople = [
    ...(project.cast || []).filter(p => p.unterkunft === 'braucht' && p.name).map(p => p.name),
    ...(project.crew || []).filter(p => p.unterkunft === 'braucht' && p.name).map(p => p.name),
  ];
  const openNeeds = [...new Set(needPeople)].filter(n => !bookedPeople.includes(n));
  const needSet = new Set(needPeople);

  // Drehzeitraum (erster bis letzter Drehtag)
  const shootDates = (project.shootDays || []).map(d => d.date).filter(Boolean).sort();
  const shootRange = shootDates.length ? { von: shootDates[0], bis: shootDates[shootDates.length - 1] } : null;

  // Zeitleiste
  const allDates = [
    ...(project.shootDays || []).map(d => d.date),
    ...bookings.map(b => b.von), ...bookings.map(b => b.bis),
  ].filter(Boolean).sort();
  const iso = d => d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  let days = [];
  if (allDates.length) {
    const start = new Date(allDates[0] + 'T12:00'); start.setDate(start.getDate() - 1);
    const end = new Date(allDates[allDates.length - 1] + 'T12:00'); end.setDate(end.getDate() + 1);
    for (let d = new Date(start); d <= end && days.length < 90; d.setDate(d.getDate() + 1)) days.push(new Date(d));
  }
  const shootSet = new Set((project.shootDays || []).map(d => d.date));
  const timelineRows = [...bookedPeople, ...openNeeds];
  const bookingAt = (person, isoDate) => bookings.find(b => b.person === person && b.von && (b.bis ? (isoDate >= b.von && isoDate <= b.bis) : isoDate === b.von));
  const WD = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
  const monthGroups = [];
  days.forEach(d => {
    const key = d.getFullYear() + '-' + d.getMonth();
    const last = monthGroups[monthGroups.length - 1];
    if (last && last.key === key) last.span++;
    else monthGroups.push({ key, span: 1, label: d.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' }) });
  });

  const cellInp = { border: 'none', background: 'transparent', width: '100%', fontSize: 13, fontFamily: 'inherit', color: C.text, outline: 'none', padding: '5px 4px' };

  return (
    <div className={printing ? "print-root doc-a4 print-landscape" : undefined}>
      {printing && <h2 style={{ ...S.h1, fontSize: 18, marginBottom: 14 }}>Unterkunft — {project.settings.title || "Projekt"}</h2>}
      <div className="no-print" style={{ ...S.row, marginBottom: 18, flexWrap: 'wrap' }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Unterkunft</h1>
        <div style={{ flex: 1 }} />
        <button style={S.btn()} onClick={doPrint}>🖨 PDF</button>
        <button style={S.btn()} onClick={addK}><Icon name="plus" size={13} /> Unterkunft</button>
        <button style={S.btn('primary')} onClick={() => addB()}><Icon name="plus" size={13} /> Belegung</button>
      </div>

      {/* Bedarf & offene Bedarfe */}
      {(() => {
        const allPpl = [...new Set([
          ...(project.cast || []).map(p => p.name).filter(Boolean),
          ...(project.crew || []).map(p => p.name).filter(Boolean),
        ])];
        const selectable = allPpl.filter(n => !needSet.has(n) && !bookedPeople.includes(n));
        const markNeed = name => {
          if (!name) return;
          let found = false;
          const crew = (project.crew || []).map(p => { if (p.name === name) { found = true; return { ...p, unterkunft: 'braucht' }; } return p; });
          const cast = (project.cast || []).map(p => { if (p.name === name && !found) { found = true; return { ...p, unterkunft: 'braucht' }; } return p; });
          onChange({ ...project, cast, crew });
        };
        return (
          <div className="no-print" style={{ ...S.card, background: openNeeds.length ? '#fff7ed' : 'var(--c-card)', border: '1px solid ' + (openNeeds.length ? '#f3d9b8' : C.border), marginBottom: 18 }}>
            {openNeeds.length > 0 && (
              <>
                <div style={{ fontSize: 13, fontWeight: 600, color: '#9a6a1e', marginBottom: 8 }}>
                  ⚠ Braucht noch eine Unterkunft (aus Cast &amp; Crew):
                </div>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 12 }}>
                  {openNeeds.map(n => (
                    <button key={n} style={{ ...S.btn('xs'), background: "var(--c-card)", border: '1px solid #f3d9b8' }}
                      onClick={() => addB(n)}>+ {n} einbuchen</button>
                  ))}
                </div>
              </>
            )}
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
              <span style={{ fontSize: 12, color: C.dim }}>Person als „braucht Unterkunft" markieren:</span>
              <select id="uk-need-picker" style={{ ...S.input, width: 220, fontSize: 12 }} defaultValue=""
                onChange={e => { markNeed(e.target.value); e.target.value = ''; }}>
                <option value="">— Cast / Crew wählen —</option>
                {selectable.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>
        );
      })()}

      {/* Kostenübersicht */}
      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 18 }}>
        <div style={{ ...S.card, flex: 1, minWidth: 150, marginBottom: 0 }}>
          <div style={{ fontSize: 11, color: C.dim }}>Belegungen</div>
          <div style={{ fontSize: 22, fontWeight: 700 }}>{bookings.length}</div>
        </div>
        <div style={{ ...S.card, flex: 1, minWidth: 150, marginBottom: 0 }}>
          <div style={{ fontSize: 11, color: C.dim }}>Übernachtungen gesamt</div>
          <div style={{ fontSize: 22, fontWeight: 700 }}>{totalNights}</div>
        </div>
        <div style={{ ...S.card, flex: 1, minWidth: 150, marginBottom: 0 }}>
          <div style={{ fontSize: 11, color: C.dim }}>Kosten gesamt</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: '#1a8a4a' }}>{fmtEur(totalCost)}</div>
        </div>
      </div>

      {/* Unterkünfte */}
      <div style={{ ...S.ct }}>Unterkünfte</div>
      {unterkuenfte.length === 0
        ? <div className="no-print" style={{ ...S.card, color: C.dim, textAlign: 'center', padding: 30 }}>Noch keine Unterkünfte. Klicke auf „+ Unterkunft".</div>
        : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12, marginBottom: 18 }}>
            {unterkuenfte.map(k => (
              <div key={k.id} style={{ ...S.card, marginBottom: 0, borderLeft: '4px solid ' + colorOf(k.id) }}>
                <div style={{ ...S.row, marginBottom: 8 }}>
                  <input style={{ ...S.input, fontWeight: 700, fontSize: 14, flex: 1 }} value={k.name} placeholder="Name der Unterkunft…"
                    onChange={e => updK(k.id, { name: e.target.value })} />
                  <select style={{ ...S.input, width: 'auto', fontSize: 12 }} value={k.typ || 'Hotel'} onChange={e => updK(k.id, { typ: e.target.value })}>
                    {UTYPEN.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <input style={{ ...S.input, width: '100%', fontSize: 12, marginBottom: 6 }} value={k.adresse || ''} placeholder="Adresse"
                  onChange={e => updK(k.id, { adresse: e.target.value })} />
                <div style={{ display: 'flex', gap: 6, marginBottom: 6 }}>
                  <input style={{ ...S.input, flex: 1, fontSize: 12 }} value={k.kontakt || ''} placeholder="Kontakt"
                    onChange={e => updK(k.id, { kontakt: e.target.value })} />
                  <input style={{ ...S.input, flex: 1, fontSize: 12 }} value={k.telefon || ''} placeholder="Telefon"
                    onChange={e => updK(k.id, { telefon: e.target.value })} />
                </div>
                <div style={{ display: 'flex', gap: 6, marginBottom: 6 }}>
                  <label style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: C.dim, flex: 1 }}>
                    €/Nacht
                    <input style={{ ...S.input, width: '100%', fontSize: 12 }} value={k.preis || ''} placeholder="0"
                      onChange={e => updK(k.id, { preis: e.target.value })} />
                  </label>
                  <label style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: C.dim, flex: 1 }}>
                    Zimmer
                    {(() => {
                      const bk = bookings.filter(b => b.unterkunftId === k.id);
                      const rooms = [...new Set(bk.map(b => (b.zimmer || '').trim()).filter(Boolean))];
                      const txt = rooms.length ? rooms.length + ' (' + bk.length + ' Belegungen)' : (bk.length ? bk.length + ' Belegungen' : '–');
                      return <span style={{ ...S.input, width: '100%', fontSize: 12, background: 'var(--c-hover)', color: C.mid, display: 'flex', alignItems: 'center' }} title="Berechnet aus den Belegungen">{txt}</span>;
                    })()}
                  </label>
                </div>
                <input style={{ ...S.input, width: '100%', fontSize: 12, color: 'var(--c-mid)' }} value={k.notiz || ''} placeholder="Notiz"
                  onChange={e => updK(k.id, { notiz: e.target.value })} />
                <div className="no-print" style={{ textAlign: 'right', marginTop: 6 }}>
                  <span onClick={() => remK(k.id)} style={{ fontSize: 11, color: C.danger, cursor: 'pointer' }}>Löschen</span>
                </div>
              </div>
            ))}
          </div>}

      {/* Belegungen */}
      <div style={{ ...S.ct }}>Belegungen</div>
      {bookings.length === 0
        ? <div className="no-print" style={{ ...S.card, color: C.dim, textAlign: 'center', padding: 30 }}>Noch keine Belegungen. „+ Belegung" oben rechts.</div>
        : <div style={{ ...S.card, padding: 0, overflow: 'hidden', marginBottom: 18 }}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ ...S.tbl, minWidth: 820 }}>
                <thead><tr>
                  <th style={{ ...S.th, paddingLeft: 18 }}>Person</th>
                  <th style={S.th}>Unterkunft</th>
                  <th style={{ ...S.th, width: 130 }}>Von</th>
                  <th style={{ ...S.th, width: 130 }}>Bis</th>
                  <th style={{ ...S.th, width: 70 }}>Nächte</th>
                  <th style={{ ...S.th, width: 80 }}>Zimmer</th>
                  <th style={{ ...S.th, width: 90 }}>Kosten</th>
                  <th style={S.th}>Notiz</th>
                  <th style={{ ...S.th, width: 42, paddingRight: 18 }} />
                </tr></thead>
                <tbody>
                  {bookings.map(b => (
                    <tr key={b.id}>
                      <td style={{ ...S.td, paddingLeft: 18 }}>
                        <input style={{ ...cellInp, fontWeight: 600 }} value={b.person} placeholder="Name…" list="unterkunft-people"
                          onChange={e => updB(b.id, { person: e.target.value })} />
                      </td>
                      <td style={S.td}>
                        <select style={{ ...cellInp, cursor: 'pointer', color: colorOf(b.unterkunftId), fontWeight: 600 }}
                          value={b.unterkunftId || ''} onChange={e => updB(b.id, { unterkunftId: e.target.value })}>
                          <option value="">— wählen —</option>
                          {unterkuenfte.map(k => <option key={k.id} value={k.id}>{k.name || '(unbenannt)'}</option>)}
                        </select>
                      </td>
                      <td style={S.td}>
                        <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                          <input type="date" style={cellInp} value={b.von || ''} onChange={e => updB(b.id, { von: e.target.value })} />
                          {shootRange && (
                            <button className="no-print" title="Mit Drehzeitraum füllen (erster–letzter Drehtag)"
                              onClick={() => updB(b.id, { von: shootRange.von, bis: shootRange.bis })}
                              style={{ ...S.btn('xs'), padding:'2px 5px', fontSize:9, whiteSpace:'nowrap', flexShrink:0 }}>⤓ Dreh</button>
                          )}
                        </div>
                      </td>
                      <td style={S.td}><input type="date" style={cellInp} value={b.bis || ''} onChange={e => updB(b.id, { bis: e.target.value })} /></td>
                      <td style={{ ...S.td, textAlign: 'center', color: C.mid }}>{nights(b) || '–'}</td>
                      <td style={S.td}><input style={cellInp} value={b.zimmer || ''} placeholder="–" onChange={e => updB(b.id, { zimmer: e.target.value })} /></td>
                      <td style={{ ...S.td, textAlign: 'right', color: '#1a8a4a' }}>{costOf(b) ? fmtEur(costOf(b)) : '–'}</td>
                      <td style={S.td}><input style={cellInp} value={b.notiz || ''} placeholder="Notiz…" onChange={e => updB(b.id, { notiz: e.target.value })} /></td>
                      <td style={{ ...S.td, textAlign: 'center', paddingRight: 18 }}>
                        <span onClick={() => remB(b.id)} style={{ color: C.dim, cursor: 'pointer', fontSize: 16 }}>×</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <datalist id="unterkunft-people">{people.map(n => <option key={n} value={n} />)}</datalist>
          </div>}

      {/* Zeitleiste */}
      <div style={{ ...S.ct }}>Zeitleiste</div>
      {days.length === 0 || timelineRows.length === 0
        ? <div style={{ ...S.card, color: C.dim, textAlign: 'center', padding: 30 }}>Sobald Belegungen mit Datum oder Drehtage vorhanden sind, erscheint hier die Zeitleiste.</div>
        : <div style={{ ...S.card, padding: 0, overflow: 'hidden' }}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ borderCollapse: 'collapse', fontSize: 11, width: 'auto' }}>
                <thead>
                  <tr>
                    <th style={{ position: 'sticky', left: 0, background: C.card, zIndex: 2, borderBottom: '1px solid ' + C.border }} />
                    {monthGroups.map((m, i) => (
                      <th key={i} colSpan={m.span} style={{ textAlign: 'left', padding: '3px 6px', fontSize: 10, fontWeight: 700, color: C.mid, borderBottom: '1px solid ' + C.border, borderLeft: '1px solid ' + C.border, whiteSpace: 'nowrap' }}>{m.label}</th>
                    ))}
                  </tr>
                  <tr>
                    <th style={{ position: 'sticky', left: 0, background: C.card, zIndex: 2, textAlign: 'left', padding: '6px 10px', borderBottom: '1px solid ' + C.border, minWidth: 130 }}>Person</th>
                    {days.map((d, i) => {
                      const isShoot = shootSet.has(iso(d));
                      return (
                        <th key={i} style={{ width: 30, minWidth: 30, padding: '4px 0', textAlign: 'center', borderBottom: '1px solid ' + C.border, borderLeft: '1px solid ' + C.border, background: isShoot ? 'rgba(58,170,53,0.12)' : (d.getDay() === 0 || d.getDay() === 6 ? 'var(--t-neutral)' : C.card) }}>
                          <div style={{ color: C.dim, fontSize: 9 }}>{WD[d.getDay()]}</div>
                          <div style={{ fontWeight: 600 }}>{d.getDate()}</div>
                        </th>
                      );
                    })}
                  </tr>
                </thead>
                <tbody>
                  {timelineRows.map(person => (
                    <tr key={person}>
                      <td style={{ position: 'sticky', left: 0, background: C.card, zIndex: 1, padding: '4px 10px', borderBottom: '1px solid ' + C.border, fontWeight: 600, whiteSpace: 'nowrap' }}>{person}</td>
                      {days.map((d, i) => {
                        const b = bookingAt(person, iso(d));
                        const isShoot = shootSet.has(iso(d));
                        const needGap = !b && needSet.has(person) && isShoot;
                        return (
                          <td key={i} title={b ? kName(b.unterkunftId) : (needGap ? 'Unterkunft fehlt' : '')} style={{
                            width: 30, minWidth: 30, height: 24, borderBottom: '1px solid ' + C.border, borderLeft: '1px solid ' + C.border,
                            background: b ? colorOf(b.unterkunftId) : (needGap ? 'rgba(255,59,48,0.32)' : (isShoot ? 'rgba(58,170,53,0.08)' : (d.getDay() === 0 || d.getDay() === 6 ? 'var(--t-neutral)' : C.card))) }} />
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {/* Legende */}
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', padding: '10px 14px', borderTop: '1px solid ' + C.border, fontSize: 11, color: C.mid }}>
              {unterkuenfte.filter(k => bookings.some(b => b.unterkunftId === k.id)).map(k => (
                <span key={k.id} style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                  <span style={{ width: 12, height: 12, borderRadius: 3, background: colorOf(k.id) }} /> {k.name || '(unbenannt)'}
                </span>
              ))}
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                <span style={{ width: 12, height: 12, borderRadius: 3, background: 'rgba(58,170,53,0.25)' }} /> Drehtag
              </span>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
                <span style={{ width: 12, height: 12, borderRadius: 3, background: 'rgba(255,59,48,0.32)' }} /> Unterkunft fehlt
              </span>
            </div>
          </div>}
    </div>
  );
}

function FahrzeugeTab({ project, onChange }) {
  // Merge crew vehicles into fahrzeuge on mount (if not already there)
  const rawFahrzeuge = project.fahrzeuge || [];
  const crew = project.crew || [];

  // Sync: crew vehicles that have a crew-linked fahrzeug entry
  // When driver changes in Fahrzeuge, update crew.vehicle too
  const updF = newF => {
    // Also sync driver back to crew: if a crew member is driver, update their vehicle field
    let newCrew = [...crew];
    newF.forEach(f => {
      if (f.crewId) {
        newCrew = newCrew.map(p => p.id===f.crewId ? {...p, vehicle:f.name, driver:f.driver} : p);
      } else if (f.driver) {
        // Match by name
        newCrew = newCrew.map(p => p.name===f.driver ? {...p, vehicle:f.name} : p);
      }
    });
    onChange({ ...project, fahrzeuge: newF, crew: newCrew });
  };

  // Build unified fahrzeuge list: start with project.fahrzeuge,
  // then add crew vehicles not yet listed
  const crewVehicles = crew.filter(p => p.vehicle);
  const fahrzeuge = React.useMemo(() => {
    let list = [...rawFahrzeuge];
    crewVehicles.forEach(p => {
      const already = list.find(f => f.crewId===p.id || f.name===p.vehicle);
      if (!already) {
        list = [...list, { id:'crew_'+p.id, crewId:p.id, name:p.vehicle||"", type:"", plate:"", driver:p.name, seats:"", notes:"" }];
      }
    });
    return list;
  }, [rawFahrzeuge, crew]);

  const addF = () => updF([...fahrzeuge, {
    id: uid(), name: "", type: "", plate: "", driver: "", seats: "", notes: ""
  }]);
  const upd = (id, patch) => updF(fahrzeuge.map(f => f.id===id ? {...f,...patch} : f));
  const rem = id => { if(window.confirm("Fahrzeug löschen?")) updF(fahrzeuge.filter(f=>f.id!==id)); };

  // ── Kapazitätsanalyse ────────────────────────────────────────────────────
  // Alle Crew + ALLE Cast-Rollen (auch unbesetzte – brauchen später auch Transport)
  const allPeople = [
    ...(project.crew||[]).filter(p=>p.name||p.role).map(p=>({...p, _type:'crew', _cast:false, _uncast:false})),
    ...(project.cast||[]).map(p=>{
      const besetzt = p.castingStatus==='besetzt' && !!p.name;
      return {...p, _type:'cast', _cast:true, _uncast:!besetzt};
    }),
  ];
  const personLabel = p => p._uncast
    ? <span style={{ fontStyle:'italic', color:C.dim }}>{p.role||'Unbesetzte Rolle'}</span>
    : <span style={{ fontWeight:600 }}>{p.name||'—'}</span>;

  // transport field per person: 'produktion' = mit Produktion, 'selbst' = kommt selbst
  const updPerson = (personId, type, patch) => {
    if (type==='crew') {
      onChange({...project, crew:(project.crew||[]).map(p=>p.id===personId?{...p,...patch}:p)});
    } else {
      onChange({...project, cast:(project.cast||[]).map(p=>p.id===personId?{...p,...patch}:p)});
    }
  };

  const needsTransport = allPeople.filter(p=>!p.transport||p.transport==='produktion');
  const selfTransport  = allPeople.filter(p=>p.transport==='selbst');
  const totalSeats     = fahrzeuge.reduce((a,f)=>a+(parseInt(f.seats)||0),0);
  // Subtract drivers (they occupy a seat too but are already in the vehicle)
  const driverCount    = fahrzeuge.filter(f=>f.driver).length;
  const availableSeats = totalSeats - driverCount;
  const needed         = needsTransport.length - driverCount; // drivers don't need a seat
  const shortage       = needed - availableSeats;
  const passengersOf   = fid => allPeople.filter(p => p.assignedVehicle===fid && !fahrzeuge.some(f=>f.driver===p.name && f.id===fid));

  const TRANSPORT_OPTS = [
    { key:'produktion', label:'Mit Produktion' },
    { key:'selbst',     label:'Kommt selbst (Privat/Öffis)' },
  ];

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <h1 style={S.h1}>Fahrzeuge</h1>
        <button style={S.btn("primary")} onClick={addF}>+ Fahrzeug</button>
      </div>

      {/* Fahrzeug-Liste */}
      {fahrzeuge.length === 0 && (
        <div style={{ ...S.card, color:C.dim, textAlign:"center", padding:40 }}>
          Keine Fahrzeuge. Klicke auf "+ Fahrzeug" um Produktionsfahrzeuge hinzuzufügen.
        </div>
      )}
      {fahrzeuge.map(f => (
        <div key={f.id} style={{ ...S.card, marginBottom:10 }}>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <input style={{ ...S.input, flex:2, minWidth:140, fontWeight:600 }}
              value={f.name} placeholder="Fahrzeug-Bezeichnung (zB Kamera-Van)"
              onChange={e=>upd(f.id,{name:e.target.value})} />
            <input style={{ ...S.input, flex:1, minWidth:100 }}
              value={f.type} placeholder="Typ (zB Transporter)"
              onChange={e=>upd(f.id,{type:e.target.value})} />
            <input style={{ ...S.input, width:110 }}
              value={f.plate} placeholder="Kennzeichen"
              onChange={e=>upd(f.id,{plate:e.target.value})} />
            <input style={{ ...S.input, width:50 }}
              value={f.seats} placeholder="Sitze"
              onChange={e=>upd(f.id,{seats:e.target.value})} />
            <select style={{ ...S.input, width:150 }}
              value={f.driver} onChange={e=>upd(f.id,{driver:e.target.value})}>
              <option value="">— Fahrer/in —</option>
              {crew.filter(p=>p.name).sort((a,b)=>{
                const dA=(a.role||'').toLowerCase().includes('fahrer');
                const dB=(b.role||'').toLowerCase().includes('fahrer');
                return (dB?1:0)-(dA?1:0);
              }).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
            </select>
            <button style={S.btn("danger")} onClick={()=>rem(f.id)}>×</button>
          </div>
          <input style={{ ...S.input, width:"100%", marginTop:6, fontSize:11, color:"var(--c-dim)" }}
            value={f.notes} placeholder="Notizen..."
            onChange={e=>upd(f.id,{notes:e.target.value})} />
          {(() => {
            const pax = passengersOf(f.id);
            const cap = (parseInt(f.seats)||0) - (f.driver?1:0);
            return (
              <div style={{ marginTop:8, fontSize:12, color:C.mid, display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
                <span style={{ color:C.dim }}>Mitfahrer ({pax.length}{cap>0?" / "+cap:""}):</span>
                {pax.length>0 ? pax.map(p=>(
                  <span key={p.id} style={{ background:C.hover, borderRadius:980, padding:"2px 10px", fontSize:11.5 }}>
                    {p._uncast ? <span style={{ fontStyle:"italic", color:C.dim }}>{p.role||"Rolle"}</span> : p.name}
                  </span>
                )) : <span style={{ color:C.dim, fontStyle:"italic" }}>noch keine zugeordnet</span>}
                {cap>0 && pax.length>cap && (
                  <span style={{ color:"#ff3b30", fontWeight:600 }}>⚠ überbelegt</span>
                )}
              </div>
            );
          })()}
        </div>
      ))}

      {/* ── Kapazitätsanalyse ───────────────────────────────────────────── */}
      <h2 style={{...S.h2, marginTop:28}}>Kapazitätsanalyse</h2>

      {/* Status-Banner */}
      {allPeople.length > 0 && (
        <div style={{ ...S.card, marginBottom:16,
          background: shortage>0?'rgba(180,40,40,0.15)':shortage===0?'rgba(30,140,30,0.12)':'rgba(30,100,180,0.12)',
          border:'1px solid '+(shortage>0?'#ff3b30':shortage===0?'#34c759':'#d6d6eb') }}>
          <div style={{ display:'flex', gap:24, flexWrap:'wrap', alignItems:'center' }}>
            <div style={{ fontSize:13, fontWeight:700,
              color: shortage>0?'#d60c00':shortage===0?'#34c759':'#57b94f' }}>
              {shortage>0
                ? `⚠ ${shortage} Person${shortage>1?'en':''} ohne Sitzplatz`
                : shortage===0
                ? '✓ Kapazität genau ausreichend'
                : `✓ ${Math.abs(shortage)} freie Sitzplätze`}
            </div>
            <div style={{ fontSize:11, color:C.dim, display:'flex', gap:16, flexWrap:'wrap' }}>
              <span>Fahrzeuge: <strong style={{color:'var(--c-mid)'}}>{fahrzeuge.length}</strong></span>
              <span>Sitzplätze gesamt: <strong style={{color:'var(--c-mid)'}}>{totalSeats}</strong></span>
              <span>Fährt mit Produktion: <strong style={{color:'var(--c-mid)'}}>{needsTransport.length}</strong></span>
              <span>Kommt selbst: <strong style={{color:'var(--c-mid)'}}>{selfTransport.length}</strong></span>
            </div>
          </div>
        </div>
      )}

      {/* Personen-Liste mit Anreise-Option */}

// Build a display address from a location object (skips empty fields)
function locAddress(loc) {
  if (!loc) return "";
  // Support old format (loc.address) and new format (loc.street, loc.city etc)
  if (loc.street || loc.city) {
    return [loc.name, loc.street, loc.zip && loc.city ? loc.zip + " " + loc.city : (loc.zip||loc.city), loc.country, loc.extra1, loc.extra2]
      .filter(Boolean).join(", ");
  }
  return loc.address || loc.title || "";
}

// Build just the name/title part
function locTitle(loc) {
  if (!loc) return "";
  return loc.title || loc.name || "";  // loc.title = "Location-Name" field at top
}

// Resolve scene location: prefer linked location, fall back to stored copy
function resolveSceneLocation(scene, locations) {
  if (scene.locationId) {
    const loc = (locations||[]).find(l => l.id === scene.locationId);
    if (loc) return { title: locTitle(loc), address: locAddress(loc) };
  }
  return { title: scene.locationTitle||'', address: scene.locationAddress||'' };
}

// ─── Sync cast days from scene→role assignments ───────────────────────────────
function computeCastDaysFromScenes(project) {
  const { scenes, shots, shootDays, cast } = project;
  
  // Build: sceneId → set of dayIndices
  const sceneDayMap = {};
  const groups = buildGroups(shots);
  groups.forEach((group, gi) => {
    const shootDay = shootDays.find(d => d.id === group.divider?.shootDayId);
    const dayIdx = shootDay ? shootDays.indexOf(shootDay) : gi;
    group.shots.forEach(s => {
      if (s.type === 'shot' && s.scene) {
        if (!sceneDayMap[s.scene]) sceneDayMap[s.scene] = new Set();
        sceneDayMap[s.scene].add(dayIdx);
      }
    });
  });

  // Build: role → set of dayIndices (from all scenes that use that role)
  const roleDayMap = {};
  scenes.forEach(sc => {
    const roles = sc.castRoles || [];
    const days = sceneDayMap[sc.id] || new Set();
    roles.forEach(role => {
      if (!roleDayMap[role]) roleDayMap[role] = new Set();
      days.forEach(d => roleDayMap[role].add(d));
    });
  });

  // Update cast: days purely from scene assignments (auto-computed)
  const newCast = cast.map(p => {
    const autoDays = [...(roleDayMap[p.role] || [])].sort((a,b)=>a-b);
    return { ...p, days: autoDays };
  });

  return { ...project, cast: newCast };
}

  const toggle = role => onChange(selected.includes(role) ? selected.filter(r=>r!==role) : [...selected, role]);
  const label = 'Rollen auswaehlen...';
  return (

      </div>
      {open && (
        <div style={{ position:'absolute', zIndex:200, top:'100%', left:0, right:0,
          background:C.card, border:'1px solid '+C.border, borderRadius:6,
          boxShadow:'0 4px 16px rgba(0,0,0,0.4)', marginTop:2,
          maxHeight:220, overflowY:'auto' }}>
          {allRoles.length === 0 ? (
            <div style={{ padding:'10px 12px', fontSize:11, color:C.dim, fontStyle:'italic' }}>
              Noch keine Rollen angelegt.
            </div>
          ) : allRoles.map(role => {
            const checked = selected.includes(role);
            return (
              <label key={role}
                style={{ display:'flex', alignItems:'center', gap:8,
                  padding:'7px 12px', cursor:'pointer', fontSize:11,
                  background:checked?'rgba(180,140,30,0.12)':'transparent',
                  color:checked?C.accent:'var(--c-mid)',
                  borderBottom:'1px solid '+C.border }}
                onClick={e => { e.preventDefault(); toggle(role); }}>
                <span style={{ width:14, height:14, border:'1px solid '+(checked?C.accent:C.dim),
                  borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center',
                  flexShrink:0, background:checked?C.accent:'transparent',
                  fontSize:10, color:'#fff', fontWeight:700 }}>
                  {checked && '✓'}
                </span>
                {role}
              </label>
            );
          })}
          <div style={{ padding:'6px 12px', borderTop:'1px solid '+C.border, textAlign:'right' }}>
            <span onClick={() => setOpen(false)}
              style={{ fontSize:10, color:C.dim, cursor:'pointer', textDecoration:'underline' }}>
              Schliessen
            </span>
          </div>
        </div>
      )}
    </div>
  );
}


function Scenes({ project, onChange }) {
  // Auto-renumber after drag & drop
  const reorderAndRenumber = (scenes) => {
    const renumbered = scenes.map((sc, i) => ({ ...sc, number: i + 1 }));
    onChange({ ...project, scenes: renumbered });
  };
  const drag = useDrag(project.scenes, reorderAndRenumber);
  const add = () => onChange({ ...project, scenes: [...project.scenes, { id: uid(), number: project.scenes.length + 1, title: "", locationTitle: "", locationAddress: "", interior: "INT", dayNight: "TAG", synopsis: "", pages: "", vorstopp: "", notes: "", castRoles: [] }] });
  const upd = (id, patch) => { const updated = { ...project, scenes: project.scenes.map(s => s.id === id ? { ...s, ...patch } : s) }; onChange(computeCastDaysFromScenes(updated)); };
  const rem = id => onChange({ ...project, scenes: project.scenes.filter(s => s.id !== id) });
  const [open, setOpen] = React.useState({});
  const toggle = id => setOpen(o => ({ ...o, [id]: !o[id] }));
  return (
    <div>
      <div style={{ ...S.row, marginBottom: 20 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Szeneninformationen</h1>
        <button style={S.btn("primary")} onClick={add}><Icon name="plus" size={13} /> Szene</button>
      </div>
      {project.scenes.map(sc => {
        const isOpen = open[sc.id];
        const locName = (sc.locationId ? locTitle((project.locations||[]).find(l=>l.id===sc.locationId)) : null) || sc.locationTitle || "";
        return (
        <div key={sc.id} onDragOver={e => drag.onOver(e, sc.id)} onDrop={() => drag.onDrop(sc.id)} onDragEnd={drag.onEnd}
          style={{ ...S.card, marginBottom: 12, opacity: drag.over === sc.id ? 0.5 : 1 }}>
          <div style={{ ...S.row, marginBottom: isOpen ? 16 : 0, flexWrap: "wrap" }}>
            <span draggable onDragStart={() => drag.onStart(sc.id)} style={{ color: C.dim, cursor: "grab", padding: "0 4px" }}><Icon name="drag" /></span>
            <button onClick={() => toggle(sc.id)} title={isOpen?"Einklappen":"Aufklappen"}
              style={{ background:"none", border:"none", cursor:"pointer", color:C.dim, fontSize:13, padding:"0 2px", display:"flex", alignItems:"center" }}>
              <span style={{ display:"inline-block", transform:isOpen?"rotate(90deg)":"none", transition:"transform .15s" }}>▸</span>
            </button>
            <span style={{ ...S.badge, fontSize: 13, padding: "3px 10px", flexShrink: 0 }}>#{sc.number}</span>
            {isOpen ? (
              <>
                <div style={{ flex: 1 }} />
                <div style={{ display: "flex", gap: 4 }}>{["INT", "EXT"].map(v => (
                  <button key={v} style={{ ...S.btn(), background: sc.interior === v ? C.accent : "var(--c-hover)", color: sc.interior === v ? "#ffffff" : C.text, padding: "5px 14px" }} onClick={() => upd(sc.id, { interior: v })}>{v}</button>
                ))}</div>
                <select style={{ ...S.input, width: 150 }} value={sc.dayNight} onChange={e => upd(sc.id, { dayNight: e.target.value })}>
                  {TAGESZEIT_FULL.map(o => <option key={o}>{o}</option>)}
                </select>
                <button style={S.btn("danger")} onClick={() => rem(sc.id)}><Icon name="trash" size={13} /></button>
              </>
            ) : (
              <>
                <div onClick={() => toggle(sc.id)} style={{ flex: 1, cursor: "pointer", fontSize: 13, color: C.mid, minWidth: 0, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: C.dim, border: "1px solid "+C.border, borderRadius: 6, padding: "1px 7px" }}>{sc.interior} · {sc.dayNight}</span>
                  <strong style={{ color: C.text, fontWeight: 600 }}>{sc.title || "Ohne Titel"}</strong>
                  {locName ? <span>· {locName}</span> : null}
                </div>
                <button style={S.btn("danger")} onClick={() => rem(sc.id)}><Icon name="trash" size={13} /></button>
              </>
            )}
          </div>
          {isOpen && (<>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Inp label="Szenentitel" value={sc.title} onChange={v => upd(sc.id, { title: v })} />
            <FG label="Drehort (Motivname)">
              <input style={{...S.input}} list={"locs-name-"+sc.id}
                value={(sc.locationId ? locTitle((project.locations||[]).find(l=>l.id===sc.locationId)) : null) || sc.locationTitle || ""} placeholder="z.B. Max Büro"
                onChange={e => {
                  const val = e.target.value;
                  const matched = (project.locations||[]).find(l => locTitle(l) === val);
                  if (matched) {
                    upd(sc.id, { locationTitle: val, locationAddress: locAddress(matched), locationId: matched.id });
                  } else {
                    upd(sc.id, { locationTitle: val, locationId: null });
                  }
                }}
                onBlur={e => {
                  const val = e.target.value.trim();
                  if (!val) return;
                  const already = (project.locations||[]).find(l => locTitle(l) === val);
                  if (!already) {
                    const newLoc = { id: uid(), title: val, name:"", street:"", zip:"", city:"", country:"", extra1:"", extra2:"", status:"offen", sections:[{id:uid(),title:"Ansicht",photos:[]}], notes:"" };
                    onChange({ ...project,
                      scenes: project.scenes.map(s => s.id===sc.id ? {...s, locationTitle:val, locationId:newLoc.id} : s),
                      locations: [...(project.locations||[]), newLoc] });
                  }
                }}
              />
              <datalist id={"locs-name-"+sc.id}>
                {(project.locations||[]).map(l => <option key={l.id} value={locTitle(l)||locAddress(l)} />)}
              </datalist>
            </FG>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 16 }}>
            <FG label="Location (Adresse)">
              <input style={{...S.input}}
                value={(sc.locationId ? locAddress((project.locations||[]).find(l=>l.id===sc.locationId)) : null) || sc.locationAddress || ""} placeholder="Wird automatisch übernommen..."
                onChange={e => upd(sc.id, { locationAddress: e.target.value })} />
            </FG>
            <Inp label="Seiten" value={sc.pages} onChange={v => upd(sc.id, { pages: v })} placeholder="2 3/8" />
            <Inp label="Vorstopp" value={sc.vorstopp} onChange={v => upd(sc.id, { vorstopp: v })} placeholder="14:00" tip="Bis wann?" />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <FG label="Synopsis"><textarea style={{ ...S.ta, minHeight: 60 }} rows={2} value={sc.synopsis} placeholder="Kurze Inhaltsangabe..." onChange={e => upd(sc.id, { synopsis: e.target.value })} /></FG>
            <FG label="Notizen"><textarea style={{ ...S.ta, minHeight: 60 }} rows={2} value={sc.notes} placeholder="Interne Notizen..." onChange={e => upd(sc.id, { notes: e.target.value })} /></FG>
          </div>

          {/* Rollen: Dropdown-Mehrfachauswahl + Anzeige-Liste */}
          <div style={{ marginTop: 6, paddingTop: 16, borderTop: "1px solid "+C.border,
            display: "flex", gap: 16, alignItems: "flex-start" }}>
            <div style={{ flex: "0 0 200px" }}>
              <label style={S.lbl}>Rollen in dieser Szene</label>
              <RollenDropdown
                allRoles={[...new Set((project.cast||[]).filter(p=>p.role).map(p=>p.role))]}
                selected={sc.castRoles||[]}
                onChange={roles => upd(sc.id, {castRoles:roles})}
              />
            </div>
            {(sc.castRoles||[]).length > 0 && (
              <div style={{ flex:1 }}>
                <div style={{ fontSize:12, color:C.dim, marginBottom:6, fontWeight:600 }}>Besetzung:</div>
                {(() => {
                  const allR = [...new Set((project.cast||[]).map(p=>p.role).filter(Boolean))];
                  return allR.filter(r=>(sc.castRoles||[]).includes(r)).map(role => {
                    const num = allR.indexOf(role)+1;
                    return <div key={role} style={{fontSize:12,color:"var(--c-mid)",lineHeight:1.7}}><span style={{color:C.dim}}>{num} – </span>{role}</div>;
                  });
                })()}
              </div>
            )}
          </div>
          </>)}
        </div>
        );
      })}
      {!project.scenes.length && <div style={{ color: C.dim, textAlign: "center", padding: 40 }}>Noch keine Szenen.</div>}
    </div>
  );
}

function Equipment({ project, onChange }) {
  const upd = (cat, list) => onChange({ ...project, equipment: { ...project.equipment, [cat]: list } });
  const add = cat => upd(cat, [...(project.equipment[cat] || []), { id: uid(), name: "", notes: "" }]);
  const set = (cat, id, patch) => upd(cat, project.equipment[cat].map(x => x.id === id ? { ...x, ...patch } : x));
  const rem = (cat, id) => upd(cat, project.equipment[cat].filter(x => x.id !== id));
  const cats = [{ key: "cameras", label: "Kameras", ph: "z.B. ARRI ALEXA Mini LF" }, { key: "lenses", label: "Optiken", ph: "z.B. Zeiss Supreme 35mm" }, { key: "other", label: "Sonstiges", ph: "z.B. DJI RS4 Gimbal" }];
  return (
    <div>
      <h1 style={S.h1}>Technisches Equipment</h1>
      {cats.map(({ key, label, ph }) => (
        <div key={key} style={S.card}>
          <div style={{ ...S.row, marginBottom: 12 }}>
            <span style={{ ...S.ct, marginBottom: 0 }}>{label}</span>
            <button style={S.btn()} onClick={() => add(key)}><Icon name="plus" size={13} /> Hinzufuegen</button>
          </div>
          {(project.equipment[key] || []).map(item => (
            <div key={item.id} style={{ ...S.row, marginBottom: 8 }}>
              <input style={{ ...S.input, flex: 2 }} value={item.name} placeholder={ph} onChange={e => set(key, item.id, { name: e.target.value })} />
              <input style={{ ...S.input, flex: 1 }} value={item.notes} placeholder="Anmerkungen" onChange={e => set(key, item.id, { notes: e.target.value })} />
              <button style={S.btn("danger")} onClick={() => rem(key, item.id)}><Icon name="trash" size={13} /></button>
            </div>
          ))}
          {!(project.equipment[key] || []).length && <div style={{ color: C.dim, fontSize: 11 }}>Noch kein Eintrag.</div>}
        </div>
      ))}
    </div>
  );
}

// ─── Shotlist ─────────────────────────────────────────────────────────────────
// ─── Shotlist PDF Export ──────────────────────────────────────────────────────
async function exportShotlistPdf(project, mode, visibleCols, timeMap, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const pS = pdfSafe;
    const now = new Date();
    const standStr = 'Stand: '+pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());

    // A4 Querformat
    const W=297, H=210, ML=10, MR=10, MT=10, MB=8, CW=W-ML-MR;
    const pagesArr=[];
    let curPage={lines:[]};
    const addPage=()=>{pagesArr.push(curPage);curPage={lines:[]};};
    let y=MT;
    const getY=()=>y; const setY=v=>{y=v;}; const addY=d=>{y+=d;};
    const checkY=need=>{if(y+need>H-MB){addPage();y=MT+14;}};
    const txt=(s,x,yy,sz,bold,rgb,align)=>curPage.lines.push({type:'text',text:pS(s||''),x,y:yy,size:sz||8,bold:!!bold,rgb:rgb||[40,40,40],align:align||'left'});
    const rct=(x,yy,w,h2,rgb)=>curPage.lines.push({type:'rect',x,y:yy,w,h:h2,rgb:rgb||[240,240,240]});
    const ln=(x1,y1,x2,y2,lw,rgb)=>curPage.lines.push({type:'line',x1,y1,x2,y2,lineWidth:lw||0.3,rgb:rgb||[180,180,180]});

    const BLK=[0,0,0],WHT=[255,255,255],GRY=[130,130,130],LGY=[220,220,220];
    const DGY=[50,50,50],BG1=[248,248,248],HDR=[28,28,38],ACC=[200,140,30];
    const vc=visibleCols||{};
    const showCol=k=>vc[k]!==false;

    // Spalten (ohne 'scene' und 'shotNum' - werden durch klappe ersetzt)
    const allCols=[
      {key:'klappe',  label:'Klappe',   w:20, always:true},
      {key:'description',label:'Beschreibung',w:0}, // flex
      {key:'camera',  label:'Kamera',   w:25},
      {key:'lens',    label:'Objektiv', w:25},
      {key:'sonstiges',label:'Sonstiges',w:22},
      {key:'setup',   label:'Aufbau',   w:14},
      {key:'shoot',   label:'Dreh',     w:14},
      {key:'time',    label:'Zeitfenster',w:26},
      {key:'storyboard',label:'Storyboard',w:28},
      {key:'onLocation',label:'On Loc.',w:28},
      {key:'referenz', label:'Referenz', w:28},
      {key:'notes',   label:'Notizen',  w:28},
    ];
    const visCols=allCols.filter(col=>col.always||showCol(col.key));
    const fixedW=visCols.filter(col=>col.key!=='description').reduce((a,col)=>a+col.w,0);
    const descCol=visCols.find(col=>col.key==='description');
    if(descCol) descCol.w=Math.max(18,CW-fixedW);

    // Shots sortieren - WICHTIG: korrekte Reihenfolge
    const allShots=[...project.shots];
    let shots;
    if(mode==='script'){
      shots=allShots.filter(s=>s.type==='shot').sort((a,b)=>{
        const sa=project.scenes.find(sc=>sc.id===a.scene);
        const sb=project.scenes.find(sc=>sc.id===b.scene);
        const na=sa?(sa.number||0):999, nb=sb?(sb.number||0):999;
        if(na!==nb)return na-nb;
        return parseInt(a.shotNum||0)-parseInt(b.shotNum||0);
      });
    } else {
      // Drehreihenfolge: alle Shots UND Divider nach shootOrder sortieren
      shots=allShots.sort((a,b)=>(a.shootOrder??0)-(b.shootOrder??0));
    }

    // Hilfsfunktion: Text umbrechen
    const wrapTxt=(text,maxW,sz)=>{
      if(!text)return[''];
      // charW in mm: sz is in pt, 1pt ≈ 0.353mm, chars are ~0.5pt wide per pt size
      const charW=(sz||8)*0.353*0.55;
      const maxC=Math.max(1,Math.floor(maxW/charW));
      const words=text.split(' ');
      const lines=[];let line='';
      words.forEach(w=>{
        const candidate=(line?line+' ':'')+w;
        if(candidate.length<=maxC){line=candidate;}
        else{if(line)lines.push(line);line=w.slice(0,maxC);}
      });
      if(line)lines.push(line);
      return lines.length?lines:[''];
    };

    // Seiten-Header zeichnen
    const drawPageHdr=()=>{
      rct(ML,MT,CW,12,HDR);
      // Titel + Modus zentriert in der Mitte
      txt(pS(st.title||'')+' – '+(mode==='script'?'Spielreihenfolge':'Drehreihenfolge'),ML+CW/2,MT+7.5,10,true,WHT,'center');
      // Stand-Stamp rechts oben (klein)
      txt(standStr,W-MR-2,MT+4,6,false,[160,150,130],'right');
      if(st.logo&&st.logoHex){
        try{
          const slHex=JSON.parse(st.logoHex);
          const slH=8;
          const slW=Math.round(slH*(slHex.ratio||2));
          curPage.lines.push({type:'image',hexData:slHex.hexData,alphaData:slHex.alphaHex||null,pxW:slHex.pxW,pxH:slHex.pxH,
            x:ML+1,y:MT+1,w:slW,h:slH});
        }catch(e){txt(pS(st.company||''),ML+2,MT+9,7.5,true,WHT);}
      } else if(st.company){
        txt(pS(st.company),ML+2,MT+9,7.5,true,WHT);
      }
      y=MT+14;
    };
    drawPageHdr();

    // Spalten-Header
    const drawColHdr=()=>{
      rct(ML,y,CW,7,[40,40,55]);
      let hx=ML;
      visCols.forEach(col=>{
        txt(col.label,hx+1.5,y+5,6.5,true,[200,190,160]);
        hx+=col.w;
        if(hx<W-MR)ln(hx,y,hx,y+7,0.2,[80,80,100]);
      });
      addY(8);
    };
    drawColHdr();

    let lastScene=null;

    shots.forEach((s,si)=>{
      if(s.type==='divider'){
        checkY(8);
        const DS={
          day:     {bg:[20,28,48],  fc:[140,180,240],h:8},
          lunch:   {bg:[210,235,210],fc:[30,100,30],  h:6},
          break:   {bg:[240,230,210],fc:[100,70,20],  h:6},
          location:{bg:[230,215,235],fc:[80,40,100],  h:6},
          setup:   {bg:[215,220,240],fc:[40,55,110],  h:6},
          custom:  {bg:[225,225,225],fc:[60,60,60],   h:6},
        };
        const ds=DS[s.dividerType]||DS.custom;
        rct(ML,y,CW,ds.h,ds.bg);
        let divTxt='';
        if(s.dividerType==='day'){
          const di=project.shootDays.findIndex(d=>d.id===s.shootDayId);
          const d=project.shootDays[di];
          divTxt=(di>=0?di+1+'. DREHTAG':' DREHTAG')+(d?.date?' - '+d.date:'')+(s.callTime?' | Call: '+s.callTime:'');
          // Drehschluss berechnen fuer diesen Drehtag
          const dayShots=allShots.filter(sh=>sh.type==='shot'&&allShots.some((div,k)=>{
            if(div.type!=='divider'||div.dividerType!=='day'||div.shootDayId!==s.shootDayId)return false;
            const divIdx=allShots.indexOf(div);
            const nextDivIdx=allShots.findIndex((x,k2)=>k2>divIdx&&x.type==='divider'&&x.dividerType==='day');
            const shIdx=allShots.indexOf(sh);
            return shIdx>divIdx&&(nextDivIdx<0||shIdx<nextDivIdx);
          }));
          const dayMin=dayShots.reduce((a,sh)=>a+(sh.setupMin||0)+(sh.shootMin||0),0);
          const lunchMin2=allShots.filter(sh=>sh.type==='divider'&&sh.dividerType==='lunch').reduce((a,sh)=>a+(sh.durationMin||45),0);
          if(s.callTime&&dayMin>0){
            const [ch,cm]=s.callTime.split(':').map(Number);
            const endMin=(ch*60+(cm||0))+dayMin+lunchMin2;
            divTxt+=' | Drehschluss: '+pad(Math.floor(endMin/60)%24)+':'+pad(endMin%60);
          }
        } else {
          const typeNames={lunch:'MITTAGSPAUSE',break:'PAUSE',location:'MOTIVWECHSEL',setup:'UMBAU'};
          divTxt=(typeNames[s.dividerType]||s.dividerType.toUpperCase())+(s.label?' - '+s.label:'');
        }
        txt(pS(divTxt),ML+3,y+(ds.h*0.72),s.dividerType==='day'?8.5:7.5,true,ds.fc);
        if(s.dividerType!=='day'){
          const tm2=timeMap&&timeMap[s.id];
          const tmStr2 = tm2 ? tm2.start+'-'+tm2.end : (s.start||'');
          if(tmStr2) txt(pS(tmStr2),W-MR-2,y+(ds.h*0.72),7.5,true,ds.fc,'right');
        }
        addY(ds.h+1);
        return;
      }

      const sc=project.scenes.find(x=>x.id===s.scene);
      const klappeStr=sc?(sc.number+'.'+(s.shotNum||'?')):('?.'+(s.shotNum||'?'));

      // Szenen-Banner (nur Spielreihenfolge)
      if(mode==='script'&&sc&&sc.id!==lastScene){
        lastScene=sc.id;
        checkY(7);
        rct(ML,y,CW,6,[24,24,38]);
        txt(pS('#'+sc.number+' '+sc.title+' - '+(sc.interior||'')+'. '+(sc.locationTitle||'')),ML+3,y+4.2,8,true,[180,170,150]);
        addY(7);
      }

      // Zeilenhöhe aus Inhalt berechnen
      const descW=descCol?descCol.w-3:40;
      const descLines=wrapTxt(pS(s.description||''),descW,7.5);
      const notesLines=wrapTxt(pS(s.notes||''),24,7);
      const camLines=wrapTxt(pS(s.camera||''),22,7);
      const lensLines=wrapTxt(pS(s.lens||''),22,7);
      const sonstLines=wrapTxt(pS((Array.isArray(s.sonstigesEquip)?s.sonstigesEquip:[s.sonstigesEquip].filter(Boolean)).join(', ')),19,7);
      const maxLines=Math.max(descLines.length,notesLines.length,camLines.length,lensLines.length,sonstLines.length);
      const hasSB=(s.storyboard&&showCol('storyboard'))||(s.onLocation&&showCol('onLocation'))||(s.referenz&&showCol('referenz'));
      const sbH=hasSB?18:0;
      const rowH=Math.max(7,maxLines*3.8+3,sbH+2);

      checkY(rowH);
      rct(ML,y,CW,rowH,si%2===0?WHT:BG1);
      ln(ML,y+rowH,W-MR,y+rowH,0.2,LGY);

      let cx=ML;
      visCols.forEach(col=>{
        const cy=y+4;
        switch(col.key){
          case 'klappe': txt(klappeStr,cx+1.5,cy,8.5,true,BLK); break;
          case 'description':
            descLines.forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7.5,false,DGY));
            break;
          case 'camera': wrapTxt(pS(s.camera||''),col.w-3,7).forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,DGY)); break;
          case 'lens':   wrapTxt(pS(s.lens||''),col.w-3,7).forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,DGY)); break;
          case 'sonstiges': wrapTxt(pS((Array.isArray(s.sonstigesEquip)?s.sonstigesEquip:[s.sonstigesEquip].filter(Boolean)).join(', ')),col.w-3,7).forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,DGY)); break;
          case 'setup': txt((s.setupMin||0)+'m',cx+1.5,cy,7.5,false,DGY); break;
          case 'shoot': txt((s.shootMin||0)+'m',cx+1.5,cy,7.5,false,DGY); break;
          case 'time': {
            const tm=timeMap&&timeMap[s.id];
            if(tm)txt(tm.start+'-'+tm.end,cx+1.5,cy,7,false,DGY);
            break;
          }
          case 'storyboard':
            if(hasSB){
              curPage.lines.push({type:'image',data:s.storyboard,x:cx+1,y:y+1,w:col.w-2,h:rowH-2});
            }
            break;
          case 'onLocation':
            if(s.onLocation){ curPage.lines.push({type:'image',data:s.onLocation,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'referenz':
            if(s.referenz){ curPage.lines.push({type:'image',data:s.referenz,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'onLocation':
            if(s.onLocation){ curPage.lines.push({type:'image',data:s.onLocation,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'referenz':
            if(s.referenz){ curPage.lines.push({type:'image',data:s.referenz,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'notes': notesLines.forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,GRY)); break;
        }
        cx+=col.w;
        if(cx<W-MR)ln(cx,y,cx,y+rowH,0.2,LGY);
      });
      addY(rowH);
    });

    pagesArr.push(curPage);
    // Pre-process images: resize via canvas to get small JPEG data
    // This allows us to embed them in PDF
    // Convert storyboard images to PDF-embeddable format using canvas
    // Async image processing: load all storyboard images, convert to hex, then build PDF
    const processImagesAndBuild = async (buildFn) => {
      const imgLines = pagesArr.flatMap(p=>p.lines.filter(l=>l.type==='image'&&l.data));
      if (imgLines.length > 0) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        for (const l of imgLines) {
          try {
            // 150 DPI: 1mm = 5.91px (2.83pt * 150/72) — good balance of quality vs size
            const dpiScale = 5.91;
            const pw = Math.max(20, Math.round(l.w * dpiScale));
            const ph = Math.max(20, Math.round(l.h * dpiScale));
            canvas.width = pw; canvas.height = ph;
            ctx.clearRect(0,0,pw,ph); // preserve alpha for SMask
            const img = new window.Image();
            img.src = l.data;
            // Wait for image to fully load (crucial for data URLs)
            if (!img.complete) {
              await new Promise((res, rej) => { img.onload=res; img.onerror=res; setTimeout(res,2000); });
            }
            // Try createImageBitmap for better reliability, fallback to img
            let source = img;
            try {
              if (typeof createImageBitmap !== 'undefined' && img.naturalWidth > 0) {
                source = await createImageBitmap(img);
              }
            } catch(e) {}
            if (img.naturalWidth > 0) ctx.drawImage(source, 0, 0, pw, ph);
            const imgData = ctx.getImageData(0,0,pw,ph);
            let hexData = ''; let alphaData = '';
            for (let i=0; i<imgData.data.length; i+=4) {
              hexData += ('0'+imgData.data[i].toString(16)).slice(-2);
              hexData += ('0'+imgData.data[i+1].toString(16)).slice(-2);
              hexData += ('0'+imgData.data[i+2].toString(16)).slice(-2);
              alphaData += ('0'+imgData.data[i+3].toString(16)).slice(-2);
            }
            hexData += '>'; alphaData += '>';
            l.hexData = hexData; l.alphaData = alphaData; l.pxW = pw; l.pxH = ph;
          } catch(e) { console.warn('Image error:', e); }
        }
      }
      return buildFn();
    };
    const pdfStr = await processImagesAndBuild(() => buildPdf(pagesArr,{landscape:true}));
        const slModus2 = mode==='script'?'Spielreihenfolge':'Drehreihenfolge';
    const slNaming2 = st.exportNaming||{};
    const slPattern2 = slNaming2.shotlist || (slNaming2.shotlistParts||['{titel}','_','Shotlist','_','{modus}']).join('');
    const slName2 = resolveExportName(slPattern2, {titel:st.title||project.name||'Shotlist', modus:slModus2, dateFormat: (st.exportNaming||{}).dateFormat});
    openPdf(pdfStr, slName2+'.pdf');
  } catch(e){
    console.error('Shotlist PDF error:',e);
    alert('Shotlist-PDF Fehler:\n'+e.message+'\n'+(e.stack||''));
  } finally {
    if(setExporting)setExporting(false);
  }
}
