  <div id="loading">

  <script>
    // Progress indicator
    const fill = document.getElementById('loading-fill');
    const loadText = document.getElementById('loading-text');
    let progress = 0;
    const tick = setInterval(() => {
      progress = Math.min(progress + Math.random() * 8, 85);
      fill.style.width = progress + '%';
    }, 200);

    function showError(msg) {
      clearInterval(tick);
      document.getElementById('loading').style.display = 'none';
      const eb = document.getElementById('error-box');
      eb.style.display = 'block';
      eb.textContent = 'Ladefehler:\n\n' + msg + '\n\nBitte Seite neu laden oder Browser-Console pruefen.';
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Konnte nicht laden: ' + src));
        document.head.appendChild(s);
      });
    }

    async function bootstrap() {
      try {
        loadText.textContent = 'Lade React...';
        await loadScript('https://unpkg.com/react@18.3.1/umd/react.production.min.js');
        fill.style.width = '30%';
        
        await loadScript('https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js');
        fill.style.width = '50%';
        loadText.textContent = 'Lade Compiler...';

        await loadScript('https://unpkg.com/@babel/standalone@7.23.10/babel.min.js');
        fill.style.width = '80%';
        loadText.textContent = 'Starte App...';

        // Register presets
        Babel.registerPreset('custom', {
          presets: [
            [Babel.availablePresets['react']],
            [Babel.availablePresets['env'], { targets: { browsers: ['last 2 versions'] }, modules: false }]
          ]
        });

        // Transform the app code
        const appCode = document.getElementById('app-source').textContent;
        let transformed;
        try {
          transformed = Babel.transform(appCode, {
            presets: ['custom'],
            filename: 'App.jsx'
          }).code;
        } catch(e) {
          throw new Error('JSX Kompilierungsfehler: ' + e.message);
        }

        // Execute
        const fn = new Function('React', 'ReactDOM', transformed + '\nreturn App;');
        const App = fn(React, ReactDOM);

        // Fehler-Grenze: zeigt Fehler im Klartext statt weißem Bildschirm
        class __ErrBoundary extends React.Component {
          constructor(p){ super(p); this.state = { err: null }; }
          static getDerivedStateFromError(err){ return { err }; }
          componentDidCatch(err, info){ console.error('Setdeck App-Fehler:', err, info); }
          render(){
            if (this.state.err){
              const e = this.state.err;
              return React.createElement('div', { style:{ position:'fixed', inset:0, background:'#15171c', color:'#e9eaec', fontFamily:'system-ui,sans-serif', padding:'28px', overflow:'auto', zIndex:99999 } }, [
                React.createElement('h2', { key:'h', style:{ color:'#ff6258', marginTop:0 } }, 'Es ist ein Fehler aufgetreten'),
                React.createElement('p', { key:'p', style:{ color:'#aab1ba', fontSize:14 } }, 'Bitte mach einen Screenshot dieser Meldung – damit lässt sich die Ursache genau finden.'),
                React.createElement('pre', { key:'m', style:{ whiteSpace:'pre-wrap', wordBreak:'break-word', background:'#1e2228', border:'1px solid #343a44', borderRadius:8, padding:'14px', fontSize:12, color:'#ffb3ad' } }, String(e && e.message || e) + '\n\n' + String(e && e.stack || '')),
                React.createElement('button', { key:'b', onClick:()=>location.reload(), style:{ marginTop:14, background:'#4cb648', color:'#fff', border:'none', borderRadius:6, padding:'10px 18px', fontSize:14, cursor:'pointer' } }, 'Neu laden')
              ]);
            }
            return this.props.children;
          }
        }

        fill.style.width = '100%';
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
          ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(__ErrBoundary, null, React.createElement(App))
          );
        }, 200);

      } catch(e) {
        showError(e.message + (e.stack ? '\n' + e.stack : ''));
      }
    }

    bootstrap();
  </script>

  <!-- App source (not executed directly, transformed by Babel above) -->
  <script id="app-source" type="text/plain">
    const { useState, useCallback, useRef, useEffect } = React;

    // ─── Globale Hilfsfunktionen ──────────────────────────────────────────────
    const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const pad = n => String(Math.floor(n)).padStart(2, "0");
    const WEEKDAYS = ["So","Mo","Di","Mi","Do","Fr","Sa"];



    // ─── Firebase Config ─────────────────────────────────────────────────────
    // HIER deine Firebase-Konfiguration eintragen (nach dem Setup unten)
    const FIREBASE_CONFIG = {
      apiKey:            window.FIREBASE_API_KEY            || "",
      authDomain:        window.FIREBASE_AUTH_DOMAIN        || "",
      projectId:         window.FIREBASE_PROJECT_ID         || "",
      storageBucket:     window.FIREBASE_STORAGE_BUCKET     || "",
      messagingSenderId: window.FIREBASE_MESSAGING_SENDER_ID|| "",
      appId:             window.FIREBASE_APP_ID             || "",
    };
    const FIREBASE_READY = Object.values(FIREBASE_CONFIG).every(v => v !== "");

    // ─── Consent / Einwilligung ───────────────────────────────────────────────
    function ConsentScreen({ onAccept, onSignInEmail, onSignUpEmail, onResetPassword, onShowDatenschutz, onShowImpressum }) {
      const [authMode, setAuthMode] = React.useState("google"); // "google"|"email"
      const [emailMode, setEmailMode] = React.useState("signin"); // "signin"|"signup"|"reset"
      const [email, setEmail] = React.useState("");
      const [password, setPassword] = React.useState("");
      const [error, setError] = React.useState("");
      const [msg, setMsg] = React.useState("");
      const [loading, setLoading] = React.useState(false);

      const errMap = {
        "auth/user-not-found": "Kein Konto mit dieser E-Mail-Adresse gefunden.",
        "auth/wrong-password": "Falsches Passwort.",
        "auth/email-already-in-use": "Diese E-Mail-Adresse wird bereits verwendet.",
        "auth/weak-password": "Das Passwort muss mindestens 6 Zeichen lang sein.",
        "auth/invalid-email": "Ungültige E-Mail-Adresse.",
        "auth/invalid-credential": "E-Mail oder Passwort falsch.",
        "not-ready": "Bitte warten — App lädt noch.",
      };

      const handleEmailSubmit = async () => {
        setError(""); setMsg(""); setLoading(true);
        if (emailMode === "reset") {
          const r = await onResetPassword(email);
          setLoading(false);
          if (r === "ok") { setMsg("Zurücksetzungs-E-Mail gesendet!"); }
          else { setError(errMap[r] || "Fehler: " + r); }
          return;
        }
        const fn = emailMode === "signup" ? onSignUpEmail : onSignInEmail;
        const r = await fn(email, password);
        setLoading(false);
        if (r) setError(errMap[r] || "Fehler: " + r);
      };

      const inp = { width:"100%", background:"var(--c-card)", border:"1px solid var(--c-border)",
        borderRadius:4, color:"var(--c-text)", fontSize:12, padding:"8px 10px",
        fontFamily:SF, outline:"none",
        boxSizing:"border-box" };

      return (
        <div style={{
          position:"fixed", inset:0, background:"var(--c-card)", display:"flex",
          alignItems:"center", justifyContent:"center", zIndex:9999, padding:24
        }}>
          <div style={{
            background:"var(--c-card)", border:"1px solid var(--c-border)", borderRadius:10,
            padding:"36px 40px", maxWidth:480, width:"100%", fontFamily:SF
          }}>
            <div style={{ fontSize:24, fontWeight:800, marginBottom:20, letterSpacing:"-0.01em" }}>
              <span style={{ color:"var(--c-text)" }}>set</span><span style={{ color:"#3aaa35" }}>deck</span>
            </div>

            {/* Auth mode toggle */}
            <div style={{ display:"flex", gap:0, marginBottom:20, borderRadius:6, overflow:"hidden",
              border:"1px solid var(--c-border)" }}>
              {[["google","Google-Konto"],["email","E-Mail & Passwort"]].map(([k,l])=>(
                <button key={k} onClick={()=>{setAuthMode(k);setError("");setMsg("");}}
                  style={{ flex:1, padding:"8px 0", fontSize:11, cursor:"pointer",
                    background:authMode===k?"var(--c-border)":"transparent",
                    color:authMode===k?"#3aaa35":"var(--c-dim)", border:"none",
                    fontFamily:"inherit", fontWeight:authMode===k?700:400 }}>
                  {l}
                </button>
              ))}
            </div>

            {/* Datenschutz-Hinweis */}
            <div style={{ fontSize:11, color:"var(--c-dim)", marginBottom:16, lineHeight:1.8,
              background:"var(--t-neutral)", borderRadius:6, padding:"10px 14px",
              border:"1px solid var(--c-border)" }}>
              Deine Projektdaten werden bei <strong style={{color:"var(--c-mid)"}}>Google Firebase</strong> (Google LLC, USA) gespeichert und zwischen deinen Geräten synchronisiert.{" "}
              <a href="https://firebase.google.com/support/privacy" target="_blank"
                rel="noopener" style={{color:"#3aaa35"}}>Firebase-Datenschutz</a>
            </div>

            {/* Google auth */}
            {authMode === "google" && (
              <button onClick={onAccept} style={{
                width:"100%", background:"#3aaa35", color:"#ffffff", border:"none", borderRadius:5,
                padding:"10px 24px", fontSize:13, fontFamily:"inherit", fontWeight:700,
                cursor:"pointer", marginBottom:8
              }}>
                Einverstanden &amp; mit Google anmelden
              </button>
            )}

            {/* Email auth */}
            {authMode === "email" && (
              <div>
                <div style={{ display:"flex", gap:0, marginBottom:14, borderRadius:4,
                  overflow:"hidden", border:"1px solid var(--c-border)" }}>
                  {[["signin","Anmelden"],["signup","Registrieren"],["reset","Passwort zurücksetzen"]].map(([k,l])=>(
                    <button key={k} onClick={()=>{setEmailMode(k);setError("");setMsg("");}}
                      style={{ flex:1, padding:"6px 0", fontSize:10, cursor:"pointer",
                        background:emailMode===k?"var(--c-border)":"transparent",
                        color:emailMode===k?"#3aaa35":"var(--c-dim)", border:"none",
                        fontFamily:"inherit", fontWeight:emailMode===k?700:400 }}>
                      {l}
                    </button>
                  ))}
                </div>
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:10, color:"var(--c-dim)", marginBottom:4 }}>E-Mail</div>
                  <input style={inp} type="email" value={email} placeholder="name@beispiel.de"
                    onChange={e=>{setEmail(e.target.value);setError("");}}
                    onKeyDown={e=>e.key==="Enter"&&handleEmailSubmit()}/>
                </div>
                {emailMode !== "reset" && (
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:10, color:"var(--c-dim)", marginBottom:4 }}>Passwort</div>
                    <input style={inp} type="password" value={password} placeholder="Passwort"
                      onChange={e=>{setPassword(e.target.value);setError("");}}
                      onKeyDown={e=>e.key==="Enter"&&handleEmailSubmit()}/>
                  </div>
                )}
                {error && <div style={{ fontSize:11, color:"#d60c00", marginBottom:10 }}>{error}</div>}
                {msg && <div style={{ fontSize:11, color:"#8f8", marginBottom:10 }}>{msg}</div>}
                <button onClick={handleEmailSubmit} disabled={loading} style={{
                  width:"100%", background:"#3aaa35", color:"#ffffff", border:"none", borderRadius:5,
                  padding:"10px 24px", fontSize:13, fontFamily:"inherit", fontWeight:700,
                  cursor:loading?"wait":"pointer", marginBottom:8, opacity:loading?0.7:1
                }}>
                  {loading ? "…" : emailMode==="signin" ? "Einverstanden & Anmelden" : emailMode==="signup" ? "Einverstanden & Registrieren" : "Zurücksetzungs-E-Mail senden"}
                </button>
              </div>
            )}

            <div style={{ fontSize:11, color:"var(--c-dim)", lineHeight:1.6, marginTop:6 }}>
              Einwilligung jederzeit widerrufbar.{" "}
              <span style={{ color:"#3aaa35", cursor:"pointer", textDecoration:"underline" }}
                onClick={() => onShowDatenschutz && onShowDatenschutz()}>Datenschutzerklärung</span>
              {" · "}
              <span style={{ color:"#3aaa35", cursor:"pointer", textDecoration:"underline" }}
                onClick={() => onShowImpressum && onShowImpressum()}>Impressum</span>
            </div>
          </div>
        </div>
      );
    }

    // ─── Firebase Sync Hook ───────────────────────────────────────────────────
    function useFirebaseSync(projects, setProjects) {
      const [isSignedIn, setIsSignedIn] = React.useState(false);
      const [currentUser, setCurrentUser] = React.useState(null);
      const [cloudStatus, setCloudStatus] = React.useState("idle");
      const [lastCloudSync, setLastCloudSync] = React.useState(null);
      const [fbReady, setFbReady] = React.useState(false);
      const syncTimer = React.useRef(null);
      const db = React.useRef(null);
      const auth = React.useRef(null);

      React.useEffect(() => {
        if (!FIREBASE_READY) return;
        // Load Firebase SDKs dynamically
        const loadFB = async () => {
          try {
            const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
            const { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup,
              signInWithRedirect, getRedirectResult,
              signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail,
              signOut: fbSignOut }
              = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
            const { getFirestore, doc, setDoc, getDoc, collection }
              = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

            const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
            auth.current = { instance: getAuth(app), GoogleAuthProvider, signInWithPopup,
              signInWithRedirect, getRedirectResult,
              signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail,
              signOut: fbSignOut };
            db.current = { instance: getFirestore(app), doc, setDoc, getDoc, collection };
            setFbReady(true);
            window._fbAuth = auth.current.instance; // expose for account deletion
            // Falls von einem Redirect-Login zurückgekehrt: abschließen / Fehler zeigen
            getRedirectResult(auth.current.instance).catch(e => console.error("Redirect-Login Fehler:", e));

            onAuthStateChanged(auth.current.instance, async user => {
              if (user) {
                setIsSignedIn(true);
                setCurrentUser({ name: user.displayName, email: user.email, photo: user.photoURL });
                // Load projects from Firestore
                await loadUserProjects(user.uid, db.current);
              } else {
                setIsSignedIn(false);
                setCurrentUser(null);
              }
            });
          } catch(e) {
            console.error("Firebase init error:", e);
          }
        };
        loadFB();
      }, []);

      const loadUserProjects = async (uid, dbRef) => {
        try {
          setCloudStatus("syncing");
          const snap = await dbRef.getDoc(dbRef.doc(dbRef.instance, "users", uid));
          if (snap.exists() && snap.data().projects) {
            const cloudProjs = snap.data().projects;
            setProjects(cloudProjs);
            localStorage.setItem("filmdispo_projects_v1", JSON.stringify(cloudProjs));
          }
          setCloudStatus("synced");
          setLastCloudSync(Date.now());
        } catch(e) {
          console.error("Load error:", e);
          setCloudStatus("error");
        }
      };

      const syncToCloud = React.useCallback((currentProjects) => {
        if (!isSignedIn || !fbReady || !auth.current || !db.current) return;
        clearTimeout(syncTimer.current);
        syncTimer.current = setTimeout(async () => {
          try {
            setCloudStatus("syncing");
            const uid = auth.current.instance.currentUser?.uid;
            if (!uid) return;
            await db.current.setDoc(
              db.current.doc(db.current.instance, "users", uid),

    // ─── Live-Sync für Gastzugänge (geteiltes Firestore-Dokument je shareId) ───

        return () => { cancelled = true; };
      }, []);

      React.useEffect(() => { if (fb.current) sync.current(); }, [projects]);
    }



// ─── PDF Export ──────────────────────────────────────────────────────────────
// Self-contained PDF builder - no external libraries, works in sandboxed iframes.
// Generates a real binary PDF and opens it in a new tab via a data: URI.

function buildPdf(pages, opts) {
  // pages: array of {lines:[{type,x,y,w,h,text,size,bold,italic,rgb,align,x2,y2,lineWidth}]}
  // All coordinates in mm, converted to PDF points (1mm = 2.8346pt)
  // PDF y=0 is at BOTTOM of page; we convert from top-down mm coords.
  const P = 2.8346; // mm to pt
  const landscape = opts && opts.landscape;
  const PW = landscape ? 841.89 : 595.28;
  const PH = landscape ? 595.28 : 841.89; // A4
  const mm2pt = v => v * P;
  const y2pt = ymm => PH - ymm * P; // top-down mm -> bottom-up pt

  const escPdf = s => {
    let r = "";
    for (let i = 0; i < s.length; i++) {
      const b = s.charCodeAt(i);
      if (b === 40) r += "\\(";
      else if (b === 41) r += "\\)";
      else if (b === 92) r += "\\\\";
      else if (b < 32 || b > 126) r += "?";
      else r += s[i];
    }
    return r;
  };

  const NL = "\n";
  const faces = ["Helvetica","Helvetica-Bold","Helvetica-Oblique","Helvetica-BoldOblique"];

  let out = "%PDF-1.4"+NL;
  const refs = []; // byte offsets
  let off = out.length;
  let nObj = 0;

  const addObj = content => {
    nObj++;
    refs.push(off);
    const s = nObj+" 0 obj"+NL+content+NL+"endobj"+NL;
    out += s; off += s.length;
    return nObj;
  };



  // Register image XObjects with optional SMask for transparency
  pages.forEach(pg => {
    if (!pg || !pg.lines) return;
    pg.lines.filter(l=>l.type==="image"&&l.hexData&&!l.imgObjId).forEach(l => {
      let smaskRef = '';
      const alphaData = l.alphaData || l.alphaHex || null;
      if (alphaData) {
        const smaskStr = "<</Type /XObject /Subtype /Image /Width "+l.pxW+" /Height "+l.pxH+
          " /ColorSpace /DeviceGray /BitsPerComponent 8 /Filter /ASCIIHexDecode /Length "+alphaData.length+">>\nstream\n"+alphaData+"\nendstream";
        const smaskId = addObj(smaskStr);
        smaskRef = " /SMask "+smaskId+" 0 R";
      }
      const imgObjStr = "<</Type /XObject /Subtype /Image /Width "+l.pxW+" /Height "+l.pxH+
        " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /ASCIIHexDecode /Length "+l.hexData.length+smaskRef+">>\nstream\n"+l.hexData+"\nendstream";
      l.imgObjId = addObj(imgObjStr);
    });
  });

  // Build one content stream per page using absolute Tm positioning
  const streams = pages.map((pg, pi) => {
    const ops = [];
    ops.push("BT");
    let curFont = ""; let curRgb = ""; let curSRgb = "";

    pg.lines.forEach(l => {
      if (l.type === "rect") {
        ops.push("ET");
        const rgb = l.rgb || [240,240,240];
        const rc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3);
        ops.push(rc+" rg");
        // rect: x y w h re f  (y is bottom-left corner in PDF)
        const px = mm2pt(l.x).toFixed(2);
        const py = (y2pt(l.y) - mm2pt(l.h)).toFixed(2); // top-left to bottom-left
        const pw2 = mm2pt(l.w).toFixed(2);
        const ph = mm2pt(l.h).toFixed(2);
        ops.push(px+" "+py+" "+pw2+" "+ph+" re f");
        ops.push("BT");
        curFont=""; curRgb=""; curSRgb=""; // rect changes fill color
        return;
      }
      if (l.type === "link") {
        // PDF URI link annotation - stored for later in page dict
        if (!pg._annots) pg._annots = [];
        pg._annots.push(l);
        return;
      }
      if (l.type === "image") {
        if (l.imgObjId) {
          // Real image XObject already registered
          ops.push("ET");
          const ix=mm2pt(l.x).toFixed(2), iy=(y2pt(l.y)-mm2pt(l.h)).toFixed(2);
          const iw=mm2pt(l.w).toFixed(2), ih=mm2pt(l.h).toFixed(2);
          const imgName = "Im"+l.imgObjId;
          ops.push("q "+iw+" 0 0 "+ih+" "+ix+" "+iy+" cm /"+imgName+" Do Q");
          ops.push("BT");
        } else {
          // Fallback: grey placeholder
          ops.push("ET");
          ops.push("0.88 0.88 0.90 rg");
          const ix=mm2pt(l.x).toFixed(2), iy=(y2pt(l.y)-mm2pt(l.h)).toFixed(2);
          const iw=mm2pt(l.w).toFixed(2), ih=mm2pt(l.h).toFixed(2);
          ops.push(ix+" "+iy+" "+iw+" "+ih+" re f");
          ops.push("0.70 0.70 0.75 RG 0.3 w");
          ops.push(ix+" "+iy+" "+iw+" "+ih+" re S");
          ops.push("BT");
        }
        return;
      }
      if (l.type === "line") {
        ops.push("ET");
        const rgb = l.rgb || [180,180,180];
        const sc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3);
        if (sc !== curSRgb) { ops.push(sc+" RG"); curSRgb = sc; }
        ops.push((l.lineWidth||0.3).toFixed(2)+" w");
        ops.push(mm2pt(l.x1).toFixed(2)+" "+y2pt(l.y1).toFixed(2)+" m "+mm2pt(l.x2).toFixed(2)+" "+y2pt(l.y2).toFixed(2)+" l S");
        ops.push("BT");
        curFont=""; // line uses ET/BT
        return;
      }
      // Text: use Tm for absolute positioning
      const sz = l.size || 9;
      const bold = !!l.bold; const italic = !!l.italic;
      const fn = bold&&italic?"Helvetica-BoldOblique":bold?"Helvetica-Bold":italic?"Helvetica-Oblique":"Helvetica";
      const fk = fn+"|"+sz;
      if (fk !== curFont) { ops.push("/"+fn+" "+sz.toFixed(2)+" Tf"); curFont = fk; }
      const rgb = l.rgb || [0,0,0];
      const fc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3)+" rg";
      if (fc !== curRgb) { ops.push(fc); curRgb = fc; }

      const text = escPdf(String(l.text||""));
      // Approximate char width for Helvetica: ~0.5 * fontSize in pt
      // sz is already in pt (not mm), so use sz directly
      const approxCharW = sz * 0.5;
      const textW = approxCharW * String(l.text||"").length;
      let px = mm2pt(l.x);
      if (l.align === "right") px = mm2pt(l.x) - textW;
      else if (l.align === "center") px = mm2pt(l.x) - textW/2;

      const py = y2pt(l.y); // baseline
      // Tm: 1 0 0 1 tx ty Tm  (identity matrix + translation = absolute position)
      ops.push("1 0 0 1 "+px.toFixed(2)+" "+py.toFixed(2)+" Tm");
      ops.push("("+text+") Tj");
    });
    ops.push("ET");
    return ops.join(NL)+NL;
  });

  // Assemble PDF binary
    // Font objects
  const fontIds = {};
  faces.forEach(f => {
    fontIds[f] = addObj("<</Type /Font /Subtype /Type1 /BaseFont /"+f+" /Encoding /WinAnsiEncoding>>");
  });

  const fontRes = "/Font <<"+faces.map(f=>"/"+f+" "+fontIds[f]+" 0 R").join(" ")+" >>";

  // Content stream + page objects
  const pageIds = streams.map((stream, si) => {
    const len = stream.length;
    const sid = addObj("<</Length "+len+">>\nstream\n"+stream+"endstream");
    // Build annotations for links
    let annotRes = "";
    if (pages[si] && pages[si]._annots) {
      const annots = pages[si]._annots;
      const annotIds = annots.map(a => {
        const ax = mm2pt(a.x).toFixed(2);
        const ay = (y2pt(a.y+a.h)).toFixed(2);
        const ax2 = (mm2pt(a.x)+mm2pt(a.w)).toFixed(2);
        const ay2 = (y2pt(a.y)).toFixed(2);
        const url = (a.url||'').replace(/[()\\]/g,'');
        return addObj("<</Type /Annot /Subtype /Link /Rect ["+ax+" "+ay+" "+ax2+" "+ay2+"] /Border [0 0 1] /C [0 0 1] /A <</Type /Action /S /URI /URI ("+url+")>>>>");
      });
      annotRes = " /Annots ["+annotIds.map(id=>id+" 0 R").join(" ")+"]";
    }
    // Collect image XObjects for this page
    const pgImgLines = pages[si] ? pages[si].lines.filter(l=>l.type==="image"&&l.imgObjId) : [];
    let xObjStr = "";
    if (pgImgLines.length > 0) {
      xObjStr = " /XObject <<"+pgImgLines.map(l=>"/Im"+l.imgObjId+" "+l.imgObjId+" 0 R").join(" ")+" >>";
    }
    const pid = addObj("<</Type /Page /MediaBox [0 0 "+PW.toFixed(2)+" "+PH.toFixed(2)+"] /Contents "+sid+" 0 R /Resources <<"+fontRes+xObjStr+">> /Parent 0 0 R"+annotRes+">>");
    return pid;
  });

  const pagesId = addObj("<</Type /Pages /Kids ["+pageIds.map(n=>n+" 0 R").join(" ")+"] /Count "+pageIds.length+">>");
  // Fix parent refs
  pageIds.forEach(pid => {
    out = out.replace(pid+" 0 obj\n<</Type /Page", pid+" 0 obj\n<</Type /Page");
    // Replace the placeholder parent ref
  });
  // Patch /Parent 0 0 R -> /Parent pagesId 0 R
  out = out.split("/Parent 0 0 R").join("/Parent "+pagesId+" 0 R");

  const catId = addObj("<</Type /Catalog /Pages "+pagesId+" 0 R>>");

  // Cross-reference table
  const xrefOff = off;
  let xref = "xref"+NL+"0 "+(nObj+1)+NL;
  xref += "0000000000 65535 f "+NL;
  refs.forEach(r => { xref += r.toString().padStart(10,"0")+" 00000 n "+NL; });
  out += xref;
  out += "trailer"+NL+"<</Size "+(nObj+1)+" /Root "+catId+" 0 R>>"+NL;
  out += "startxref"+NL+xrefOff+NL+"%%EOF";
  return out;
}

function pdfSafe(s) {
  return String(s||"")
    .replace(/\u2013/g,"-").replace(/\u2014/g,"--").replace(/\u00b7/g,".")
    .replace(/\u2018/g,"'").replace(/\u2019/g,"'").replace(/\u201c/g,"\"").replace(/\u201d/g,"\"")
    .replace(/\u00e4/g,"ae").replace(/\u00f6/g,"oe").replace(/\u00fc/g,"ue")
    .replace(/\u00c4/g,"Ae").replace(/\u00d6/g,"Oe").replace(/\u00dc/g,"Ue")
    .replace(/\u00df/g,"ss")
    .replace(/\u00e9/g,"e").replace(/\u00e8/g,"e").replace(/\u00ea/g,"e")
    .replace(/\u00e0/g,"a").replace(/\u00e2/g,"a").replace(/\u00e1/g,"a")
    .replace(/[^\x20-\x7E]/g,"-");
}

function resolveExportName(pattern, vars) {
  // vars: {titel, tag, datum, modus, dateFormat}
  const safe = s => {
    let r = String(s||'');
    r = r.replace(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/gi, '');
    r = r.replace(/[^a-zA-Z0-9_\-]/g, '_');
    r = r.replace(/_+/g, '_').replace(/^_|_$/g, '');
    return r || 'Unbenannt';
  };
  const formatDate = (raw, fmt) => {
    if (!raw) return '';
    const d = new Date(raw);
    if (isNaN(d)) return safe(raw);
    const dd = String(d.getDate()).padStart(2,'0'), mm = String(d.getMonth()+1).padStart(2,'0'), yyyy = String(d.getFullYear()), yy = yyyy.slice(-2);
    const f = fmt || 'DDMMYYYY';
    // Order matters: longer patterns first
    return f
      .replace('YYYYMMDD', yyyy+mm+dd).replace('DDMMYYYY', dd+mm+yyyy)
      .replace('YYMMDD', yy+mm+dd).replace('DDMMYY', dd+mm+yy)
      .replace('YYYY', yyyy).replace('YY', yy).replace('MM', mm).replace('DD', dd)
      .replace(/[.\-]/g, s => s);
  };
  return (pattern||'{titel}')
    .replace(/\{titel\}/g, safe(vars.titel||vars.name||'Projekt'))
    .replace(/\{tag\}/g, String(vars.tag||'1'))
    .replace(/\{datum\}/g, formatDate(vars.datum, vars.dateFormat))
    .replace(/\{modus\}/g, safe(vars.modus||''))
    || 'export';
}

function openPdf(pdfStr, filename) {
  const len = pdfStr.length;
  const buf = new Uint8Array(len);
  for (let i = 0; i < len; i++) buf[i] = pdfStr.charCodeAt(i) & 0xff;
  const blob = new Blob([buf], {type:"application/pdf"});
  const url = URL.createObjectURL(blob);
  // Always force download (never open in browser tab)
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
}

// ─── Document layout engine ───────────────────────────────────────────────────
// All measurements in mm, Y increases downward from top of page

function makeDoc() {
  const W = 210; const H = 297;
  const ML = 12; const MR = 12; const MT = 14; const MB = 14;
  const CW = W - ML - MR;
  let pages = [{ lines: [] }];
  let y = MT;

  const cur = () => pages[pages.length - 1];
  const checkY = need => {
    if (y + need > H - MB) { pages.push({ lines: [] }); y = MT; }
  };
  const addY = d => { y += d; };
  const setY = v => { y = v; };
  const getY = () => y;

  // Primitives
  const rect = (x, yy, w, h, rgb) => cur().lines.push({ type:"rect", x, y:yy, w, h, rgb:rgb||[240,240,240] });
  const line2 = (x1, y1, x2, y2, lw, rgb) => cur().lines.push({ type:"line", x1, y1, x2, y2, lineWidth:lw||0.3, rgb:rgb||[180,180,180] });
  const text = (s, x, yy, sz, bold, rgb, align) => cur().lines.push({ type:"text", text:pdfSafe(s), x, y:yy, size:sz||9, bold:!!bold, rgb:rgb||[40,40,40], align:align||"left" });

  // Word-wrap text into multiple lines (returns array of strings)
  const wrapText = (s, maxMm, sz) => {
    const safe = pdfSafe(s);
    const charWmm = sz * 0.55 * 0.3528; // pt->mm: sz*0.55pt per char * 0.3528mm/pt
    const maxChars = Math.max(1, Math.floor(maxMm / charWmm));
    const words = safe.split(" ");
    const lines = []; let cur2 = "";
    words.forEach(w => {
      const test = cur2 ? cur2+" "+w : w;
      if (test.length > maxChars && cur2) { lines.push(cur2); cur2 = w; }
      else cur2 = test;
    });
    if (cur2) lines.push(cur2);
    return lines.length ? lines : ["-"];
  };

  // Draw a section header bar
  const sectionHeader = (label, h) => {
    h = h || 6;
    checkY(h + 2);
    rect(ML, y, CW, h, [30,30,42]);
    text(label, ML+2, y + h*0.68, 7.5, true, [200,180,140]);
    addY(h + 1);
  };

  // Draw a table header row
  const tableHeader = (cols, h) => {
    h = h || 6;
    checkY(h + 2);
    rect(ML, y, CW, h, [40,40,55]);
    let cx = ML;
    cols.forEach(col => {
      text(col.label||"", cx+1, y + h*0.7, 7, true, [200,180,140]);
      cx += col.w;
    });
    addY(h + 0.5);
  };

  // Draw a data row with word-wrap per cell; returns row height used
  const tableRow = (cols, vals, si, rowMinH) => {
    const SZ = 8; // font size in POINTS
    const LH = 3.8; // line height mm
    // Calculate lines per cell
    const cellLines = vals.map((v, i) => wrapText(String(v||""), (cols[i]&&cols[i].w||20)-2, SZ));
    const nLines = Math.max(...cellLines.map(l=>l.length), 1);
    const rowH = Math.max(nLines * LH + 2.5, rowMinH||6);
    checkY(rowH);
    if (si % 2 === 0) rect(ML, y, CW, rowH, [252,252,252]);
    line2(ML, y+rowH, W-MR, y+rowH, 0.15, [210,210,210]);
    let cx = ML;
    vals.forEach((v, i) => {
      const col = cols[i] || { w: 20 };
      const bold = col.bold || false;
      const rgb = col.rgb || [40,40,40];
      const lines3 = cellLines[i];
      lines3.forEach((l, li) => {
        text(l, cx+1, y + 3.5 + li*LH, SZ, bold && li===0, rgb);
      });
      cx += col.w;
    });
    addY(rowH);
    return rowH;
  };

  return { pages:()=>pages, checkY, addY, setY, getY, rect, line2, text, wrapText, sectionHeader, tableHeader, tableRow, W, H, ML, MR, MT, MB, CW };
}


// ─── Reusable print helper: druckt die A4-App-Ansicht als PDF ────────────────
// Komponenten rufen `if (printing) return <PrintFrame>{content}</PrintFrame>;`
function usePrint() {
  const [printing, setPrinting] = React.useState(false);
  React.useEffect(() => {
    if (!printing) return;
    const t = setTimeout(() => { window.print(); setPrinting(false); }, 150);
    return () => clearTimeout(t);
  }, [printing]);
  return [printing, () => setPrinting(true)];
}
function PrintFrame({ children }) {
  return <div className="print-root"><div className="doc-a4">{children}</div></div>;
}


// ─── Export Dispo as PDF ──────────────────────────────────────────────────────
function exportDispoPdf(project, dayIdx, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const day = project.shootDays[dayIdx] || {};
    const doc = makeDoc();
    const {W, ML, MR, CW} = doc;
    const pS = pdfSafe;
    const fmtD = d => { try { const dt=new Date(d+'T12:00'); return pad(dt.getDate())+'.'+pad(dt.getMonth()+1)+'.'+dt.getFullYear(); } catch(e){return d||'';} };

    const BLK=[0,0,0], WHT=[255,255,255], GRY=[130,130,130], LGY=[210,210,210];
    const DGY=[50,50,50], BG1=[248,248,248], HDR=[28,28,38], ACC=[200,140,30];

    // ── Daten ─────────────────────────────────────────────────────
    const dispoData = day.dispoData || {};
    const groups = buildGroups(project.shots);
    const group = groups.find(g => {
      const lk = project.shootDays.find(d2 => d2.id === g.divider.shootDayId);
      return lk && project.shootDays.indexOf(lk) === dayIdx;
    }) || groups[dayIdx];
    const sceneIds = group ? group.sceneIds : new Set();
    const scenes = project.scenes.filter(sc => sceneIds.has(sc.id));
    const shots = group ? group.shots : [];
    const crewAtDay = project.crew.filter(p => p.days.includes(dayIdx));
    // Cast für diesen Tag: aus den Szenen-Rollen ableiten
    const scenesThisDay = (() => {
      const groups = buildGroups(project.shots);
      const group = groups.find(g => {
        const sd = project.shootDays.find(d=>d.id===g.divider?.shootDayId);
        return sd && project.shootDays.indexOf(sd)===dayIdx;
      }) || groups[dayIdx];
      if (!group) return [];
      return project.scenes.filter(sc => group.sceneIds.has(sc.id));
    })();
    const rolesThisDay = new Set(scenesThisDay.flatMap(sc=>sc.castRoles||[]));
    const castRaw = rolesThisDay.size > 0
      ? project.cast.filter(p => rolesThisDay.has(p.role))
      : project.cast.filter(p => p.days.includes(dayIdx));
    const seenR = new Set();
    const castAtDay = castRaw.filter(p => { if(seenR.has(p.role)) return false; seenR.add(p.role); return true; });
    const respPersons = (st.respPersons||[]).filter(p=>p.value);
    const callTime = day.callTime || '07:00';

    // Arbeitsbeginn-Zeilen
    const DEFAULT_GEWERKE = ['Regie','Kamera','Licht','Ton','Requisite','Kostüm','Maske','Catering','Set-AL'];
    const day0 = project.shootDays[0]?.dispoData || {};
    const inherited = dayIdx===0
      ? DEFAULT_GEWERKE.map((g,i)=>({id:'arb_'+i,label:g,time:'',info:''}))
      : (day0.arbRows||DEFAULT_GEWERKE.map((g,i)=>({id:'arb_'+i,label:g,time:'',info:''})));
    const arbRows = dispoData.arbRows || inherited;

    // Drehschluss berechnen
    const toMin = t => { try { const [h,m]=t.split(':').map(Number); return h*60+(m||0); } catch(e){return 420;} };
    const probeStartMin = toMin(arbRows[0]?.time || callTime);
    let totalMin = shots.filter(s=>s.type==='shot').reduce((a,s)=>a+(s.setupMin||0)+(s.shootMin||0),0);
    const lunchItems = shots.filter(s=>s.type==='divider'&&s.dividerType==='lunch');
    const lunchMin = lunchItems.reduce((a,s)=>a+(s.durationMin||45),0);
    const drehEndMin = probeStartMin + totalMin + lunchMin;
    const drehEnd = pad(Math.floor(drehEndMin/60)%24)+':'+pad(drehEndMin%60);
    const lunch = lunchItems[0];

    // ── SET + DARSTELLER OBEN ─────────────────────────────────────
    // Set+Darsteller: Prefix fett, Namen normal, Umbruch am rechten Rand
    const renderNameLine = (prefix, names) => {
      if (names.length === 0) return;
      // charW in pt für 7.5pt font: ~0.5*7.5 = 3.75pt = 3.75/2.8346 mm ≈ 1.32mm
      const charWmm = 7.5 * 0.5 / 2.8346;
      const maxChars = Math.floor(CW / charWmm);
      const lines = [];
      let line = prefix;
      names.forEach((name, i) => {
        const sep = i===0 ? '' : ', ';
        const candidate = line + sep + name;
        if (candidate.length > maxChars) {
          lines.push(line);
          line = '    ' + name; // Einzug für Folgezeilen
        } else {
          line = candidate;
        }
      });
      if (line) lines.push(line);
      // Erste Zeile: Prefix fett, Rest normal
      lines.forEach((l, li) => {
        const isBold = li === 0; // Nur erste Zeile hat das Prefix
        doc.text(l, ML, doc.getY()+4, 7.5, isBold, DGY);
        doc.addY(4.5);
      });
    };
    if (crewAtDay.length>0||castAtDay.length>0) {
      if (crewAtDay.length>0) renderNameLine('Set: ', crewAtDay.map(p=>pS(p.name||p.role)));
      if (castAtDay.length>0) {
      // Top-Darsteller-Zeile: alle Namen der Darsteller des Tages
      // Besetzt-Personen zuerst, dann Kandidaten mit Namen, dann Rollennamen
      const darstellerLabels = [];
      const seenDarst = new Set();
      castAtDay.forEach(p => {
        if (seenDarst.has(p.role)) return; seenDarst.add(p.role);
        if (p.name) darstellerLabels.push(pS(p.name));
        else if (p.role) darstellerLabels.push(pS(p.role));
      });
      if (darstellerLabels.length > 0) renderNameLine('Darsteller: ', darstellerLabels);
    }
      doc.addY(2);
    }

    // ── HEADER ────────────────────────────────────────────────────
    const hT=doc.getY(), hH=24;
    doc.rect(ML, hT, CW, hH, WHT);
    doc.line2(ML, hT, W-MR, hT, 0.3, LGY);
    doc.line2(ML, hT+hH, W-MR, hT+hH, 1, BLK);
    // Logo links (oder Firmenname wenn kein Logo)
    if (st.logo && st.logoHex) {
      try {
        const lhD = JSON.parse(st.logoHex);
        const logoHD = hH - 6;
        const logoPages = doc.pages();
        if (logoPages && logoPages.length > 0) {
          logoPages.at(-1).lines.push({type:'image',hexData:lhD.hexData,alphaData:lhD.alphaHex||null,pxW:lhD.pxW,pxH:lhD.pxH,
            x:ML+1,y:hT+3,w:Math.round(logoHD*(lhD.ratio||3)),h:logoHD});
        }
      } catch(e) { doc.text(pS(st.company||''), ML+2, hT+10, 10, true, BLK); }
    } else {
      doc.text(pS(st.company||''), ML+2, hT+10, 10, true, BLK);
    }
    // Titel ZENTRIERT - exakt in der Mitte des Dokuments
    doc.text(pS(st.title||''), ML + CW/2, hT+14, 18, true, BLK, 'center');
    // Verantwortliche rechts
    let ry=hT+5;
    respPersons.slice(0,4).forEach(p => {
      doc.text(pS(p.label)+':', W-MR-50, ry, 7, false, GRY);
      doc.text(pS(p.value), W-MR-25, ry, 7, true, DGY);
      ry+=4.5;
    });
    doc.setY(hT+hH+1);

    // ── DISPOSITION BALKEN ────────────────────────────────────────
    const fmtDW = d => { try { const dt=new Date(d+'T12:00'); const dn=['So','Mo','Di','Mi','Do','Fr','Sa']; return dn[dt.getDay()]+', '+pad(dt.getDate())+'.'+pad(dt.getMonth()+1)+'.'+dt.getFullYear(); } catch(e){return d||'';} };
    const balkY = doc.getY();
    doc.rect(ML, balkY, CW, 10, HDR);
    doc.text('DISPOSITION', ML+4, balkY+7, 9.5, true, WHT);
    doc.text(day.date ? fmtDW(day.date) : 'Datum offen', W/2, balkY+7, 9, true, WHT, 'center');
    doc.text((dayIdx+1)+'. Drehtag', W-MR-2, balkY+7, 9.5, true, WHT, 'right');
    doc.addY(11);

    // ── 3-SPALTEN-BLOCK (Skizze) ──────────────────────────────────
    // Spalten: Drehortinfos (38%) | Motivinfos (38%) | Arbeitsbeginn (24%)
    const C1W=72, C2W=72, C3W=CW-C1W-C2W; // ~38/38/24%
    const C1X=ML, C2X=ML+C1W, C3X=ML+C1W+C2W;
    const bTop = doc.getY();

    // Spalten-Header-Labels
    const colLabels = [['DREHORTINFOS',C1X,C1W],['INFOS',C2X,C2W],['ARBEITSBEGINN',C3X,C3W]];
    colLabels.forEach(([lbl,x,w]) => {
      doc.rect(x, bTop, w, 5, BG1);
      doc.text(lbl, x+2, bTop+3.8, 6, true, GRY);
    });
    doc.addY(6);

    // SPALTE 1: Drehortinfos — Adresse des Drehtags (fett), dann abweichende Szenen-Adressen
    let c1Y = bTop+6;
    // Drehtag-Adresse (fett) — das ist die Haupt-Adresse des Tages
    const mainAddr = day.locationAddress || '';
    if (mainAddr) {
      // Erste Zeile fett, Rest normal
      const addrLines = mainAddr.split(',').map(l=>l.trim()).filter(Boolean);
      addrLines.forEach((l, li) => {
        doc.text(pS(l), C1X+2, c1Y+4, 8, li===0, BLK);
        c1Y += 5;
      });
      c1Y += 1;
    }
    // Szenen-Adressen die abweichen – mit Motivname als Label
    const sceneAddrEntries = [];
    const seenAddrs = new Set();
    scenes.forEach(sc => {
      const lo = (project.locations||[]).find(l => l.id === sc.locationId);
      const addr = lo ? locAddress(lo) : (sc.locationAddress||'');
      if (addr && addr !== mainAddr && !seenAddrs.has(addr)) {
        seenAddrs.add(addr);
        sceneAddrEntries.push({ addr, motiv: sc.locationTitle||'' });
      }
    });
    if (sceneAddrEntries.length > 0) {
      c1Y += 3;
      doc.line2(C1X+1, c1Y, C1X+C1W-2, c1Y, 0.3, LGY); c1Y += 3;
      sceneAddrEntries.forEach(({addr, motiv}) => {
        if (motiv) { doc.text(pS(motiv)+':', C1X+2, c1Y+3.5, 6.5, true, GRY); c1Y+=4; }
        addr.split(',').map(l=>l.trim()).filter(Boolean).forEach(l => {
          doc.text(pS(l), C1X+2, c1Y+3.5, 7, false, DGY); c1Y+=4;
        });
        c1Y += 2;
      });
    }


    // SPALTE 2: INFOS (Basis + Parkplatz + Anmerkungen)
    let c2Y = bTop+6;
    // Basis / Allgemeine Infos
    if (dispoData.basis) {
      const basisLines = dispoData.basis.split('\n').filter(Boolean);
      basisLines.forEach(l => { doc.text(pS(l), C2X+2, c2Y+4, 7.5, false, DGY); c2Y+=4.5; });
    }
    // Parkplätze
    const pkList2 = dispoData.parkplaetze||[];
    if (pkList2.length > 0) {
      if (dispoData.basis) c2Y+=2;
      doc.text('PARKPLAETZE', C2X+2, c2Y+3.5, 6, true, GRY); c2Y+=4.5;
      pkList2.forEach(pk => {
        if (!pk.info && !pk.url) return;
        doc.text('P  '+pS(pk.info||''), C2X+2, c2Y+4, 7.5, true, DGY); c2Y+=4.5;
        if (pk.url) {
          doc.text(pS(pk.url.replace(/^https?:\/\//,'').slice(0,50)), C2X+5, c2Y+3.5, 6.5, false, [60,100,180]); c2Y+=4;
        }
      });
    }
    // Anmerkungen
    if (day.notes) {
      if (dispoData.basis || pkList2.length) c2Y+=2;
      doc.text('ANMERKUNGEN', C2X+2, c2Y+3.5, 6, true, GRY); c2Y+=4.5;
      day.notes.split('\n').filter(Boolean).forEach(l => { doc.text(pS(l), C2X+2, c2Y+4, 7.5, false, DGY); c2Y+=4.5; });
    }

    // SPALTE 3: Arbeitsbeginn — schmäler, rechtsbündig
    let c3Y = bTop+6;
    arbRows.forEach(r => {
      if (!r.label) return;
      const t = r.time || callTime;
      doc.text(pS(r.label)+':', C3X+2, c3Y+4, 7, false, DGY);
      doc.text(t, C3X+C3W-2, c3Y+4, 7.5, true, BLK, 'right');
      c3Y+=4.5;
    });
    c3Y+=1;
    doc.line2(C3X+1, c3Y, C3X+C3W-1, c3Y, 0.3, LGY); c3Y+=1;
    doc.text('Probe/Dreh:', C3X+2, c3Y+4, 7, false, DGY);
    doc.text(arbRows[0]?.time||callTime, C3X+C3W-2, c3Y+4, 7.5, true, BLK, 'right'); c3Y+=5;
    if (lunch) {
      doc.text('Mittagspause:', C3X+2, c3Y+4, 7, false, DGY);
      const lunchInfo = (lunch.start||'')+(lunch.durationMin?' ('+lunch.durationMin+'min)':'');
      if (lunchInfo) doc.text(lunchInfo, C3X+C3W-2, c3Y+4, 7.5, true, BLK, 'right');
      c3Y+=4.5;
    }
    doc.line2(C3X+1, c3Y, C3X+C3W-1, c3Y, 0.3, LGY); c3Y+=1;
    doc.text('Drehschluss:', C3X+2, c3Y+4, 7, false, DGY);
    doc.text(drehEnd, C3X+C3W-2, c3Y+4, 7.5, true, BLK, 'right'); c3Y+=5;

    // Vertikale Trennlinien der 3 Spalten (volle Höhe)
    const row1EndY = Math.max(c1Y, c2Y, c3Y)+3;
    doc.line2(ML, bTop, ML, row1EndY, 0.3, LGY);
    doc.line2(C2X, bTop, C2X, row1EndY, 0.3, LGY);
    doc.line2(C3X, bTop, C3X, row1EndY, 0.3, LGY);
    doc.line2(W-MR, bTop, W-MR, row1EndY, 0.3, LGY);
    // Horizontale Linie zwischen Zeile 1 und Zeile 2 (nur unter Drehort und Motiv)
    doc.line2(ML, row1EndY, C3X, row1EndY, 0.5, BLK);
    doc.setY(row1EndY+1);

    // ── WETTER ────────────────────────────────────────────────────
    doc.rect(ML, doc.getY(), CW, 6, BG1);
    doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.3, LGY);
    const wd = dispoData.weather;
    const wetterTxt = wd
      ? pS((wd.tMax!=null?wd.tMax+'\u00b0C':'') + (wd.tMin!=null?' / '+wd.tMin+'\u00b0C':'') + (wd.rain!=null?' \u00b7 '+wd.rain+'% Regen':''))
      : '\u2013';
    const wetterY = doc.getY();
    doc.text('Wetter: '+wetterTxt, ML+2, wetterY+4.5, 7.5, false, wd?DGY:GRY);
    doc.text('Aufgang: '+pS(wd?.sunrise||'\u2013'), ML+CW*0.35, wetterY+4.5, 7.5, false, wd?DGY:GRY);
    doc.text('Untergang: '+pS(wd?.sunset||'\u2013'), ML+CW*0.68, wetterY+4.5, 7.5, false, wd?DGY:GRY);
    doc.line2(ML+CW*0.35, wetterY, ML+CW*0.35, wetterY+6, 0.2, LGY);
    doc.line2(ML+CW*0.68, wetterY, ML+CW*0.68, wetterY+6, 0.2, LGY);
    doc.addY(7);

    // ── SZENEN-TABELLE ────────────────────────────────────────────
    const SC=[{w:18,h:'Bild\nLicht'},{w:16,h:'V-Stopp\nSeiten'},{w:CW-18-16-48-22,h:'Motiv / Synopsis'},{w:48,h:'Rollen'},{w:22,h:'Sonstiges'}];
    doc.rect(ML, doc.getY(), CW, 9, HDR);
    let hx=ML;
    SC.forEach(col=>{
      col.h.split('\n').forEach((l,li)=>doc.text(l,hx+2,doc.getY()+3.2+li*3.2,6.5,true,WHT));
      hx+=col.w;
      if(hx<W-MR)doc.line2(hx,doc.getY(),hx,doc.getY()+9,0.3,[80,80,100]);
    });
    doc.addY(10);
    scenes.forEach((sc,si)=>{
      // Rollen für diese Szene (sortiert nach Cast&Crew-Reihenfolge, nummeriert)
      const allCRoles = [...new Set((project.cast||[]).map(p=>p.role).filter(Boolean))];
      const scRoles = sc.castRoles && sc.castRoles.length > 0
        ? allCRoles.filter(r => sc.castRoles.includes(r))
        : [];
      const numScRoles = scRoles.length;
      const synLen = Math.ceil(pS(sc.synopsis||'').length/32);
      doc.checkY(14);
      const rH=Math.max(14, 6+Math.max(synLen*3.5, numScRoles*4+2));
      doc.rect(ML,doc.getY(),CW,rH,si%2===0?WHT:BG1);
      doc.line2(ML,doc.getY()+rH,W-MR,doc.getY()+rH,0.2,LGY);
      const rY=doc.getY()+4;let rx=ML;
      doc.text(String(sc.number),rx+2,rY,10,true,BLK);
      doc.text(pS((sc.interior||'')+'/'+(sc.dayNight||'').slice(0,1)),rx+2,rY+5,6,false,GRY);

      rx+=SC[0].w;doc.line2(rx,doc.getY(),rx,doc.getY()+rH,0.2,LGY);
      doc.text(sc.vorstopp||'–',rx+2,rY,8,true,DGY);
      doc.text(sc.pages||'–',rx+2,rY+4.5,7,false,GRY);
      rx+=SC[1].w;doc.line2(rx,doc.getY(),rx,doc.getY()+rH,0.2,LGY);
      doc.text(pS(sc.title||''),rx+2,rY,8.5,true,BLK);
      doc.text(pS((sc.interior||'INT')+'. '+(sc.locationTitle||'').slice(0,35)),rx+2,rY+4.5,7,false,GRY);
      if(sc.synopsis)doc.text(pS(sc.synopsis.slice(0,80)),rx+2,rY+8.5,7,false,DGY);
      rx+=SC[2].w;doc.line2(rx,doc.getY(),rx,doc.getY()+rH,0.2,LGY);
      // Rollen-Spalte: nummerierte Szenen-Rollen
      if (scRoles.length > 0) {
        scRoles.forEach((role,pi) => {
          const num = allCRoles.indexOf(role)+1;
          doc.text(pS(num+' - '+role), rx+2, rY+pi*4, 6.5, false, DGY);
        });
      }
      rx+=SC[3].w;doc.line2(rx,doc.getY(),rx,doc.getY()+rH,0.2,LGY);
      if(sc.notes)doc.text(pS(sc.notes.slice(0,28)),rx+2,rY,7,false,GRY);
      doc.addY(rH);
    });
    doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK);doc.addY(1);
    doc.text('Gesamt: '+scenes.length+' Szene'+(scenes.length!==1?'n':''),ML+2,doc.getY()+4,7,false,GRY);
    doc.addY(6);

    // ── DARSTELLER-TABELLE (mit castTimes) ───────────────────────
    if (castAtDay.length>0) {
      doc.checkY(22);
      const castTimes = dispoData.castTimes || {};
      const DC=[{w:24,h:'Rolle'},{w:34,h:'Besetzung'},{w:20,h:'Abholung'},{w:20,h:'Ankunft'},{w:22,h:'Kostüm'},{w:22,h:'Maske'},{w:CW-24-34-20-20-22-22,h:'DF/Set'}];
      doc.rect(ML,doc.getY(),CW,8,HDR);
      doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.3,LGY);
      let dx=ML;
      DC.forEach(col=>{
        doc.text(pS(col.h),dx+1,doc.getY()+5.5,6.5,true,WHT);
        dx+=col.w;
        if(dx<W-MR)doc.line2(dx,doc.getY(),dx,doc.getY()+8,0.3,[80,80,100]);
      });
      doc.addY(9);
      castAtDay.forEach((p,pi)=>{
        doc.checkY(8);
        doc.rect(ML,doc.getY(),CW,7,pi%2===0?WHT:BG1);
        doc.line2(ML,doc.getY()+7,W-MR,doc.getY()+7,0.2,LGY);
        const ct = castTimes[p.id]||{};
        const castRowY = doc.getY();
        let dxr=ML;
        [p.role||'', p.name||'', ct.abholung||'', ct.ankunft||'', ct['kostüm']||'', ct.maske||'', ct.set||''].forEach((v,vi)=>{
          doc.text(pS(v),dxr+1,castRowY+5,7,vi<2,vi<2?BLK:DGY);
          dxr+=DC[vi].w;
          if(dxr<W-MR)doc.line2(dxr,castRowY,dxr,castRowY+7,0.2,LGY);
        });
        doc.addY(7);
      });
      doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK);doc.addY(4);
    }


    // ── LOWER SECTIONS (ordered by sectionOrder) ────────────────────────────
    // Helper: render a two-column BesonderesTable-style section
    const renderBesTable = (data, title) => {
      const rows = data.filter(r=>r.col1||r.col2);
      if (rows.length===0) return;
      doc.checkY(16);
      const tY = doc.getY();
      doc.rect(ML,tY,CW,7,HDR);
      doc.text(title,ML+4,tY+5,8,true,WHT);
      doc.addY(8);
      const C1=Math.round(CW*0.25); const C2=CW-C1;
      rows.forEach((r,ri)=>{
        const col2Lines = (r.col2||'').split('\n').filter(l=>l.trim());
        const col1Lines = (r.col1||'').split('\n').filter(l=>l.trim());
        if (col1Lines.length===0) col1Lines.push('');
        if (col2Lines.length===0) col2Lines.push('');
        const wrapCount = (txt, maxW) => {
          if(!txt.trim()) return 1;
          const charW = 7.5*0.353*0.55;
          const maxC = Math.floor(maxW/charW);
          return Math.ceil(txt.length/maxC) || 1;
        };
        const col1WrappedLines = col1Lines.reduce((a,l)=>a+wrapCount(l,C1-4),0);
        const col2WrappedLines = col2Lines.reduce((a,l)=>a+wrapCount(l,C2-4),0);
        const maxLines = Math.max(col1WrappedLines, col2WrappedLines);
        const rH = Math.max(7, maxLines*4.5+3);
        doc.checkY(rH);
        const rowY = doc.getY();
        doc.rect(ML,rowY,CW,rH,ri%2===0?WHT:BG1);
        doc.line2(ML,rowY+rH,W-MR,rowY+rH,0.2,LGY);
        doc.line2(ML+C1,rowY,ML+C1,rowY+rH,0.2,LGY);
        const wrapBes = (txt, maxW) => {
          if(!txt.trim()) return [];
          const charW = 7.5*0.353*0.55;
          const maxC = Math.floor(maxW/charW);
          const words = txt.split(' ');
          const lines=[]; let line='';
          words.forEach(w => {
            if((line+' '+w).trim().length<=maxC) line=(line+' '+w).trim();
            else { if(line) lines.push(line); line=w.slice(0,maxC); }
          });
          if(line) lines.push(line);
          return lines;
        };
        const allCol1 = col1Lines.flatMap(l => l.trim() ? wrapBes(l, C1-4) : ['']);
        const allCol2 = col2Lines.flatMap(l => l.trim() ? wrapBes(l, C2-4) : ['']);
        allCol1.forEach((l,li)=>{ if(l.trim()) doc.text(pS(l.trim()),ML+2,rowY+4.5+li*4.5,7.5,li===0&&col1Lines[0]?.trim(),DGY); });
        allCol2.forEach((l,li)=>{ if(l.trim()) doc.text(pS(l.trim()),ML+C1+2,rowY+4.5+li*4.5,7.5,false,DGY); });
        doc.addY(rH);
      });
      doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK); doc.addY(4);
    };
    // Read order from dispoData, fall back to project settings, then default default
    const sectionOrder = dispoData.sectionOrder
      || project.settings?.dispoSectionOrder
      || ['fahrdispo','customTables','besonderes','hinweise','produktionsnotizen'];

    // Pre-read all section data
    const fahrdispo = dispoData.fahrdispo||[];
    const besonderes = dispoData.besonderes||[];
    const hinweise = dispoData.hinweise||[];
    const customTables = dispoData.customTables||[];

    // Helper to render a single custom table
    const renderCustomTable = t => {
      if (!t || !t.rows || !t.rows.length) return;
      const hasContent = t.rows.some(row => row.some(cell => cell && cell.trim()));
      if (!hasContent) return;
      const cols = t.cols||2;
      const colW = Math.floor(CW/cols);
      const title2 = pS((t.title||'TABELLE').toUpperCase());
      doc.checkY(16);
      const tY = doc.getY();
      doc.rect(ML,tY,CW,7,HDR);
      doc.text(title2,ML+4,tY+5,8,true,WHT);
      doc.addY(8);
      const hasHeaders = t.headers && t.headers.some(h=>h&&h.trim());
      if (hasHeaders) {
        doc.checkY(7); const hY=doc.getY();
        doc.rect(ML,hY,CW,5.5,BG1);
        t.headers.forEach((h,ci) => {
          if(h&&h.trim()) doc.text(pS(h),ML+2+ci*colW,hY+4,7,true,DGY);
          if(ci>0) doc.line2(ML+ci*colW,hY,ML+ci*colW,hY+5.5,0.2,LGY);
        }); doc.addY(6);
      }
      const wrapC = (txt, maxW) => {
        if(!txt||!txt.trim()) return [];
        const charW=7.5*0.353*0.55, maxC=Math.floor(maxW/charW), result=[];
        txt.split('\n').forEach(para => {
          if(!para.trim()){result.push('');return;}
          const words=para.split(' '); let line='';
          words.forEach(w=>{if((line+' '+w).trim().length<=maxC)line=(line+' '+w).trim();else{if(line)result.push(line);line=w.slice(0,maxC);}});
          if(line)result.push(line);
        });
        return result.length?result:[''];
      };
      t.rows.forEach((row,ri) => {
        const hasRowContent=row.some(cell=>cell&&cell.trim());
        if(!hasRowContent) return;
        const wrappedCols=row.map(cell=>wrapC(cell||'',colW-4));
        const maxLines=Math.max(1,...wrappedCols.map(l=>l.length));
        const rH=Math.max(7,maxLines*4.5+3);
        doc.checkY(rH); const rY=doc.getY();
        doc.rect(ML,rY,CW,rH,ri%2===0?WHT:BG1);
        doc.line2(ML,rY+rH,W-MR,rY+rH,0.2,LGY);
        wrappedCols.forEach((lines,ci)=>{
          if(ci>0) doc.line2(ML+ci*colW,rY,ML+ci*colW,rY+rH,0.2,LGY);
          lines.forEach((l,li)=>{if(l.trim())doc.text(pS(l),ML+2+ci*colW,rY+4.5+li*4.5,7.5,false,DGY);});
        });
        doc.addY(rH);
      });
      doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK); doc.addY(4);
    };

    sectionOrder.forEach(sectionKey => {
      // Handle individual custom table keys (ct:<id>)
      if (sectionKey.startsWith('ct:')) {
        const ctId = sectionKey.slice(3);
        const t = customTables.find(t=>t.id===ctId);
        if (t) renderCustomTable(t);
        return;
      }
      switch(sectionKey) {

        case 'fahrdispo': {
          if (fahrdispo.length===0) break;
          doc.checkY(16);
          const fdY = doc.getY();
          doc.rect(ML,fdY,CW,7,HDR);
          doc.text('FAHRDISPO',ML+4,fdY+5,8,true,WHT);
          doc.addY(8);
          const FC=[Math.round(CW*0.18),Math.round(CW*0.18),Math.round(CW*0.16),Math.round(CW*0.16),Math.round(CW*0.16),CW-Math.round(CW*0.18)-Math.round(CW*0.18)-Math.round(CW*0.16)-Math.round(CW*0.16)-Math.round(CW*0.16)];
          const FH=['Fahrer','Abholung von','Abfahrt','Von','Ankunft','An'];
          doc.checkY(7);
          const fhY=doc.getY();
          doc.rect(ML,fhY,CW,5.5,BG1);
          let fcx=ML;
          FH.forEach((h,i)=>{doc.text(pS(h),fcx+2,fhY+4,7,true,DGY);fcx+=FC[i];});
          doc.addY(6);
          const fdGroups={};
          fahrdispo.forEach(r=>{const k=r.fahrer||'';if(!fdGroups[k])fdGroups[k]=[];fdGroups[k].push(r);});
          let ri2=0;
          Object.entries(fdGroups).forEach(([fahrer,rows])=>{
            rows.forEach((r,rj)=>{
              const rH2=7;
              doc.checkY(rH2);
              const rY2=doc.getY();
              doc.rect(ML,rY2,CW,rH2,ri2%2===0?WHT:BG1);
              doc.line2(ML,rY2+rH2,W-MR,rY2+rH2,0.2,LGY);
              const vals=[rj===0?fahrer:'',r.abholungVon||'',r.abfahrt||'',r.von||'',r.ankunft||'',r.an||''];
              let fcx2=ML;
              vals.forEach((v,i)=>{
                if(v) doc.text(pS(v),fcx2+2,rY2+5,7,i===0&&rj===0,DGY);
                if(i<FC.length-1) doc.line2(fcx2+FC[i],rY2,fcx2+FC[i],rY2+rH2,0.2,LGY);
                fcx2+=FC[i];
              });
              doc.addY(rH2); ri2++;
            });
          });
          doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK); doc.addY(4);
          break;
        }

        case 'besonderes': {
          renderBesTable(besonderes,'BESONDERES');
          break;
        }

        case 'hinweise': {
          renderBesTable(hinweise,'HINWEISE MOTIV UND BASIS');
          break;
        }

        case 'customTables': {
          customTables.forEach(t => {
            if (!t.rows || !t.rows.length) return;
            const hasContent = t.rows.some(row => row.some(cell => cell && cell.trim()));
            if (!hasContent) return;
            const cols = t.cols||2;
            const colW = Math.floor(CW/cols);
            const title2 = pS((t.title||'TABELLE').toUpperCase());
            doc.checkY(16);
            const tY = doc.getY();
            doc.rect(ML,tY,CW,7,HDR);
            doc.text(title2,ML+4,tY+5,8,true,WHT);
            doc.addY(8);
            const hasHeaders = t.headers && t.headers.some(h=>h&&h.trim());
            if (hasHeaders) {
              doc.checkY(7);
              const hY = doc.getY();
              doc.rect(ML,hY,CW,5.5,BG1);
              t.headers.forEach((h,ci) => {
                if(h&&h.trim()) doc.text(pS(h),ML+2+ci*colW,hY+4,7,true,DGY);
                if(ci>0) doc.line2(ML+ci*colW,hY,ML+ci*colW,hY+5.5,0.2,LGY);
              });
              doc.addY(6);
            }
            const wrapCell = (txt, maxW) => {
              if(!txt||!txt.trim()) return [];
              const charW = 7.5*0.353*0.55;
              const maxC = Math.floor(maxW/charW);
              const result = [];
              txt.split('\n').forEach(para => {
                if(!para.trim()) { result.push(''); return; }
                const words = para.split(' '); let line='';
                words.forEach(w => {
                  if((line+' '+w).trim().length<=maxC) line=(line+' '+w).trim();
                  else { if(line) result.push(line); line=w.slice(0,maxC); }
                });
                if(line) result.push(line);
              });
              return result.length ? result : [''];
            };
            t.rows.forEach((row,ri) => {
              const hasRowContent = row.some(cell=>cell&&cell.trim());
              if(!hasRowContent) return;
              const wrappedCols = row.map(cell => wrapCell(cell||'', colW-4));
              const maxLines = Math.max(1, ...wrappedCols.map(l=>l.length));
              const rH = Math.max(7, maxLines*4.5+3);
              doc.checkY(rH);
              const rY = doc.getY();
              doc.rect(ML,rY,CW,rH,ri%2===0?WHT:BG1);
              doc.line2(ML,rY+rH,W-MR,rY+rH,0.2,LGY);
              wrappedCols.forEach((lines,ci) => {
                if(ci>0) doc.line2(ML+ci*colW,rY,ML+ci*colW,rY+rH,0.2,LGY);
                lines.forEach((l,li) => {
                  if(l.trim()) doc.text(pS(l),ML+2+ci*colW,rY+4.5+li*4.5,7.5,false,DGY);
                });
              });
              doc.addY(rH);
            });
            doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK); doc.addY(4);
          });
          break;
        }

        case 'produktionsnotizen': {
          if (!day.notes) break;
          doc.checkY(16);
          const pnY = doc.getY();
          doc.rect(ML,pnY,CW,7,HDR);
          doc.text('PRODUKTIONSNOTIZEN',ML+4,pnY+5,8,true,WHT);
          doc.addY(8);
          const noteLines2 = (day.notes||'').split('\n').filter(l=>l.trim());
          noteLines2.forEach(line => {
            doc.checkY(6);
            doc.text(pS(line.trim()),ML+3,doc.getY()+4,7.5,false,GRY);
            doc.addY(5);
          });
          doc.addY(2);
          break;
        }
      }
    });

    const pdfStr=buildPdf(doc.pages());
    const naming = st.exportNaming||{};
    const dispoDatum = day.date ? day.date.replace(/-/g,'') : '';
    const dispoPattern = naming.dispo || (naming.dispoParts||['{titel}','_','Dispo','_','Tag','{tag}']).join('');
    const dispoName = resolveExportName(dispoPattern, {titel:st.title||project.name||'Dispo', tag:dayIdx+1, datum:dispoDatum, dateFormat: (st.exportNaming||{}).dateFormat});
    openPdf(pdfStr, dispoName+'.pdf');
  } catch(e) {
    console.error('Dispo PDF error:',e);
    alert('Dispo-PDF Fehler:\n'+e.message+'\n'+(e.stack||''));
  } finally {
    if(setExporting)setExporting(false);
  }
}

function exportDrehplanPdf(project, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const doc = makeDoc();
    const {W,ML,MR,CW} = doc;
    const pS = pdfSafe;
    const fmtD = d => { try { const dt=new Date(d+'T12:00'); const dn=['So','Mo','Di','Mi','Do','Fr','Sa']; return dn[dt.getDay()]+', '+pad(dt.getDate())+'.'+pad(dt.getMonth()+1)+'.'+dt.getFullYear(); } catch(e){return d||'';} };
    const BLK=[0,0,0],WHT=[255,255,255],GRY=[130,130,130],LGY=[210,210,210];
    const DGY=[50,50,50],BG1=[248,248,248],HDR=[28,28,38],ACC=[200,140,30];

    // ── BESETZUNGSLEGENDE ─────────────────────────────────────────
    if (project.cast.length > 0) {
      const legend = project.cast.map((p,i)=>(i+1)+' = '+pS(p.name||p.role)+(p.name&&p.role?' ('+pS(p.role)+')':'')).join('   ');
      doc.text('Besetzung:  '+legend, ML, doc.getY()+4, 7.5, false, DGY);
      doc.addY(7);
    }

    // ── HEADER ────────────────────────────────────────────────────
    const hT=doc.getY(), hH=26;
    doc.rect(ML, hT, CW, hH, WHT);
    doc.line2(ML, hT, W-MR, hT, 0.3, LGY);
    doc.line2(ML, hT+hH, W-MR, hT+hH, 1, BLK);

    // Logo oder Firmenname links
    if (st.logo && st.logoHex) {
      try {
        const lhD = JSON.parse(st.logoHex);
        const logoHD = hH - 6;
        doc.pages().at(-1).lines.push({type:'image',hexData:lhD.hexData,alphaData:lhD.alphaHex||null,pxW:lhD.pxW,pxH:lhD.pxH,x:ML+1,y:hT+3,w:Math.round(logoHD*(lhD.ratio||3)),h:logoHD});
      } catch(e) { doc.text(pS(st.company||''), ML+2, hT+9, 10, true, BLK); }
    } else {
      doc.text(pS(st.company||''), ML+2, hT+9, 10, true, BLK);
    }

    // Titel ZENTRIERT
    doc.text(pS(st.title||''), ML+CW/2, hT+14, 20, true, BLK, 'center');
    doc.text('DREHPLAN', ML+CW/2, hT+22, 8, false, GRY, 'center');

    // Verantwortliche rechts — übereinander, nicht überlappend
    const resp = (st.respPersons||[]).filter(p=>p.value).slice(0,4);
    let ry = hT + 5;
    resp.forEach(p => {
      doc.text(pS(p.label)+':', W-MR-52, ry, 7, false, GRY);
      doc.text(pS(p.value), W-MR-30, ry, 7, true, DGY);
      ry += 4.5;
    });
    doc.setY(hT+hH+2);

    // ── TABELLEN-KOPF ─────────────────────────────────────────────
    // Spalten: Bild/Licht | V-Stopp/Seiten | Motiv/Inhalt | Darsteller | Notizen
    const COLS = [
      {w:18, h:'Bild\nLicht'},
      {w:18, h:'V-Stopp\nSeiten'},
      {w:CW-18-18-50-26, h:'Motiv / Inhalt'},
      {w:50, h:'Darsteller'},
      {w:26, h:'Notizen'},
    ];
    doc.rect(ML, doc.getY(), CW, 10, HDR);
    let hx = ML;
    COLS.forEach(col => {
      col.h.split('\n').forEach((l,li) => doc.text(l, hx+2, doc.getY()+3.5+li*3.3, 6.5, true, WHT));
      hx += col.w;
      if (hx < W-MR) doc.line2(hx, doc.getY(), hx, doc.getY()+10, 0.3, [80,80,100]);
    });
    doc.addY(11);

    // ── DREHTAGE ──────────────────────────────────────────────────
    const groups = buildGroups(project.shots);

    project.shootDays.forEach((day, di) => {
      doc.checkY(20);

      const grp = groups.find(g => {
        const lk = project.shootDays.find(d => d.id === g.divider.shootDayId);
        return lk && project.shootDays.indexOf(lk) === di;
      });
      const callT = grp?.divider?.callTime || day.callTime || '';
      const scIds = grp ? grp.sceneIds : new Set();
      const daySc = project.scenes.filter(sc => scIds.has(sc.id));

      // Gesamtminuten
      let totMin = 0;
      daySc.forEach(sc => {
        project.shots.filter(s=>s.type==='shot'&&s.scene===sc.id)
          .forEach(s => totMin += (s.setupMin||0)+(s.shootMin||0));
      });
      const totH=Math.floor(totMin/60), totM=totMin%60;

            // ── DREHTAG-BALKEN ─ alles in einer Zeile ──────────────────────────────
      const dtH = 9;
      const dtY = doc.getY(); // capture before rect
      doc.rect(ML, dtY, CW, dtH, HDR);
      let dtLeft = (di+1)+'. DREHTAG';
      if (day.date) dtLeft += ' - '+fmtD(day.date);
      doc.text(pS(dtLeft), ML+3, dtY+6.5, 9, true, WHT);
      let dtRight = [];
      if (callT) dtRight.push('Call: '+callT);
      if (totMin>0) dtRight.push('ca. '+totH+'h'+pad(totM)+'min');
      if (dtRight.length>0) doc.text(dtRight.join(' | '), W-MR-2, dtY+6.5, 8.5, true, ACC, 'right');
      doc.addY(dtH+1);

      // ── SZENEN-ZEILEN ─────────────────────────────────────────
      if (daySc.length === 0) {
        doc.text('Keine Szenen zugewiesen', ML+3, doc.getY()+5, 8, false, GRY);
        doc.addY(8);
      } else {
        daySc.forEach((sc, si) => {
          doc.checkY(14);
          const synTxt = pS(sc.synopsis||'');
          const synLines = synTxt ? Math.ceil(synTxt.length/42) : 0;
          const locTxt = pS((sc.interior||'INT')+'. '+(resolveSceneLocation(sc, project.locations||[]).title||sc.location||''));
          const scRolesForH = sc.castRoles && sc.castRoles.length > 0 ? sc.castRoles : [];
          const numRoles = scRolesForH.length;
          const rH = Math.max(14, 6 + Math.max(synLines>0 ? (synLines+2)*3.8 : 8, numRoles*4));
          doc.rect(ML, doc.getY(), CW, rH, si%2===0 ? WHT : BG1);
          doc.line2(ML, doc.getY()+rH, W-MR, doc.getY()+rH, 0.2, LGY);
          const rY = doc.getY()+4.5;
          let rx = ML;

          // Bild / Licht
          doc.text(String(sc.number), rx+2, rY, 11, true, BLK);
          doc.text(pS((sc.interior||'INT')+'/'+(sc.dayNight||'T').slice(0,1)), rx+2, rY+5.5, 6.5, false, GRY);
          rx += COLS[0].w; doc.line2(rx, doc.getY(), rx, doc.getY()+rH, 0.2, LGY);

          // V-Stopp / Seiten
          doc.text(sc.vorstopp||'--', rx+2, rY, 8, true, DGY);
          doc.text(sc.pages||'--', rx+2, rY+5, 7, false, GRY);
          rx += COLS[1].w; doc.line2(rx, doc.getY(), rx, doc.getY()+rH, 0.2, LGY);

          // Motiv / Inhalt
          doc.text(pS(sc.title||''), rx+2, rY, 9, true, BLK);
          doc.text(pS((sc.interior||'INT')+'. '+(resolveSceneLocation(sc, project.locations||[]).title||sc.location||'').slice(0,40)), rx+2, rY+5, 7.5, false, GRY);
          if (synTxt) {
            const synWords = synTxt.split(' ');
            let synLine='', synY=rY+9.5;
            const synMaxC = Math.floor((COLS[2].w-4)/(7*0.353*0.55));
            synWords.forEach(w => {
              if((synLine+' '+w).trim().length<=synMaxC) { synLine=(synLine+' '+w).trim(); }
              else { if(synLine) { doc.text(synLine,rx+2,synY,7,false,DGY); synY+=3.8; } synLine=w; }
            });
            if(synLine) doc.text(synLine,rx+2,synY,7,false,DGY);
          }
          rx += COLS[2].w; doc.line2(rx, doc.getY(), rx, doc.getY()+rH, 0.2, LGY);

          // Darsteller: sorted by Cast&Crew order, numbered
          const allCastRoles = [...new Set((project.cast||[]).map(p=>p.role).filter(Boolean))];
          const sceneRolesForPdf = sc.castRoles && sc.castRoles.length > 0
            ? sc.castRoles
            : [...new Set(project.cast.filter(p=>p.days.includes(di)).map(p=>p.role))];
          const sortedRoles = allCastRoles.filter(r => sceneRolesForPdf.includes(r));
          sortedRoles.slice(0,5).forEach((role,pi) => {
            const num = allCastRoles.indexOf(role)+1;
            doc.text(pS(num+' - '+role), rx+2, rY+pi*4, 6.5, false, DGY);
          });
          rx += COLS[3].w; doc.line2(rx, doc.getY(), rx, doc.getY()+rH, 0.2, LGY);

          // Notizen
          if (sc.notes) doc.text(pS(sc.notes.slice(0,28)), rx+2, rY, 7, false, GRY);
          doc.addY(rH);
        });
      }
      doc.addY(4);
    });

    // ── FUSSZEILE ─────────────────────────────────────────────────
    doc.checkY(10);
    doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.5, LGY);
    doc.addY(3);
    const summary = project.shootDays.map((d,i)=>(i+1)+'. DT: '+(d.date?fmtD(d.date):'TBD')).join('   ');
    doc.text(pS(summary), ML+2, doc.getY()+4, 7, false, GRY);

    const pdfStr = buildPdf(doc.pages());
    const dpNaming = st.exportNaming||{};
    const dpPattern = dpNaming.drehplan || (dpNaming.drehplanParts||['{titel}','_','Drehplan']).join('');
    const dpName = resolveExportName(dpPattern, {titel:st.title||project.name||'Drehplan', dateFormat: (st.exportNaming||{}).dateFormat});
    openPdf(pdfStr, dpName+'.pdf');
  } catch(e) {
    console.error('Drehplan PDF error:', e);
    alert('Drehplan-PDF Fehler:\n'+e.message);
  } finally {
    if (setExporting) setExporting(false);
  }
}


let _displayDateFormat = 'DDMMYYYY';

function fmtDate(d, fmt) {
  if (!d) return "";
  const dt = new Date(d + "T12:00:00");
  const f = fmt || _displayDateFormat;
  const day = WEEKDAYS[dt.getDay()];
  const dd = pad(dt.getDate()), mm = pad(dt.getMonth()+1), yyyy = dt.getFullYear(), yy = String(yyyy).slice(2);
  if (f === 'MMDDYYYY')  return day + ", " + mm + "/" + dd + "/" + yyyy;
  if (f === 'short')     return dd + "." + mm + ".";
  if (f === 'shortYear') return dd + "." + mm + "." + yy;
  if (f === 'iso')       return yyyy + "-" + mm + "-" + dd;
  if (f === 'noWeekday') return dd + "." + mm + "." + yyyy;
  return day + ", " + dd + "." + mm + "." + yyyy;
}
function fmtDateShort(d) {
  if (!d) return "";
  const dt = new Date(d + "T12:00:00");
  const dd = pad(dt.getDate()), mm = pad(dt.getMonth()+1), yyyy = dt.getFullYear();
  if (_displayDateFormat === 'MMDDYYYY') return mm + "/" + dd + "/" + yyyy;
  if (_displayDateFormat === 'iso')      return yyyy + "-" + mm + "-" + dd;
  return dd + "." + mm + "." + yyyy;
}
function minToTime(m) { const t = Math.max(0, m); return pad(Math.floor(t / 60) % 24) + ":" + pad(t % 60); }
function timeToMin(t) { if (!t) return 480; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

// ─── Helpers ──────────────────────────────────────────────────────────────────
// Build ordered list of "scene segments" per day.
// A segment = consecutive run of shots from same scene within a day-block.
// Returns: Map<dayDividerId, [{sceneId, segmentIndex, shotIds, setup, shoot}]>
// Also returns sceneSegmentLabel(dayId, sceneId, segmentIndex) -> "Szene #N" or "Szene #N.K"
function buildSceneSegments(shots) {
  const sorted = [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0));
  // dayBlocks: [{dayId, items}]
  const dayBlocks = [];
  let cur = null;
  sorted.forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") {
      cur = { dayId: s.id, items: [] };
      dayBlocks.push(cur);
    } else if (cur) {
      cur.items.push(s);
    }
  });

  // Per day, find segments (consecutive runs of same scene)
  // segMap: dayId -> [{sceneId, shotIds, setup, shoot}]
  const segMap = {};
  // Also track how many segments exist per scene across all days (for split label)
  const sceneSegCount = {}; // sceneId -> total segment count across all days

  dayBlocks.forEach(({ dayId, items }) => {
    const segs = [];
    let lastSceneId = null;
    items.forEach(s => {
      if (s.type !== "shot" || s.hidden || !s.scene) return;
      if (s.scene !== lastSceneId) {
        segs.push({ sceneId: s.scene, shotIds: [], setup: 0, shoot: 0 });
        lastSceneId = s.scene;
      }
      const seg = segs[segs.length - 1];
      seg.shotIds.push(s.id);
      seg.setup += s.setupMin || 0;
      seg.shoot += s.shootMin || 0;
    });
    segMap[dayId] = segs;
    segs.forEach(seg => {
      sceneSegCount[seg.sceneId] = (sceneSegCount[seg.sceneId] || 0) + 1;
    });
  });

  // Assign segment index per scene (global, in order of appearance)
  const sceneSegIdx = {}; // sceneId -> next index
  dayBlocks.forEach(({ dayId }) => {
    (segMap[dayId] || []).forEach(seg => {
      if (sceneSegCount[seg.sceneId] > 1) {
        if (sceneSegIdx[seg.sceneId] === undefined) sceneSegIdx[seg.sceneId] = 1;
        seg.part = sceneSegIdx[seg.sceneId]++;
      } else {
        seg.part = null;
      }
    });
  });

  return { segMap, sceneSegCount };
}

function useDrag(items, setItems) {
  const from = useRef(null);
  const [over, setOver] = useState(null);
  const onStart = id => { from.current = id; };
  const onOver = (e, id) => { e.preventDefault(); setOver(id); };
  const onDrop = toId => {
    if (!from.current || from.current === toId) { setOver(null); return; }
    const arr = [...items];
    const fi = arr.findIndex(x => x.id === from.current);
    const ti = arr.findIndex(x => x.id === toId);
    const [item] = arr.splice(fi, 1);
    arr.splice(ti, 0, item);
    setItems(arr);
    from.current = null; setOver(null);
  };
  const onEnd = () => { from.current = null; setOver(null); };
  // handle(id): props for a drag handle element (separate from drop target)
  const handle = id => ({
    draggable: true,
    onDragStart: e => { e.dataTransfer.effectAllowed='move'; onStart(id); },
    onDragEnd: onEnd,
  });
  // row(id): props for the drop-target row
  const row = id => ({
    onDragOver: e => onOver(e, id),
    onDrop: () => onDrop(id),
  });
  return { onStart, onOver, onDrop, onEnd, over, handle, row };
}

function Dashboard({ projects, onSelect, onNew, onDelete, onDemo, onExport, onImport, onArchive, showArchive, setShowArchive, isSignedIn, onSignIn, firebaseReady, onAddGuest }) {

  const [name, setName] = useState("");
  const [menuOpen, setMenuOpen] = useState(null);
  const active = projects.filter(p => !p.archived).sort((a,b)=>(b.lastEdited||0)-(a.lastEdited||0));
  const archived = projects.filter(p => p.archived);
  const shown = showArchive ? archived : active;
  const fmtRelTime = ts => {
    if (!ts) return "";
    const diff = Date.now() - ts;
    const min = Math.floor(diff/60000);
    if (min < 2) return "gerade eben";
    if (min < 60) return "vor " + min + " Min.";
    const h = Math.floor(min/60);
    if (h < 24) return "vor " + h + " Std.";
    const d = Math.floor(h/24);
    if (d < 7) return "vor " + d + " Tag" + (d>1?"en":"");
    return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"2-digit"});
  };
  return (
    <div onClick={() => setMenuOpen(null)}>
      <div style={{ ...S.row, marginBottom: 22, flexWrap: "wrap", gap: 10 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>{showArchive ? "Archiv" : "Meine Projekte"}</h1>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button style={{ ...S.btn(), fontSize: 11 }} onClick={onImport}>Importieren</button>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(240px,1fr))", gap: 14 }}>
        {shown.map(p => (
          <div key={p.id} style={{ ...S.card, marginBottom: 0, cursor: "pointer", position: "relative", paddingBottom: 14, borderLeft: p.__coproducer ? "4px solid #2f6ba1" : p.__guest ? "4px solid #e0a83a" : undefined }}
            onClick={() => onSelect(p.id)}>
            <div style={{ fontSize: 9, color: C.accent, textTransform: "none", letterSpacing:"0", marginBottom: 6 }}>
              {p.__coproducer ? <span style={{ color: "#2f6ba1", background:"var(--t-blue)", border:"1px solid #cfe0f0", borderRadius:980, padding:"1px 8px" }}>👥 Mitproducer · {p.guestRole||""}</span>
                : p.__guest ? <span style={{ color: "#9a6a1e", background:"var(--t-amber)", border:"1px solid #f3d9b8", borderRadius:980, padding:"1px 8px" }}>🔒 Gastzugang · {p.guestRole||"Gast"}</span>
                : showArchive ? <span style={{ color: "#d6a100" }}>Archiviert</span> : (p.settings?.projektArt || "Projekt")}
            </div>
            <div style={{ fontSize: 17, marginBottom: 6 }}>{p.name}</div>
            <div style={{ fontSize: 11, color: C.dim }}>{p.shootDays.length} Drehtage  {p.shots.filter(s => s.type !== "divider").length} Shots  {p.scenes.length} Szenen</div>
            {p.lastEdited && <div style={{ fontSize: 10, color: "var(--c-dim)", marginTop: 5 }}>Zuletzt: {fmtRelTime(p.lastEdited)}</div>}
            <div style={{ position: "absolute", top: 10, right: 10 }} onClick={e => e.stopPropagation()}>
              <button style={{ ...S.btn(), padding: "1px 8px", fontSize: 16, lineHeight: 1 }}
                onClick={e => { e.stopPropagation(); setMenuOpen(menuOpen === p.id ? null : p.id); }}>
                ⋮
              </button>
              {menuOpen === p.id && (
                <div style={{ position: "absolute", right: 0, top: 28, background: C.card, border: "1px solid "+C.border, borderRadius: 6, zIndex: 100, minWidth: 150, boxShadow: "0 4px 20px #0009" }}>
                  {[
                    { label: "Exportieren", fn: () => { onExport(p); setMenuOpen(null); } },
                    { label: p.archived ? "Wiederherstellen" : "Archivieren", fn: () => { onArchive(p.id, !p.archived); setMenuOpen(null); } },
                    { label: "Loeschen", fn: () => { onDelete(p.id); setMenuOpen(null); }, danger: true },

              <button style={S.btn("primary")} onClick={() => { if (name.trim()) { onNew(name.trim()); setName(""); } }}>
