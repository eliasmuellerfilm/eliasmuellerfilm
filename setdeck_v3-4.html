function Overview({ project }) {
  const [printing, doPrint] = usePrint();
  const shots = project.shots.filter(s => s.type === "shot");
  const dividers = project.shots.filter(s => s.type === "divider");
  const dayDivs = dividers.filter(s => s.dividerType === "day");
  const totalSetup = shots.reduce((s, x) => s + (x.setupMin || 0), 0);
  const totalShoot = shots.reduce((s, x) => s + (x.shootMin || 0), 0);
  const totalMin = totalSetup + totalShoot;
  // Pages (parse "2 3/8" format)
  const parsePage = p => {
    if (!p) return 0;
    const parts = p.trim().split(" ");
    let v = 0;
    parts.forEach(pt => {
      if (pt.includes("/")) { const [a, b] = pt.split("/").map(Number); v += a / b; }
      else { v += parseFloat(pt) || 0; }
    });
    return v;
  };
  const totalPages = project.scenes.reduce((s, sc) => s + parsePage(sc.pages), 0);
  const pagesStr = totalPages > 0 ? Math.floor(totalPages) + " " + Math.round((totalPages % 1) * 8) + "/8" : "0";
  // Vorstopp
  const latestVorstopp = project.scenes.filter(sc => sc.vorstopp).sort((a, b) => b.vorstopp.localeCompare(a.vorstopp))[0]?.vorstopp || "-";
  // Unassigned
  const shotInDay = new Set();
  let inD = false;
  [...project.shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") { inD = true; return; }
    if (s.type === "shot" && inD) shotInDay.add(s.id);
  });
  const unassigned = shots.filter(s => !shotInDay.has(s.id)).length;

  const Stat = ({ label, value, sub, accent }) => (
    <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 6, padding: "18px 20px" }}>
      <div style={{ fontSize: 10, color: C.dim, letterSpacing:"0", textTransform: "none", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 26, fontWeight: 400, color: accent ? C.accent : C.text }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.mid, marginTop: 4 }}>{sub}</div>}
    </div>
  );

  return (
    <div className={printing ? "print-root doc-a4" : undefined}>
      {printing && <h2 style={{ ...S.h1, fontSize:18, marginBottom:14 }}>Projektübersicht — {project.settings.title||"Projekt"}</h2>}
      <div className="no-print" style={{ ...S.row, marginBottom: 4, gap: 12 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Projektubersicht</h1>
        <button style={{ ...S.btn(), fontSize:11 }} onClick={doPrint}>Als PDF exportieren</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: 12, marginBottom: 20 }}>
        <Stat label="Drehtage" value={project.shootDays.length} sub={dayDivs.length > 0 ? dayDivs.length + " in Shotlist eingetragen" : "noch keine in Shotlist"} />
        <Stat label="Szenen" value={project.scenes.length} />
        <Stat label="Shots gesamt" value={shots.length} sub={unassigned > 0 ? unassigned + " nicht zugeordnet" : "alle zugeordnet"} accent={unassigned > 0} />
        <Stat label="Seiten gesamt" value={pagesStr} />
        <Stat label="Geplante Drehzeit" value={Math.floor(totalMin / 60) + "h " + (totalMin % 60) + "m"} sub={"Aufbau: " + totalSetup + "m  Dreh: " + totalShoot + "m"} />
        <Stat label="Crew" value={project.crew.length} />
        <Stat label="Cast" value={project.cast.length} />
        <Stat label="Letzter Vorstopp" value={latestVorstopp} />
      </div>

      {/* Drehtage summary */}
      {project.shootDays.length > 0 && (
        <div style={S.card}>
          <div style={S.ct}>Drehtage im Ueberblick</div>
          <table style={S.tbl}>
            <thead><tr>{["Tag", "Datum", "Location", "Call", "Anmerkungen"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {project.shootDays.map((d, i) => (
                <tr key={d.id}>
                  <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>{i + 1}</td>
                  <td style={S.td}>{d.date ? fmtDate(d.date) : "-"}</td>
                  <td style={S.td}>{d.locationTitle || d.location || "-"}{d.locationAddress ? " (" + d.locationAddress + ")" : ""}</td>
                  <td style={S.td}>{d.callTime || "-"}</td>
                  <td style={{ ...S.td, color: C.mid, fontSize: 11 }}>{d.notes || "-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Scenes summary */}
      {project.scenes.length > 0 && (
        <div style={S.card}>
          <div style={S.ct}>Szenen im Ueberblick</div>

                                  placeholder="Freitext..."
                                  defaultValue=""
                                  onBlur={e => {
                                    const newParts = [...parts];
                                    newParts[pi] = e.target.value || '_';
                                    setParts(key, newParts);
                                  }} />
                              : <select style={{ ...S.input, padding:'3px 6px', fontSize:11 }}
                                  value={TOKENS.some(t=>t.value===part) ? part : 'custom'}
                                  onChange={e => {
                                    const newParts = [...parts];
                                    newParts[pi] = e.target.value;
                                    setParts(key, newParts);
                                  }}>
                                  {TOKENS.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                                  {!TOKENS.some(t=>t.value===part) && <option value={part}>"{part}"</option>}
                                </select>}
                            {parts.length > 1 && (
                              <span onClick={() => setParts(key, parts.filter((_,i)=>i!==pi))}
                                style={{ cursor:'pointer', color:C.dim, fontSize:12, padding:'0 2px' }}>×</span>
                            )}
                          </div>
                        ))}
                        <span onClick={() => setParts(key, [...parts, '_'])}
                          style={{ cursor:'pointer', color:C.accent, fontSize:16, lineHeight:1, padding:'0 4px',
                            border:'1px solid '+C.border, borderRadius:4 }}>+</span>
                      </div>
                      <div style={{ fontSize:10, color:C.dim, marginTop:4, fontFamily:SF }}>
                        Vorschau: {preview}.pdf
                      </div>
                    </div>
                  );
                })}
              </div>
            );
        })()}
      </div>
    </div>
  );
}

function ShootDays({ project, onChange }) {
  const drag = useDrag(project.shootDays, days => onChange({ ...project, shootDays: days }));
  const upd = (i, patch) => {
    const days = [...project.shootDays];
    days[i] = { ...days[i], ...patch };
    const updatedShots = project.shots.map(s =>
      s.type === "divider" && s.dividerType === "day" && s.shootDayId === days[i].id && patch.callTime
        ? { ...s, callTime: patch.callTime } : s
    );
    onChange({ ...project, shootDays: days, shots: updatedShots });
  };
  const add = () => onChange({ ...project, shootDays: [...project.shootDays, { id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" }] });
  const remove = i => onChange({ ...project, shootDays: project.shootDays.filter((_, j) => j !== i) });
  const [open, setOpen] = React.useState({});
  const toggle = id => setOpen(o => ({ ...o, [id]: !o[id] }));
  return (
    <div>
      <div style={{ ...S.row, marginBottom: 20 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Drehtage</h1>
        <button style={S.btn("primary")} onClick={add}><Icon name="plus" size={13} /> Drehtag</button>
      </div>
      {project.shootDays.map((day, i) => {
        const dayCrew = project.crew.filter(p=>p.days.includes(i)).length;
        const dayCast = project.cast.filter(p=>p.days.includes(i)).length;
        const isOpen = open[day.id];
        const addr = (day.locationId ? locAddress((project.locations||[]).find(l=>l.id===day.locationId)) : null) || day.locationAddress || "";
        const dateStr = day.date ? fmtDate(day.date) : "Kein Datum";
        return (
        <div key={day.id} onDragOver={e => drag.onOver(e, day.id)} onDrop={() => drag.onDrop(day.id)} onDragEnd={drag.onEnd}
          style={{ ...S.card, marginBottom: 12, opacity: drag.over === day.id ? 0.5 : 1 }}>
          <div style={{ ...S.row, marginBottom: isOpen ? 16 : 0, flexWrap: "wrap" }}>
            <span draggable onDragStart={() => drag.onStart(day.id)} style={{ color: C.dim, cursor: "grab", padding: "0 4px" }}><Icon name="drag" /></span>
            <button onClick={() => toggle(day.id)} title={isOpen?"Einklappen":"Aufklappen"}
              style={{ background:"none", border:"none", cursor:"pointer", color:C.dim, fontSize:13, padding:"0 2px", display:"flex", alignItems:"center" }}>
              <span style={{ display:"inline-block", transform:isOpen?"rotate(90deg)":"none", transition:"transform .15s" }}>▸</span>
            </button>
            <span style={{ ...S.badge, flexShrink: 0 }}>Tag {i + 1}</span>
            {isOpen ? (
              <div style={{ flex: 1 }} />
            ) : (
              <div onClick={() => toggle(day.id)} style={{ flex: 1, cursor: "pointer", fontSize: 13, color: C.mid, minWidth: 0 }}>
                <strong style={{ color: C.text, fontWeight: 600 }}>{dateStr}</strong>{addr ? " · " + addr : ""}
              </div>
            )}
            {dayCrew + dayCast > 0 && (
              <div style={{ fontSize: 12, color: C.dim, display: "flex", gap: 14, alignItems: "center" }}>
                <span>Crew <strong style={{ color: C.mid }}>{dayCrew}</strong></span>
                <span>Cast <strong style={{ color: C.mid }}>{dayCast}</strong></span>
                <span><strong style={{ color: C.accent }}>{dayCrew + dayCast}</strong> ges.</span>
              </div>
            )}
            <button style={S.btn("danger")} onClick={() => remove(i)}><Icon name="trash" size={13} /></button>
          </div>
          {isOpen && (<>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <FG label="Datum"><input style={S.input} type="date" value={day.date} onChange={e => upd(i, { date: e.target.value })} /></FG>
            <FG label="Call Time" tip="Wird mit Shotlist synchronisiert">
              <input style={S.input} type="time" value={day.callTime} onChange={e => upd(i, { callTime: e.target.value })} />
            </FG>
          </div>
          <FG label="Drehort-Adresse">
            <input style={S.input} list={"sd-locs-"+day.id}
              value={(day.locationId ? locAddress((project.locations||[]).find(l=>l.id===day.locationId)) : null) || day.locationAddress || ""} placeholder="Adresse oder aus Locations wählen..."
              onChange={e => {
                const matched = (project.locations||[]).find(l => locAddress(l)===e.target.value);
                upd(i, { locationAddress: e.target.value, locationId: matched?.id||null });
              }} />
            <datalist id={"sd-locs-"+day.id}>
              {[...new Set((project.locations||[]).map(l => locAddress(l)).filter(Boolean))].map(addr => (
                <option key={addr} value={addr} />
              ))}
            </datalist>
          </FG>
          <FG label="Anmerkungen" style={{ marginBottom: 0 }}><textarea style={S.ta} rows={2} value={day.notes} placeholder="Interne Notizen..." onChange={e => upd(i, { notes: e.target.value })} /></FG>
          </>)}
        </div>
        );
      })}
    </div>
  );
}

// Top-level to avoid re-mount on state change (fixes focus loss bug)
function AutoTextarea({ value, onChange, placeholder, style }) {
  const ref = React.useRef(null);
  const resize = () => { const el = ref.current; if (el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; } };
  React.useEffect(() => { resize(); }, [value]);
  return <textarea ref={ref} value={value || ''} placeholder={placeholder} rows={1}
    onChange={e => { onChange(e.target.value); resize(); }}
    style={{ ...style, resize: 'none', overflow: 'hidden', lineHeight: 1.35 }} />;
}

function CastingFieldInput({ f, value, onChange }) {
  const baseInp = { ...S.input, flex: 1, fontSize: 10, padding: '2px 4px' };
  const type = f.type || 'text';
  if (type === 'textarea')
    return <AutoTextarea value={value} onChange={onChange} placeholder='…' style={baseInp} />;
  if (type === 'dropdown')
    return (
      <select style={{ ...baseInp, cursor: 'pointer' }} value={value || ''} onChange={e => onChange(e.target.value)}>
        <option value=''>–</option>
        {(f.options || []).map((o, i) => <option key={i} value={o}>{o}</option>)}
      </select>);
  if (type === 'url')
    return (
      <span style={{ display: 'flex', flex: 1, gap: 3, alignItems: 'center', minWidth: 0 }}>
        <input style={baseInp} value={value || ''} placeholder='https://…' onChange={e => onChange(e.target.value)} />
        {value ? <a href={/^https?:\/\//.test(value) ? value : 'https://' + value} target='_blank' rel='noopener noreferrer'
          style={{ fontSize: 12, color: C.accent, textDecoration: 'none', flexShrink: 0 }} title='Öffnen'>↗</a> : null}
      </span>);
  if (type === 'checkbox')
    return <input type='checkbox' checked={!!value} onChange={e => onChange(e.target.checked)}
      style={{ width: 15, height: 15, accentColor: C.accent, cursor: 'pointer' }} />;
  if (type === 'rating') {
    const rt = f.ratingType || 'stars';
    if (rt === 'stars') {
      const n = parseInt(value) || 0;
      return <span style={{ display: 'flex', gap: 1 }}>
        {[1, 2, 3, 4, 5].map(i => (
          <span key={i} onClick={() => onChange(String(i === n ? 0 : i))}
            style={{ cursor: 'pointer', fontSize: 13, color: i <= n ? '#f4b400' : C.border, lineHeight: 1 }}>★</span>))}
      </span>;
    }
    const opts = rt === 'letter' ? ['A', 'B', 'C'] : ['1', '2', '3', '4', '5'];
    return <span style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
      {opts.map(o => (
        <span key={o} onClick={() => onChange(o === value ? '' : o)}
          style={{ cursor: 'pointer', fontSize: 10, fontWeight: 700, padding: '2px 5px', borderRadius: 4,
            border: '1px solid ' + C.border, background: value === o ? C.accent : C.card, color: value === o ? '#fff' : C.mid }}>{o}</span>))}
    </span>;
  }
  return <input style={baseInp} value={value || ''} placeholder='…' onChange={e => onChange(e.target.value)} />;
}

function CastingTab({ project, onChange }) {
  const [printing, doPrint] = usePrint();
  // Auto-compute cast days from scene assignments for display
  const cast = React.useMemo(() => {
    const computed = computeCastDaysFromScenes(project);
    return computed.cast || project.cast || [];
  }, [project]);
  const [lightbox, setLightbox] = React.useState(null);

  // Single unified drag state
  const dragRef = React.useRef(null); // { id: candidateId }
  const [dragOverId, setDragOverId] = React.useState(null); // candidate id being hovered
  const [dragOverRole, setDragOverRole] = React.useState(null); // role label being hovered

  // Derived: group cast by role (order preserved)
  const roleGroups = React.useMemo(() => {
    const seen = [], map = {};
    cast.forEach(p => {
      const k = p.role||'—';
      if (!map[k]) { seen.push(k); map[k]={roleLabel:k,candidates:[]}; }
      map[k].candidates.push(p);
    });
    return seen.map(k=>map[k]);
  }, [cast]);

  // ── updPerson: update + enforce one besetzt per role ────────────────────────
  const updPerson = (id, patch) => {
    let updated = cast.map(p => p.id===id ? {...p,...patch} : p);
    // If setting to besetzt: demote previous besetzt in same role to kandidat
    if (patch.castingStatus === 'besetzt') {
      const thisPerson = updated.find(p => p.id===id);
      updated = updated.map(p =>
        p.id!==id && p.role===thisPerson?.role && p.castingStatus==='besetzt'
          ? {...p, castingStatus:'kandidat'}
          : p
      );
    }
    onChange({ ...project, cast: updated });
  };

  const remPerson = id => {
    if(window.confirm('Kandidat entfernen?'))
      onChange({ ...project, cast: cast.filter(p=>p.id!==id) });
  };

  // ── Benutzerdefinierte Casting-Felder ───────────────────────────────────────
  const castingFields = project.castingFields || [];
  const [showFields, setShowFields] = React.useState(false);
  const addField = () => onChange({ ...project, castingFields:[...castingFields, { id:uid(), label:'Neues Feld', type:'text' }] });
  const updField = (id, patch) => onChange({ ...project, castingFields:castingFields.map(f=>f.id===id?{...f,...patch}:f) });
  const remField = id => onChange({ ...project, castingFields:castingFields.filter(f=>f.id!==id) });

  const addRole = () => {
    // Ensure unique role name
    const existingRoles = new Set(cast.map(p=>p.role));
    let newRoleName = 'Neue Rolle';
    let i = 2;
    while (existingRoles.has(newRoleName)) { newRoleName = 'Neue Rolle '+i; i++; }
    onChange({ ...project, cast:[...cast,
      { id:uid(), name:'', role:newRoleName, days:[], castingNote:'',
        castingPhoto:null, profileLink:'', showreelLink:'', castingtapeLink:'',
        castingStatus:'offen' }] });
  };

  const addCandidate = roleLabel => {
    onChange({ ...project, cast:[...cast,
      { id:uid(), name:'', role:roleLabel, days:[], castingNote:'',
        castingPhoto:null, profileLink:'', showreelLink:'', castingtapeLink:'',
        castingStatus:'kandidat' }] });
  };

  // ── Drag handlers ────────────────────────────────────────────────────────────
  const onDragStart = id => { dragRef.current = id; };
  const onDragOver = id => setDragOverId(id);
  const onDragEnd = () => { dragRef.current=null; setDragOverId(null); setDragOverRole(null); };

  // Called when dropping ON a candidate card (same or different role)
  const onDropOnCand = ({toType, toId, alt}) => {
    const fromId = dragRef.current;
    if (!fromId || fromId===toId) { onDragEnd(); return; }
    const fromP = cast.find(p=>p.id===fromId);
    const toP = cast.find(p=>p.id===toId);
    if (!fromP || !toP) { onDragEnd(); return; }

    if (fromP.role === toP.role) {
      // Same role → reorder
      const inRole = cast.filter(p=>p.role===fromP.role);
      const others = cast.filter(p=>p.role!==fromP.role);
      const fi=inRole.findIndex(p=>p.id===fromId);
      const ti=inRole.findIndex(p=>p.id===toId);
      const arr=[...inRole]; arr.splice(fi,1); arr.splice(ti,0,inRole[fi]);
      onChange({ ...project, cast:[...others,...arr] });
    } else {
      // Different role → move or copy
      if (alt) {
        onChange({ ...project, cast:[...cast, {...fromP, id:uid(), role:toP.role}] });
      } else {
        onChange({ ...project, cast:cast.map(p=>p.id===fromId?{...p,role:toP.role}:p) });
      }
    }
    onDragEnd();
  };

  // Called when dropping ON a role header zone
  const onDropOnRole = (toRole, alt) => {
    // Check if this is a ROLE reorder (roleFromRef set) or CANDIDATE move (dragRef set)
    const fromRole = roleFromRef.current;
    if (fromRole && fromRole !== toRole) {
      // Role reorder
      const order = roleGroups.map(g=>g.roleLabel);
      const fi=order.indexOf(fromRole), ti=order.indexOf(toRole);
      if(fi>=0 && ti>=0) {
        const arr=[...order]; arr.splice(fi,1); arr.splice(ti,0,fromRole);
        const sorted=arr.flatMap(r=>cast.filter(p=>(p.role||'—')===r));
        const rest=cast.filter(p=>!arr.includes(p.role||'—'));
        onChange({ ...project, cast:[...sorted,...rest] });
      }
      roleFromRef.current=null; setDragOverRole(null);
      return;
    }
    // Candidate move/copy to role
    const fromId = dragRef.current;
    if (!fromId) { onDragEnd(); return; }
    const fromP = cast.find(p=>p.id===fromId);
    if (!fromP || fromP.role===toRole) { onDragEnd(); return; }
    if (alt) {
      onChange({ ...project, cast:[...cast, {...fromP, id:uid(), role:toRole}] });
    } else {
      onChange({ ...project, cast:cast.map(p=>p.id===fromId?{...p,role:toRole}:p) });
    }
    onDragEnd();
  };

  // Role reorder (drag role header)
  const roleFromRef = React.useRef(null);
  const onRoleDragStart = label => { roleFromRef.current=label; };
  const onRoleDrop = toLabel => {
    const fromLabel = roleFromRef.current;
    if (!fromLabel || fromLabel===toLabel) { roleFromRef.current=null; return; }
    const order = roleGroups.map(g=>g.roleLabel);
    const fi=order.indexOf(fromLabel), ti=order.indexOf(toLabel);
    if(fi<0||ti<0){roleFromRef.current=null;return;}
    const arr=[...order]; arr.splice(fi,1); arr.splice(ti,0,fromLabel);
    const sorted=arr.flatMap(r=>cast.filter(p=>(p.role||'—')===r));
    const rest=cast.filter(p=>!arr.includes(p.role||'—'));
    onChange({ ...project, cast:[...sorted,...rest] });
    roleFromRef.current=null;
  };

  return (
    <div className={printing ? "print-root doc-a4" : undefined}>
      {printing && <h2 style={{ ...S.h1, fontSize:18, marginBottom:14 }}>Casting — {project.settings?.title||"Projekt"}</h2>}
      <div className="no-print" style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16 }}>
        <h1 style={S.h1}>Casting</h1>
        <span style={{ fontSize:10, color:C.dim, marginLeft:8 }}>
          Kandidaten ziehen zum Verschieben · ⌥+Ablegen zum Kopieren
        </span>
        <button style={{ ...S.btn(), marginLeft:'auto' }} onClick={()=>setShowFields(v=>!v)}>
          ⚙ Felder
        </button>
        <button style={S.btn()} onClick={doPrint}>PDF</button>
        <button style={S.btn('primary')} onClick={addRole}>
          + Rolle anlegen
        </button>
      </div>

      {showFields && (
        <div className="no-print" style={{ ...S.card, marginBottom:16 }}>
          <div style={{ ...S.row, marginBottom:10 }}>
            <span style={{ ...S.ct, marginBottom:0 }}>Benutzerdefinierte Felder</span>
            <button style={{ ...S.btn('xs'), marginLeft:'auto' }} onClick={addField}><Icon name="plus" size={12}/> Feld</button>
          </div>
          {castingFields.length===0
            ? <div style={{ fontSize:12, color:C.dim }}>Noch keine eigenen Felder. Lege z. B. „Agentur", „Gage" oder „Verfügbarkeit" an – sie erscheinen dann bei jeder Casting-Karte.</div>
            : <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {castingFields.map(f => (
                  <div key={f.id} style={{ display:'flex', flexDirection:'column', gap:6, padding:'8px 10px', border:'1px solid '+C.border, borderRadius:8, background:'var(--c-hover)' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <input style={{ ...S.input, flex:1, fontSize:13 }} value={f.label}
                        onChange={e=>updField(f.id, { label:e.target.value })} placeholder='Feldname…' />
                      <select style={{ ...S.input, width:150, fontSize:12 }} value={f.type||'text'}
                        onChange={e=>updField(f.id, { type:e.target.value })}>
                        <option value='text'>Freitext (kurz)</option>
                        <option value='textarea'>Freitext (mehrzeilig)</option>
                        <option value='dropdown'>Dropdown</option>
                        <option value='url'>URL / Link</option>
                        <option value='checkbox'>Checkbox</option>
                        <option value='rating'>Bewertung</option>
                      </select>
                      <span onClick={()=>remField(f.id)} style={{ color:C.dim, cursor:'pointer', fontSize:18, padding:'0 4px' }} title="Feld löschen">×</span>
                    </div>
                    {f.type==='dropdown' && (
                      <input style={{ ...S.input, fontSize:12 }} value={(f.options||[]).join(', ')}
                        onChange={e=>updField(f.id, { options:e.target.value.split(',').map(s=>s.trim()).filter(Boolean) })}
                        placeholder='Optionen, durch Komma getrennt (z. B. Ja, Nein, Vielleicht)' />
                    )}
                    {f.type==='rating' && (
                      <select style={{ ...S.input, width:200, fontSize:12 }} value={f.ratingType||'stars'}
                        onChange={e=>updField(f.id, { ratingType:e.target.value })}>
                        <option value='stars'>Sterne (1–5)</option>
                        <option value='num5'>Zahlen (1–5)</option>
                        <option value='letter'>Buchstaben (A–C)</option>
                      </select>
                    )}
                  </div>
                ))}
              </div>}
        </div>
      )}

      {roleGroups.length===0 && (
        <div style={{ ...S.card, color:C.dim, textAlign:'center', padding:40 }}>
          Noch keine Rollen. Klicke "+ Rolle anlegen" oder füge Darsteller in Cast & Crew hinzu.
        </div>
      )}

      {roleGroups.map((group, gi) => (
        <div key={group.roleLabel+gi} style={{ marginBottom:24 }}>
          {/* Role header — droppable + draggable */}
          <div
            onDragOver={e => { e.preventDefault(); setDragOverRole(group.roleLabel); }}
            onDrop={e => { e.preventDefault(); onDropOnRole(group.roleLabel, e.altKey); }}
            style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10,
              paddingBottom:6, paddingTop:4,
              borderBottom:'2px solid '+(dragOverRole===group.roleLabel?'#d4e0ed':'var(--c-border)'),
              borderRadius:4,
              background: dragOverRole===group.roleLabel ? 'var(--t-blue)' : 'transparent',
              transition:'background 0.15s, border-color 0.15s' }}>
            {/* Role drag handle */}
            <span draggable
              onDragStart={e => {
                e.dataTransfer.effectAllowed='move';
                e.stopPropagation();
                // Clear any candidate drag state, this is a role drag
                dragRef.current = null;
                setCandOver(null);
                onRoleDragStart(group.roleLabel);
              }}
              onDragEnd={() => { roleFromRef.current=null; setDragOverRole(null); }}
              style={{ color:'rgba(255,255,255,0.5)', fontSize:16, flexShrink:0,
                cursor:'grab', padding:'2px 4px', userSelect:'none', WebkitUserSelect:'none',
                lineHeight:1 }}>⠿</span>
            <input
              key={'role-'+group.roleLabel}
              style={{ background:'transparent', border:'none', color:C.accent,
                fontSize:14, fontWeight:700, fontFamily:'inherit', outline:'none', flex:1 }}
              defaultValue={group.roleLabel==='—'?'':group.roleLabel}
              placeholder='Rollenname (Figur)...'
              onClick={e => e.stopPropagation()}
              onBlur={e => {
                const newRole = e.target.value.trim() || group.roleLabel;
                if (newRole !== group.roleLabel) {
                  onChange({ ...project,
                    cast: cast.map(p=>p.role===group.roleLabel?{...p,role:newRole}:p) });
                }
              }} />
            <span style={{ fontSize:11, color:C.dim, flexShrink:0 }}>
              {group.candidates.length} Kandidat{group.candidates.length!==1?'en':''}
            </span>
            <button style={{ ...S.btn('xs'), fontSize:10, flexShrink:0 }}
              onClick={e => { e.stopPropagation(); addCandidate(group.roleLabel); }}>
              + Kandidat
            </button>
          </div>

          {/* Drop zone for moving candidates to this role (when no candidates yet) */}
          <div
            onDragOver={e => { e.preventDefault(); setDragOverRole(group.roleLabel); }}
            onDrop={e => { e.preventDefault(); onDropOnRole(group.roleLabel, e.altKey); }}
            style={{ display:'grid',
              gridTemplateColumns:'repeat(auto-fill, minmax(190px, 1fr))', gap:12,
              minHeight: group.candidates.length===0 ? 80 : 0 }}>
            {group.candidates.map(p => (
              <CandidateCard key={p.id} p={p}
                updPerson={updPerson} remPerson={remPerson} setLightbox={setLightbox}
                castingFields={castingFields}
                dragOver={dragOverId===p.id}
                onDragStart={onDragStart}
                onDragOver={onDragOver}
                onDrop={onDropOnCand}
                onDragEnd={onDragEnd}
              />
            ))}
            {group.candidates.length===0 && (
              <div style={{ border:'2px dashed var(--c-border)', borderRadius:8,
                display:'flex', alignItems:'center', justifyContent:'center',
                color:C.dim, fontSize:11, minHeight:70, gridColumn:'1/-1',
                background: dragOverRole===group.roleLabel ? 'var(--t-blue)' : 'transparent' }}>
                Kandidaten hierher ziehen
              </div>
            )}
          </div>
        </div>
      ))}

      {lightbox && (
        <div onClick={()=>setLightbox(null)}
          style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:9999,
            display:'flex', alignItems:'center', justifyContent:'center',
            flexDirection:'column', gap:12 }}>
          <img src={lightbox.src} alt=""
            style={{ maxWidth:'90vw', maxHeight:'88vh', objectFit:'contain', borderRadius:8 }} />
          {lightbox.caption&&<div style={{color:'var(--c-text)',fontSize:14}}>{lightbox.caption}</div>}
          <div style={{color:'var(--c-dim)',fontSize:11}}>Klicken zum Schließen</div>
        </div>
      )}
    </div>
  );
}

function CastCrew({ project, onChange }) {
  // Drehtage automatisch aus Szenen berechnen (read-only Anzeige)
  const cast = React.useMemo(() => {
    try {
      const computed = computeCastDaysFromScenes(project);
      return computed.cast || project.cast || [];
    } catch(e) { return project.cast || []; }
  }, [project.scenes, project.shots, project.shootDays, project.cast]);
  const crew = project.crew || [];

  const onCrewChange = newCrew => {
    const resp = project.settings.respPersons;
    if (!resp) { onChange({...project, crew:newCrew}); return; }
    const crewMap = {};
    newCrew.forEach(cr => { if (cr.role) crewMap[cr.role] = cr.name||''; });
    const newResp = resp.map(r => crewMap[r.label]!==undefined ? {...r,value:crewMap[r.label]} : r);
    onChange({...project, crew:newCrew, settings:{...project.settings, respPersons:newResp}});
  };

  // Build ordered unique roles
  // Compute which days each role is needed — purely from scene assignments
  const roleDayMap = React.useMemo(() => {
    const map = {};
    const sceneDayMap = {};
    const groups = buildGroups(project.shots||[]);
    groups.forEach((group, gi) => {
      const sd = (project.shootDays||[]).find(d=>d.id===group.divider?.shootDayId);
      const di = sd ? project.shootDays.indexOf(sd) : gi;
      (group.shots||[]).forEach(s => {
        if (s.type==='shot' && s.scene) {
          if (!sceneDayMap[s.scene]) sceneDayMap[s.scene] = new Set();
          sceneDayMap[s.scene].add(di);
        }
      });
    });
    (project.scenes||[]).forEach(sc => {
      (sc.castRoles||[]).forEach(role => {
        if (!map[role]) map[role] = new Set();
        (sceneDayMap[sc.id]||new Set()).forEach(d => map[role].add(d));
      });
    });
    return map;
  }, [project.shots, project.scenes, project.shootDays]);

  const getUniqueRoles = () => {
    const seen = [], map = {};
    cast.forEach(p => {
      const role = p.role||'';
      if (!map[role]) { seen.push(role); map[role]=[]; }
      map[role].push(p);
    });
    return seen.map(role => {
      const besetzt = map[role].find(p=>p.castingStatus==='besetzt')||null;
      // Days: auto-computed from scene assignments (read-only display)
      const computedDays = [...(roleDayMap[role] || [])].sort((a,b)=>a-b);
      return { id: role||'__empty__', role, besetzt, days: computedDays };
    });
  };
  const roleRows = getUniqueRoles();

  const drag = useDrag(roleRows, reordered => {
    const newOrder = reordered.map(r=>r.role);
    const sorted = newOrder.flatMap(role => cast.filter(p=>p.role===role));
    const rest = cast.filter(p=>!newOrder.includes(p.role));
    onChange({...project, cast:[...sorted,...rest]});
  });

  const addCastRole = () => {
    const existing = new Set(cast.map(p=>p.role));
    let name='Neue Rolle'; let i=2;
    while(existing.has(name)){name='Neue Rolle '+i;i++;}
    onChange({...project, cast:[...cast,
      {id:uid(),name:'',role:name,days:[],castingStatus:'offen',
       castingNote:'',castingPhoto:null,profileLink:'',showreelLink:'',castingtapeLink:''}]});
  };

  const deleteCastRole = role => {
    if(!window.confirm('Alle Kandidaten für "'+role+'" entfernen?')) return;
    onChange({...project, cast:cast.filter(p=>p.role!==role)});
  };

  const renameCastRole = (oldRole, newRole) => {
    if(!newRole.trim()||newRole===oldRole) return;
    onChange({...project, cast:cast.map(p=>p.role===oldRole?{...p,role:newRole}:p)});
  };

  const setBesetzt = (role, name) => {
    let nc = [...cast];
    const existing = nc.find(p=>p.role===role&&p.castingStatus==='besetzt');
    if(existing) {
      nc = nc.map(p=>p.id===existing.id?{...p,name}:p);
    } else {
      const match = nc.find(p=>p.role===role&&p.name===name);
      if(match) {
        nc = nc.map(p=>p.role===role?{...p,castingStatus:p.id===match.id?'besetzt':'kandidat'}:p);
      } else if(name.trim()) {
        nc=[...nc,{id:uid(),name,role,days:[],castingStatus:'besetzt',
          castingNote:'',castingPhoto:null,profileLink:'',showreelLink:'',castingtapeLink:''}];
      }
    }
    onChange({...project,cast:nc});
  };

  const toggleDay = (role, di) => {
    // Use besetzt person if exists, else any person in this role (days stored on first)
    const b = cast.find(p=>p.role===role&&p.castingStatus==='besetzt')
           || cast.find(p=>p.role===role);
    if(!b) return;
    const days = b.days?.includes(di) ? b.days.filter(d=>d!==di) : [...(b.days||[]),di];
    // Store days on ALL persons in this role so they survive status changes
    onChange({...project, cast:cast.map(p=>p.role===role?{...p,days}:p)});
  };

  const [printing, doPrint] = usePrint();
  return (
    <div className={printing ? "print-root doc-a4" : undefined}>
      {printing && <h2 style={{ ...S.h1, fontSize:18, marginBottom:14 }}>Cast & Crew — {project.settings.title||"Projekt"}</h2>}
      <div className="no-print" style={{display:"flex",alignItems:"center",gap:10,marginBottom:22}}><h1 style={{...S.h1,marginBottom:0}}>Cast & Crew</h1><button style={{...S.btn(),fontSize:10}} onClick={doPrint}>🖨 PDF</button></div>
      <div style={S.card}>
        <div style={{ ...S.row, marginBottom: 14 }}>
          <span style={{ ...S.ct, marginBottom: 0 }}>Cast</span>
          <button style={S.btn()} onClick={addCastRole}><Icon name="plus" size={14}/></button>
        </div>
        <table style={S.tbl}>
          <thead><tr>
            <th style={S.th}/><th style={S.th}>#</th>
            <th style={S.th}>Rolle / Figur</th>
            <th style={S.th}>Name (Besetzt)</th>
            {project.shootDays.map((_,i)=><th key={i} style={{...S.th,fontSize:9,padding:'2px 3px'}}>T{i+1}</th>)}
            <th style={S.th}/>
          </tr></thead>
          <tbody>
            {roleRows.map((row,idx)=>(
              <tr key={row.role} {...drag.row(row.id)}
                style={{background:drag.over===row.id?C.hover:'transparent',transition:'background 0.1s'}}>
                <td style={S.td}>
                  <span {...drag.handle(row.id)} style={{cursor:'grab',color:C.dim,fontSize:14,padding:'0 4px',userSelect:'none'}}>⠿</span>
                </td>
                <td style={S.td}><span style={{color:C.dim,fontSize:11}}>{idx+1}</span></td>
                <td style={S.td}>
                  <input key={'r-'+row.role} style={{...S.input,minWidth:100}}
                    defaultValue={row.role} placeholder="Figur / Rolle..."
                    onBlur={e=>renameCastRole(row.role,e.target.value)}/>
                </td>
                <td style={S.td}>
                  <input key={'n-'+row.role} style={{...S.input,minWidth:120,
                    color:row.besetzt?'var(--c-mid)':C.dim, fontStyle:row.besetzt?'normal':'italic'}}
                    defaultValue={row.besetzt?.name||''} placeholder="— noch unbesetzt —"
                    onBlur={e=>setBesetzt(row.role,e.target.value)}/>
                </td>
                {project.shootDays.map((_,di)=>(
                  <td key={di} style={{...S.td,textAlign:'center'}}>
                    <input type="checkbox"
                      checked={!!(row.days?.includes(di))}
                      readOnly
                      onChange={()=>{}}
                      title="Wird automatisch aus den Szenen berechnet"
                      style={{ cursor:'not-allowed', opacity:0.4,
                        accentColor:'var(--c-dim)', filter:'grayscale(1)' }}/>
                  </td>
                ))}
                <td style={S.td}>
                  <button style={S.btn('danger')} onClick={()=>deleteCastRole(row.role)}>
                    <Icon name="trash" size={13}/>
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <h2 style={{...S.h2,marginTop:24}}>Crew</h2>
      <PersonTable type="crew" list={crew} shootDays={project.shootDays} onChange={onCrewChange}/>
    </div>
  );
}


function Catering({ project, onChange }) {
  // Catering data: per person { id, diet: "fleisch"|"vegetarisch"|"vegan"|"" }
  const cateringData = project.cateringData || {};
  const setDiet = (personId, diet) => {
    onChange({ ...project, cateringData: { ...cateringData, [personId]: { ...(cateringData[personId] || {}), diet } } });
  };

  const allPersons = [...project.crew, ...project.cast.filter(p=>p.castingStatus==='besetzt'&&p.name)];

  const DIET_OPTS = [
    { value: "fleisch",      label: "Fleisch",      color: "#ab472b" },
    { value: "vegetarisch",  label: "Vegetarisch",  color: "#36a136" },
    { value: "vegan",        label: "Vegan",        color: "#366ba1" },
    { value: "",             label: "-",            color: C.dim },
  ];

  // Summary per day
  const daySummary = project.shootDays.map((d, di) => {
    const presentPersons = allPersons.filter(p => p.days.includes(di)); // cast already filtered to besetzt
    const counts = { total: presentPersons.length, fleisch: 0, vegetarisch: 0, vegan: 0, unbekannt: 0 };
    presentPersons.forEach(p => {
      const diet = cateringData[p.id]?.diet || "";
      if (diet === "fleisch") counts.fleisch++;
      else if (diet === "vegetarisch") counts.vegetarisch++;
      else if (diet === "vegan") counts.vegan++;
      else counts.unbekannt++;
    });
    return { day: d, dayIdx: di, ...counts };
  });

  return (
    <div>
      <h1 style={S.h1}>Catering</h1>

      {/* Day overview */}
      <div style={S.card}>
        <div style={S.ct}>Uebersicht nach Drehtagen</div>
        <table style={S.tbl}>
          <thead><tr>
            {["Tag", "Datum", "Location", "Gesamt", "Fleisch", "Vegetarisch", "Vegan", "Unbekannt"].map(h =>
              <th key={h} style={S.th}>{h}</th>)}
          </tr></thead>
          <tbody>
            {daySummary.map(s => (
              <tr key={s.dayIdx}>
                <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>{s.dayIdx + 1}</td>
                <td style={S.td}>{s.day.date ? fmtDate(s.day.date) : "-"}</td>
                <td style={S.td}>{s.day.locationTitle || s.day.location || "-"}</td>
                <td style={{ ...S.td, fontWeight: 700 }}>{s.total}</td>
                <td style={{ ...S.td, color: "#ab472b" }}>{s.fleisch || "-"}</td>
                <td style={{ ...S.td, color: "#36a136" }}>{s.vegetarisch || "-"}</td>
                <td style={{ ...S.td, color: "#366ba1" }}>{s.vegan || "-"}</td>
                <td style={{ ...S.td, color: C.dim }}>{s.unbekannt || "-"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Per-person diet */}
      {["Crew", "Cast"].flatMap(group => {
        const list = group === "Crew" ? project.crew : project.cast.filter(p=>p.castingStatus==='besetzt'&&p.name);
        if (!list.length) return [];
        return [(
          <div key={group} style={S.card}>
            <div style={S.ct}>{group}</div>
            <table style={S.tbl}>
              <thead><tr>
                <th style={S.th}>#</th>
                <th style={S.th}>Name</th>
                <th style={S.th}>{group === "Crew" ? "Position" : "Rolle"}</th>
                <th style={S.th}>Drehtage</th>

                        />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )];
      })}
    </div>
  );
}

function TodoTab({ project, onChange }) {
  const todos = project.todos || [];
  const crew = [...(project.crew||[]), ...(project.cast||[])];
  const crewNames = [...new Set(crew.map(p=>p.name).filter(Boolean))];
  const updTodos = t => onChange({ ...project, todos: t });
  const addTodo = () => updTodos([...todos, {
    id: uid(), text: "", done: false, timeframe: "mittel", prioritaet: "",
    department: "", assignees: [], dueDate: "", notes: ""
  }]);
  const upd = (id, patch) => updTodos(todos.map(t => t.id===id ? {...t,...patch} : t));
  const rem = id => updTodos(todos.filter(t=>t.id!==id));

  // Filter state
  const [filterDept, setFilterDept] = React.useState("");
  const [filterAssignee, setFilterAssignee] = React.useState("");
  const [filterTf, setFilterTf] = React.useState("");
  const [showDone, setShowDone] = React.useState(true);
  const [sortBy, setSortBy] = React.useState("");   // "", prio, due, dept, tf
  const [sortDir, setSortDir] = React.useState("asc");

  const filtered = todos.filter(t => {
    if (filterDept && t.department !== filterDept) return false;
    if (filterAssignee && !(t.assignees||(t.assignee?[t.assignee]:[])).includes(filterAssignee)) return false;
    if (filterTf && t.timeframe !== filterTf) return false;
    if (!showDone && t.done) return false;
    return true;
  });
  const TF_ORDER = { kurz:0, mittel:1, lang:2 };
  const sortKey = (t) => {
    if (sortBy === "prio") return t.prioritaet || "zzz";
    if (sortBy === "due") return t.dueDate || "9999-99-99";
    if (sortBy === "dept") return (t.department || "zzz").toLowerCase();
    if (sortBy === "tf") return TF_ORDER[t.timeframe] ?? 9;
    return 0;
  };
  // offene zuerst, erledigte ans Ende; innerhalb nach gewähltem Kriterium
  const rows = [...filtered].sort((a,b) => {
    if ((a.done?1:0) !== (b.done?1:0)) return (a.done?1:0) - (b.done?1:0);
    if (!sortBy) return 0;
    const ka = sortKey(a), kb = sortKey(b);
    const cmp = ka < kb ? -1 : ka > kb ? 1 : 0;
    return sortDir === "asc" ? cmp : -cmp;
  });
  const openCount = todos.filter(t => !t.done).length;
  const allAssignees = [...new Set(todos.flatMap(t => t.assignees||(t.assignee?[t.assignee]:[])).filter(Boolean))];

  const cellInp = { border:'none', background:'transparent', width:'100%', fontSize:13,
    fontFamily:'inherit', color:C.text, outline:'none', padding:'5px 4px' };

  return (
    <div>
      <div style={{ ...S.row, marginBottom:14, flexWrap:"wrap" }}>
        <h1 style={{ ...S.h1, marginBottom:0 }}>To-Do <span style={{ color:C.dim, fontWeight:500, fontSize:16 }}>({openCount} offen)</span></h1>
        <div style={{ flex:1 }} />
        <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:C.mid, cursor:"pointer" }}>
          <input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)} style={{ accentColor:C.accent, width:14, height:14 }} />
          Erledigte zeigen
        </label>
        <button style={S.btn("primary")} onClick={addTodo}><Icon name="plus" size={13}/> Aufgabe</button>
      </div>

      {/* Filter */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14, alignItems:"center" }}>
        <select style={{ ...S.input, fontSize:13, width:160, padding:"6px 10px" }} value={filterDept} onChange={e=>setFilterDept(e.target.value)}>
          <option value="">Alle Departments</option>
          {TODO_DEPARTMENTS.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        <select style={{ ...S.input, fontSize:13, width:150, padding:"6px 10px" }} value={filterAssignee} onChange={e=>setFilterAssignee(e.target.value)}>
          <option value="">Alle Personen</option>
          {allAssignees.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        <select style={{ ...S.input, fontSize:13, width:120, padding:"6px 10px" }} value={filterTf} onChange={e=>setFilterTf(e.target.value)}>
          <option value="">Zeitraum</option>
          {TODO_TIMEFRAMES.map(p=><option key={p.key} value={p.key}>{p.label}</option>)}
        </select>
        {(filterDept||filterAssignee||filterTf) && (
          <button style={S.btn("xs")} onClick={()=>{setFilterDept("");setFilterAssignee("");setFilterTf("");}}>✕ Filter zurücksetzen</button>
        )}
        <div style={{ flex:1 }} />
        <span style={{ fontSize:12, color:C.dim }}>Sortieren:</span>
        <select style={{ ...S.input, fontSize:13, width:140, padding:"6px 10px" }} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="">— keine —</option>
          <option value="prio">Priorität</option>
          <option value="due">Fälligkeit</option>
          <option value="dept">Department</option>
          <option value="tf">Zeitraum</option>
        </select>
        {sortBy && (
          <button style={S.btn("xs")} onClick={()=>setSortDir(d=>d==="asc"?"desc":"asc")} title="Richtung">
            {sortDir==="asc"?"↑ aufst.":"↓ abst."}
          </button>
        )}
      </div>

      {todos.length === 0 ? (
        <div style={{ ...S.card, color:C.dim, textAlign:"center", padding:40 }}>Keine Aufgaben. Klicke auf „+ Aufgabe".</div>
      ) : (
        <div style={{ ...S.card, padding:0, overflow:"hidden" }}>
          <div style={{ overflowX:"auto" }}>
          <table style={{ ...S.tbl, minWidth:940 }}>
            <thead><tr>
              <th style={{ ...S.th, width:40, paddingLeft:18, textAlign:"center" }} title="Erledigt">✓</th>
              <th style={{ ...S.th }}>Aufgabe</th>
              <th style={{ ...S.th, width:78 }}>Prio</th>
              <th style={{ ...S.th, width:150 }}>Department</th>
              <th style={{ ...S.th, width:110 }}>Zeitraum</th>
              <th style={{ ...S.th, width:140 }}>Fällig</th>
              <th style={{ ...S.th, width:200 }}>Verantwortlich</th>
              <th style={{ ...S.th }}>Notiz</th>
              <th style={{ ...S.th, width:42, paddingRight:18 }} />
            </tr></thead>
            <tbody>
              {rows.map(t => {
                const tf = TODO_TIMEFRAMES.find(p=>p.key===t.timeframe)||TODO_TIMEFRAMES[1];
                const assignees = t.assignees || (t.assignee ? [t.assignee] : []);
                const avail = crewNames.filter(n=>!assignees.includes(n));
                return (
                  <tr key={t.id} style={{ opacity: t.done?0.55:1 }}>
                    <td style={{ ...S.td, textAlign:"center", paddingLeft:18 }}>
                      <input type="checkbox" checked={t.done} onChange={e=>upd(t.id,{done:e.target.checked})}
                        style={{ width:16, height:16, cursor:"pointer", accentColor:C.accent }} />
                    </td>
                    <td style={S.td}>
                      <input style={{ ...cellInp, fontWeight:600, textDecoration:t.done?"line-through":"none" }}
                        value={t.text} placeholder="Aufgabe…" onChange={e=>upd(t.id,{text:e.target.value})} />
                    </td>
                    <td style={S.td}>
                      {(() => {
                        const PC = { A:"#ff3b30", B:"#f4b400", C:"#34c759" };
                        return (
                          <select style={{ ...cellInp, cursor:"pointer", fontWeight:700, textAlign:"center",
                              color: t.prioritaet ? PC[t.prioritaet] : C.dim }}
                            value={t.prioritaet||""} onChange={e=>upd(t.id,{prioritaet:e.target.value})}>
                            <option value="">–</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                          </select>
                        );
                      })()}
                    </td>
                    <td style={S.td}>
                      <select style={{ ...cellInp, cursor:"pointer", color:t.department?C.text:C.dim }}
                        value={t.department||""} onChange={e=>upd(t.id,{department:e.target.value})}>
                        <option value="">—</option>
                        {TODO_DEPARTMENTS.map(d=><option key={d} value={d}>{d}</option>)}
                      </select>
                    </td>
                    <td style={S.td}>
                      <select style={{ ...cellInp, cursor:"pointer", color:tf.color, fontWeight:600 }}
                        value={t.timeframe||"mittel"} onChange={e=>upd(t.id,{timeframe:e.target.value})}>
                        {TODO_TIMEFRAMES.map(p=><option key={p.key} value={p.key}>{p.label}</option>)}
                      </select>
                    </td>
                    <td style={S.td}>
                      <input type="date" style={cellInp} value={t.dueDate||""} onChange={e=>upd(t.id,{dueDate:e.target.value})} />
                    </td>
                    <td style={S.td}>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:3, alignItems:"center" }}>
                        {assignees.map((a,ai) => (
                          <span key={ai} style={{ display:"inline-flex", alignItems:"center", gap:3,
                            background:C.hover, borderRadius:980, padding:"2px 4px 2px 8px", fontSize:11 }}>
                            {a}
                            <span onClick={()=>upd(t.id,{assignees:assignees.filter((_,i)=>i!==ai)})}
                              style={{ cursor:"pointer", color:C.dim, fontSize:13, lineHeight:1 }}>×</span>
                          </span>
                        ))}
                        <select value="" onChange={e=>{ if(e.target.value) upd(t.id,{assignees:[...assignees, e.target.value]}); }}
                          style={{ border:"none", background:"transparent", fontSize:11, fontFamily:"inherit", color:C.dim, cursor:"pointer", outline:"none", padding:"2px" }}>
                          <option value="">+ …</option>
                          {avail.map(n=><option key={n} value={n}>{n}</option>)}

                      </div>
                    </td>
                    <td style={S.td}>
                      <input style={cellInp} value={t.notes||""} placeholder="Notiz…" onChange={e=>upd(t.id,{notes:e.target.value})} />
                    </td>
                    <td style={{ ...S.td, textAlign:"center", paddingRight:18 }}>
                      <span onClick={()=>rem(t.id)} style={{ color:C.dim, cursor:"pointer", fontSize:16 }}>×</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>
          <div style={{ padding:"12px 18px", borderTop:"1px solid "+C.border }}>
            <button style={S.btn("xs")} onClick={addTodo}><Icon name="plus" size={12}/> Aufgabe</button>
          </div>
        </div>
      )}
    </div>
  );
}
