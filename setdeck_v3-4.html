// ─── DispoDay ─────────────────────────────────────────────────────────────────
const DISPO_SECTIONS = [
  { key: 'fahrdispo',         label: 'Fahrdispo' },
  { key: 'customTables',      label: 'Benutzerdefinierte Tabellen' },
  { key: 'besonderes',        label: 'Besonderes' },
  { key: 'hinweise',          label: 'Hinweise Motiv und Basis' },
  { key: 'produktionsnotizen',label: 'Produktionsnotizen' },
];
const DEFAULT_SECTION_ORDER = DISPO_SECTIONS.map(s=>s.key);


// ─── DispoSections (sortierbare Dispo-Sektionen) ─────────────────────────────
function DispoSections({ dispoData, updDispoData, project, onChange, dayIdx, day }) {
  const [reorderMode, setReorderMode] = React.useState(false);
  // Merge template tables from project settings into this day's customTables
  const templateTables = project.settings?.dispoTemplateTables || [];
  const rawTables = dispoData.customTables || [];
  // Add template tables that aren't already in this day's customTables
  const tables = React.useMemo(() => {
    let merged = [...rawTables];
    templateTables.forEach(tt => {
      if (!merged.find(t=>t.id===tt.id)) {
        // Add with empty rows
        merged.push({ ...tt, rows: [Array(tt.cols||2).fill('')] });
      }
    });
    return merged;
  }, [rawTables, templateTables]);

  // Build flat item list: fixed sections + one item per custom table
  // Keys: 'fahrdispo', 'besonderes', 'hinweise', 'produktionsnotizen', 'ct:<id>'
  const buildFlatItems = (order, tbls) => {
    // Expand 'customTables' legacy key into individual ct: items
    const expanded = [];
    order.forEach(key => {
      if (key === 'customTables') {
        tbls.forEach(t => expanded.push('ct:'+t.id));
      } else {
        expanded.push(key);
      }
    });
    // Add any new custom tables not yet in order
    tbls.forEach(t => {
      if (!expanded.includes('ct:'+t.id)) expanded.push('ct:'+t.id);
    });
    // Remove ct: items for deleted tables
    return expanded.filter(k => !k.startsWith('ct:') || tbls.some(t=>'ct:'+t.id===k));
  };

  const defaultOrder = ['fahrdispo','besonderes','hinweise','produktionsnotizen'];
  const rawOrder = dispoData.sectionOrder
    || project.settings?.dispoSectionOrder
    || defaultOrder;
  const order = buildFlatItems(rawOrder, tables);

  const getLabelForKey = key => {
    if (key.startsWith('ct:')) {
      const id = key.slice(3);
      const t = tables.find(t=>t.id===id);
      return t?.title || 'Benutzerdefinierte Tabelle';
    }
    const sec = DISPO_SECTIONS.find(s=>s.key===key);
    return sec?.label || key;
  };

  const drag = useDrag(
    order.map(k=>({id:k})),
    reordered => {
      const newOrder = reordered.map(r=>r.id);
      // Single combined onChange to avoid stale data overwrite
      const days = [...project.shootDays];
      days[dayIdx] = { ...days[dayIdx],
        dispoData: { ...dispoData, sectionOrder: newOrder } };
      const newSettings = dayIdx === 0
        ? { ...project.settings, dispoSectionOrder: newOrder }
        : project.settings;
      onChange({ ...project, shootDays: days, settings: newSettings });
    }
  );

  // When a custom table is added: append its ct: key to order
  const handleTablesChange = newTables => {
    let newOrder = [...order];
    const oldIds = new Set(tables.map(t=>t.id));
    newTables.forEach(t => {
      if (!oldIds.has(t.id)) newOrder.push('ct:'+t.id);
    });
    newOrder = newOrder.filter(k => !k.startsWith('ct:') || newTables.some(t=>'ct:'+t.id===k));
    // Single combined onChange to avoid stale data overwrite
    const days = [...project.shootDays];
    days[dayIdx] = { ...days[dayIdx],
      dispoData: { ...dispoData, customTables: newTables, sectionOrder: newOrder } };
    const newSettings = dayIdx === 0
      ? { ...project.settings, dispoSectionOrder: newOrder }
      : project.settings;
    onChange({ ...project, shootDays: days, settings: newSettings });
  };;

  const renderKey = key => {
    if (key.startsWith('ct:')) {
      const id = key.slice(3);
      const t = tables.find(t=>t.id===id);
      if (!t) return null;
      const templateTables = project.settings?.dispoTemplateTables || [];
      const isTemplate = templateTables.some(tt=>tt.id===id);
      const toggleTemplate = () => {
        const newTT = isTemplate
          ? templateTables.filter(tt=>tt.id!==id)
          : [...templateTables, {id:t.id, title:t.title, cols:t.cols, headers:t.headers}];
        const days = [...project.shootDays];
        days[dayIdx] = {...days[dayIdx], dispoData:{...dispoData}};
        onChange({...project, shootDays:days,
          settings:{...project.settings, dispoTemplateTables:newTT}});
      };
      return (
        <div key={key} style={{ borderTop:"8px solid var(--c-border)" }}>
          <div className="no-print" style={{ display:"flex", alignItems:"center", justifyContent:"flex-end",
            padding:"2px 8px", background:"var(--c-hover)", borderBottom:"1px solid var(--c-border)" }}>
            <label style={{ display:"flex", alignItems:"center", gap:4,
              fontSize:9, color:isTemplate?"var(--c-dim)":"var(--c-mid)", cursor:"pointer" }}>
              <input type="checkbox" checked={isTemplate} onChange={toggleTemplate}
                style={{ cursor:"pointer" }} />
              Für alle Drehtage übernehmen
            </label>
          </div>
          <CustomTableEditor table={t}
            onChange={patch => {
              const newTables = tables.map(tb => tb.id===id ? {...tb,...patch} : tb);
              const newTT = isTemplate
                ? templateTables.map(tt => tt.id===id ? {...tt,...patch} : tt)
                : templateTables;
              const days = [...project.shootDays];
              days[dayIdx] = {...days[dayIdx], dispoData:{...dispoData, customTables:newTables}};
              onChange({...project, shootDays:days,
                settings:{...project.settings, dispoTemplateTables:newTT}});
            }}
            onDelete={() => {
              if(!window.confirm('Tabelle löschen?')) return;
              const newTables = tables.filter(tb=>tb.id!==id);
              const newOrder = order.filter(k=>k!=='ct:'+id);
              const newTT = templateTables.filter(tt=>tt.id!==id);
              const days = [...project.shootDays];
              days[dayIdx] = {...days[dayIdx],
                dispoData:{...dispoData, customTables:newTables, sectionOrder:newOrder}};
              onChange({...project, shootDays:days,
                settings:{...project.settings, dispoTemplateTables:newTT}});
            }} />
        </div>
      );
    }
    switch(key) {
      case 'fahrdispo': return (
        <div key="fahrdispo">
          <FahrdispoTable
            data={dispoData.fahrdispo || []}
            onChange={rows => updDispoData({ fahrdispo: rows })}
            crew={project.crew || []}
          />
        </div>
      );
      case 'besonderes': return (
        <div key="besonderes" style={{ borderTop:"8px solid var(--c-border)" }}>
          <BesonderesTable data={dispoData.besonderes || []}
            onChange={rows => updDispoData({ besonderes: rows })}
            title="Besonderes" />
        </div>
      );
      case 'hinweise': return (
        <div key="hinweise" style={{ borderTop:"8px solid var(--c-border)" }}>
          <BesonderesTable data={dispoData.hinweise || []}
            onChange={rows => updDispoData({ hinweise: rows })}
            title="Hinweise Motiv und Basis" />
        </div>
      );
      case 'produktionsnotizen': return (
        <div key="produktionsnotizen" style={{ borderTop:"8px solid var(--c-border)" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr style={{ background:"var(--c-hover)" }}>
              <th style={{ padding:"4px 8px", textAlign:"left", fontSize:10,
                fontWeight:700, border:"1px solid var(--c-border)" }}>Produktionsnotizen</th>
              <th style={{ border:"1px solid var(--c-border)" }}/>
            </tr></thead>
            {day?.notes && <tbody><tr>
              <td colSpan={2} style={{ padding:"6px 8px", fontSize:10,
                border:"1px solid var(--c-border)", color:"var(--c-text)" }}>
                {day?.notes}
              </td>
            </tr></tbody>}
          </table>
        </div>
      );
      default: return null;
    }
  };

  return (
    <div>
      {/* Reorder toggle */}
      <div className="no-print" style={{ textAlign:"right", padding:"3px 8px",
        borderTop:"8px solid var(--c-border)", background:"var(--c-hover)" }}>
        <span style={{ fontSize:9, color:"var(--c-mid)", cursor:"pointer",
          textDecoration:"underline" }}
          onClick={() => setReorderMode(v=>!v)}>
          {reorderMode ? '✓ Fertig' : '⠿ Reihenfolge ändern'}
        </span>
      </div>

      {reorderMode ? (
        <div className="no-print" style={{ padding:"8px", background:"var(--c-hover)", border:"1px solid var(--c-border)" }}>
          {order.map(key => (
            <div key={key} {...drag.row(key)}
              style={{ display:"flex", alignItems:"center", gap:8,
                padding:"6px 10px", marginBottom:4,
                background: drag.over===key ? "var(--t-neutral)" : "#ffffff",
                border:"1px solid var(--c-border)", borderRadius:4,
                transition:"background 0.1s" }}>
              <span {...drag.handle(key)}
                style={{ cursor:"grab", color:"var(--c-mid)", fontSize:16, userSelect:"none" }}>⠿</span>
              <span style={{ fontSize:11, color:"var(--c-dim)" }}>
                {getLabelForKey(key)}
              </span>
            </div>
          ))}
          <div style={{ marginTop:6, fontSize:9, color:"var(--c-mid)" }}>
            {dayIdx === 0
              ? 'Reihenfolge hier = Standard für alle anderen Dispos'
              : <span style={{ display:"flex", gap:12 }}>
                  <span style={{ cursor:"pointer", textDecoration:"underline" }}
                    onClick={() => updDispoData({ sectionOrder:
                      buildFlatItems(project.settings?.dispoSectionOrder || defaultOrder, tables) })}>
                    Projekt-Standard übernehmen
                  </span>
                  <span style={{ cursor:"pointer", textDecoration:"underline" }}
                    onClick={() => onChange({...project,
                      settings:{...project.settings, dispoSectionOrder: order}})}>
                    Als neuen Standard setzen
                  </span>
                </span>
            }
          </div>
        </div>
      ) : (
        <div>
          {order.map(key => renderKey(key))}
          {/* Add table button at bottom */}
          <div className="no-print" style={{ borderTop:"8px solid var(--c-border)", padding:"6px 8px" }}>
            <span style={{ cursor:"pointer", color:"var(--c-dim)", fontSize:10,
              textDecoration:"underline" }}
              onClick={() => {
                const cols = 2;
                const newT = { id:uid(), title:'', cols,
                  headers:Array(cols).fill(''),
                  rows:[Array(cols).fill(''), Array(cols).fill('')] };
                handleTablesChange([...tables, newT]);
              }}>+ Tabelle hinzufügen</span>
          </div>
        </div>
      )}
    </div>
  );
}


// ─── Lageplan: Karte wählen → Ausschnitt aufnehmen → einzeichnen ──────────────
let _leafletPromise = null;
function ensureLeaflet() {
  if (window.L) return Promise.resolve();
  if (_leafletPromise) return _leafletPromise;
  _leafletPromise = new Promise((resolve, reject) => {
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(css);
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('Karte konnte nicht geladen werden (Internet?).'));
    document.head.appendChild(s);
  });
  return _leafletPromise;
}
function _geoCity(addr) {
  if (!addr) return '';
  const m = addr.match(/\d{4,5}\s+([A-Za-z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\s-]+)/);
  if (m) return m[1].trim().split(' ')[0];
  const w = addr.trim().split(/[,\s]+/).filter(x => x.length > 2);
  return w[w.length - 1] || addr;
}
async function captureOSMTiles(lat, lng, zoom, W, H) {
  const size = 256, world = size * Math.pow(2, zoom);
  const x = (lng + 180) / 360 * world;
  const sinLat = Math.sin(lat * Math.PI / 180);
  const y = (0.5 - Math.log((1 + sinLat) / (1 - sinLat)) / (4 * Math.PI)) * world;
  const left = x - W / 2, top = y - H / 2;
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#e8eaed'; ctx.fillRect(0, 0, W, H);
  const tx0 = Math.floor(left / size), ty0 = Math.floor(top / size);
  const tx1 = Math.floor((left + W) / size), ty1 = Math.floor((top + H) / size);
  const maxIdx = Math.pow(2, zoom);
  const loads = [];
  for (let tx = tx0; tx <= tx1; tx++) for (let ty = ty0; ty <= ty1; ty++) {
    if (ty < 0 || ty >= maxIdx) continue;
    const nx = ((tx % maxIdx) + maxIdx) % maxIdx;
    const url = 'https://tile.openstreetmap.org/' + zoom + '/' + nx + '/' + ty + '.png';
    loads.push(new Promise(res => {
      const img = new window.Image(); img.crossOrigin = 'anonymous';
      img.onload = () => { try { ctx.drawImage(img, Math.round(tx * size - left), Math.round(ty * size - top)); } catch (e) {} res(); };
      img.onerror = () => res();
      img.src = url;
    }));
  }
  await Promise.all(loads);
  return cv.toDataURL('image/png');
}

function LageplanEditor({ value, address, onSave, onClose }) {
  const CW = 760, CH = 480;
  const [phase, setPhase] = React.useState(value && value.image ? 'draw' : 'pick');
  const [err, setErr] = React.useState('');
  const [capturing, setCapturing] = React.useState(false);
  const [loadingMap, setLoadingMap] = React.useState(false);
  const mapDivRef = React.useRef(null);
  const mapRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const bgImgRef = React.useRef(null);
  const [bg, setBg] = React.useState(value?.image || null);
  const centerRef = React.useRef(value?.center || null);
  const zoomRef = React.useRef(value?.zoom || null);
  const strokesRef = React.useRef([]);
  const drawingRef = React.useRef(false);
  const [color, setColor] = React.useState('#e4002b');
  const [penW, setPenW] = React.useState(5);
  const [tool, setTool] = React.useState('pen'); // 'pen' | 'text' | 'marker' | 'move'
  const markerCountRef = React.useRef(0);
  const dragItemRef = React.useRef(null);

  // ── Pick phase: Leaflet map ──
  React.useEffect(() => {
    if (phase !== 'pick') return;
    let cancelled = false;
    setLoadingMap(true);
    ensureLeaflet().then(async () => {
      let c = centerRef.current || [51.1657, 10.4515];
      let z = zoomRef.current || 6;
      if (!centerRef.current && address) {
        try {
          const r = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(_geoCity(address)) + '&count=1&language=de&format=json');
          const d = await r.json();
          if (d?.results?.[0]) { c = [d.results[0].latitude, d.results[0].longitude]; z = 16; }
        } catch (e) {}
      }
      if (cancelled) return;
      setLoadingMap(false);
      setTimeout(() => {
        if (cancelled || !mapDivRef.current || mapRef.current) return;
        const map = window.L.map(mapDivRef.current).setView(c, z);
        window.L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19, crossOrigin: true, attribution: '© OpenStreetMap-Mitwirkende'
        }).addTo(map);
        mapRef.current = map;
        setTimeout(() => { try { map.invalidateSize(); } catch (e) {} }, 120);
      }, 30);
    }).catch(e => { if (!cancelled) { setLoadingMap(false); setErr(e.message); } });
    return () => { cancelled = true; if (mapRef.current) { try { mapRef.current.remove(); } catch (e) {} mapRef.current = null; } };
  }, [phase]);

  const doCapture = async () => {
    if (!mapRef.current) return;
    setCapturing(true); setErr('');
    try {
      const ctr = mapRef.current.getCenter();
      const z = Math.round(mapRef.current.getZoom());
      centerRef.current = [ctr.lat, ctr.lng]; zoomRef.current = z;
      const dataUrl = await captureOSMTiles(ctr.lat, ctr.lng, z, CW, CH);
      strokesRef.current = []; setBg(dataUrl); setPhase('draw');
    } catch (e) { setErr('Aufnahme fehlgeschlagen: ' + e.message); }
    finally { setCapturing(false); }
  };

  // ── Draw phase ──
  const redraw = () => {
    const cv = canvasRef.current; if (!cv) return;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, CW, CH);
    if (bgImgRef.current) ctx.drawImage(bgImgRef.current, 0, 0, CW, CH);
    strokesRef.current.forEach(s => {
      if (s.type === 'text') {
        const size = s.size || 20;
        ctx.font = '700 ' + size + 'px ' + "Hanken Grotesk, system-ui, sans-serif";
        ctx.textBaseline = 'middle';
        ctx.lineJoin = 'round';
        ctx.lineWidth = Math.max(3, size / 5);
        ctx.strokeStyle = 'rgba(255,255,255,0.92)';
        ctx.strokeText(s.text, s.x, s.y);
        ctx.fillStyle = s.color;
        ctx.fillText(s.text, s.x, s.y);
        return;
      }
      if (s.type === 'marker') {
        const R = 13;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.arc(s.x, s.y - R, R, Math.PI * 0.15, Math.PI * 0.85, false);
        ctx.closePath();
        ctx.fillStyle = s.color; ctx.fill();
        ctx.beginPath(); ctx.arc(s.x, s.y - R, R, 0, Math.PI * 2);
        ctx.fillStyle = s.color; ctx.fill();
        ctx.lineWidth = 2.5; ctx.strokeStyle = '#fff'; ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '700 14px Hanken Grotesk, system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(String(s.label || ''), s.x, s.y - R);
        ctx.textAlign = 'start';
        return;
      }
      ctx.strokeStyle = s.color; ctx.lineWidth = s.width; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      s.points.forEach((p, i) => { if (i === 0) ctx.moveTo(p[0], p[1]); else ctx.lineTo(p[0], p[1]); });
      if (s.points.length === 1) { ctx.arc(s.points[0][0], s.points[0][1], s.width / 2, 0, Math.PI * 2); ctx.fillStyle = s.color; ctx.fill(); }
      ctx.stroke();
    });
  };
  React.useEffect(() => {
    if (phase !== 'draw' || !bg) return;
    const img = new window.Image();
    img.onload = () => { bgImgRef.current = img; redraw(); };
    img.src = bg;
  }, [phase, bg]);

  const pt = e => {
    const cv = canvasRef.current, r = cv.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [(t.clientX - r.left) * (CW / r.width), (t.clientY - r.top) * (CH / r.height)];
  };
  const hitTest = (px, py) => {
    const cv = canvasRef.current; const ctx = cv && cv.getContext('2d');
    for (let i = strokesRef.current.length - 1; i >= 0; i--) {
      const s = strokesRef.current[i];
      if (s.type === 'marker') {
        const cx = s.x, cy = s.y - 13;
        if (Math.hypot(px - cx, py - cy) <= 16 || Math.hypot(px - s.x, py - s.y) <= 14) return { idx: i, offX: px - s.x, offY: py - s.y };
      } else if (s.type === 'text' && ctx) {
        const size = s.size || 20;
        ctx.font = '700 ' + size + 'px Hanken Grotesk, system-ui, sans-serif';
        const w = ctx.measureText(s.text).width;
        if (px >= s.x - 4 && px <= s.x + w + 4 && py >= s.y - size / 2 - 6 && py <= s.y + size / 2 + 6) return { idx: i, offX: px - s.x, offY: py - s.y };
      }
    }
    return null;
  };
  const onDown = e => {
    e.preventDefault();
    if (tool === 'move') {
      const [x, y] = pt(e);
      const hit = hitTest(x, y);
      if (hit) dragItemRef.current = hit;
      return;
    }
    if (tool === 'text') {
      const [x, y] = pt(e);
      const text = window.prompt('Text eingeben:');
      if (text && text.trim()) { strokesRef.current.push({ type: 'text', text: text.trim(), x, y, color, size: penW <= 3 ? 16 : penW >= 9 ? 28 : 22 }); redraw(); }
      return;
    }
    if (tool === 'marker') {
      const [x, y] = pt(e);
      const def = String.fromCharCode(65 + (markerCountRef.current % 26));
      const label = window.prompt('Marker-Beschriftung (z. B. Buchstabe/Zahl):', def);
      if (label !== null) { markerCountRef.current++; strokesRef.current.push({ type: 'marker', x, y, color, label: (label || def).slice(0, 3) }); redraw(); }
      return;
    }
    drawingRef.current = true; strokesRef.current.push({ type: 'pen', color, width: penW, points: [pt(e)] }); redraw();
  };
  const onMove = e => {
    if (dragItemRef.current) {
      e.preventDefault();
      const [x, y] = pt(e);
      const it = strokesRef.current[dragItemRef.current.idx];
      if (it) { it.x = x - dragItemRef.current.offX; it.y = y - dragItemRef.current.offY; redraw(); }
      return;
    }
    if (!drawingRef.current) return; e.preventDefault();
    const last = strokesRef.current[strokesRef.current.length - 1];
    if (last && last.points) { last.points.push(pt(e)); redraw(); }
  };
  const onUp = () => { drawingRef.current = false; dragItemRef.current = null; };
  const undo = () => { strokesRef.current.pop(); redraw(); };
  const clearAll = () => { strokesRef.current = []; redraw(); };
  const save = () => { const cv = canvasRef.current; if (cv) onSave({ image: cv.toDataURL('image/jpeg', 0.85), center: centerRef.current, zoom: zoomRef.current }); };

  const COLORS = ['#e4002b', '#1a73e8', '#1a8a4a', 'var(--c-text)', '#f4b400'];
  const overlay = { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 9000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 };
  const panel = { background: C.card, borderRadius: 14, padding: 18, maxWidth: CW + 40, width: '100%', maxHeight: '92vh', overflow: 'auto' };

  return (
    <div className="no-print" style={overlay} onClick={onClose}>
      <div style={panel} onClick={e => e.stopPropagation()}>
        <div style={{ ...S.row, marginBottom: 12 }}>
          <h2 style={{ ...S.h2, marginBottom: 0 }}>{phase === 'pick' ? 'Standort wählen' : 'Lageplan zeichnen'}</h2>
          <div style={{ flex: 1 }} />
          <button style={S.btn()} onClick={onClose}>Schließen</button>
        </div>
        {err && <div style={{ color: C.danger, fontSize: 13, marginBottom: 10 }}>{err}</div>}

        {phase === 'pick' && (
          <div>
            <div style={{ fontSize: 13, color: C.mid, marginBottom: 10 }}>
              Karte verschieben/zoomen, bis der gewünschte Ausschnitt zu sehen ist. Dann „Ausschnitt aufnehmen".
            </div>
            <div ref={mapDivRef} style={{ width: '100%', height: CH, borderRadius: 10, overflow: 'hidden', border: '1px solid ' + C.border, background: '#e8eaed' }}>
              {loadingMap && <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: C.dim, fontSize: 13 }}>Karte wird geladen…</div>}
            </div>
            <div style={{ ...S.row, marginTop: 12 }}>
              <span style={{ fontSize: 11, color: C.dim }}>© OpenStreetMap-Mitwirkende</span>
              <div style={{ flex: 1 }} />
              {value?.image && <button style={S.btn()} onClick={() => setPhase('draw')}>Zurück zur Zeichnung</button>}
              <button style={S.btn('primary')} onClick={doCapture} disabled={capturing}>{capturing ? 'Nehme auf…' : 'Ausschnitt aufnehmen'}</button>
            </div>
          </div>
        )}

        {phase === 'draw' && (
          <div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap', marginBottom: 10 }}>
              <div style={{ display: 'flex', gap: 4 }}>
                {[['pen', '✏ Stift'], ['text', '🅣 Text'], ['marker', '📍 Marker'], ['move', '✥ Verschieben']].map(([t, lbl]) => (
                  <button key={t} onClick={() => setTool(t)}
                    style={{ ...S.btn(tool === t ? 'primary' : undefined), fontSize: 11, padding: '4px 10px' }}>{lbl}</button>
                ))}
              </div>
              <span style={{ fontSize: 12, color: C.mid }}>Farbe:</span>
              {COLORS.map(c => (
                <span key={c} onClick={() => setColor(c)} style={{ width: 22, height: 22, borderRadius: '50%', background: c, cursor: 'pointer', border: color === c ? '3px solid ' + C.text : '2px solid #fff', boxShadow: '0 0 0 1px ' + C.border }} />
              ))}
              {tool === 'pen' && (
                <select value={penW} onChange={e => setPenW(Number(e.target.value))} style={{ ...S.input, width: 'auto', fontSize: 12, padding: '4px 8px' }}>
                  <option value={3}>dünn</option><option value={5}>mittel</option><option value={9}>dick</option>
                </select>
              )}
              {tool === 'text' && (
                <select value={penW} onChange={e => setPenW(Number(e.target.value))} style={{ ...S.input, width: 'auto', fontSize: 12, padding: '4px 8px' }}>
                  <option value={3}>klein</option><option value={5}>mittel</option><option value={9}>groß</option>
                </select>
              )}
              <button style={S.btn('xs')} onClick={undo}>↶ Zurück</button>
              <button style={S.btn('xs')} onClick={clearAll}>Alles löschen</button>
              <button style={S.btn('xs')} onClick={() => setPhase('pick')}>🗺 Karte neu wählen</button>
            </div>
            <canvas ref={canvasRef} width={CW} height={CH}
              onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
              onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
              style={{ width: '100%', maxWidth: CW, aspectRatio: CW + '/' + CH, border: '1px solid ' + C.border, borderRadius: 10, touchAction: 'none', cursor: tool === 'pen' ? 'crosshair' : tool === 'move' ? 'move' : 'pointer', display: 'block' }} />
            <div style={{ ...S.row, marginTop: 12 }}>
              <span style={{ fontSize: 11, color: C.dim }}>{tool === 'pen' ? 'Mit Maus / Finger zeichnen.' : tool === 'text' ? 'Auf die Karte tippen, um Text zu setzen.' : tool === 'marker' ? 'Auf die Karte tippen, um einen Marker zu setzen.' : 'Text oder Marker antippen und ziehen, um ihn zu verschieben.'} © OpenStreetMap-Mitwirkende</span>
              <div style={{ flex: 1 }} />
              <button style={S.btn('primary')} onClick={save}>Als Lageplan anhängen</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function DispoDay({ project, dayIdx, onChange }) {
  const st = project.settings;
  const day = project.shootDays[dayIdx];
  const groups = buildGroups(project.shots);
  const group = groups.find(g => {
    const linked = project.shootDays.find(d => d.id === g.divider.shootDayId);
    return linked && project.shootDays.indexOf(linked) === dayIdx;
  }) || groups[dayIdx];

  const sceneIds = group ? [...group.sceneIds] : [];
  const scenes = project.scenes.filter(sc => sceneIds.includes(sc.id));
  const crew = project.crew.filter(c => c.days.includes(dayIdx));
  // Cast für diesen Tag — eine Person pro Rolle (besetzt bevorzugt, sonst erste)
  const cast = (() => {
    const raw = project.cast.filter(c => c.days.includes(dayIdx));
    const seen = new Set(); const result = [];
    // Prefer besetzt persons first
    const sorted = [...raw].sort((a,b) => (b.castingStatus==='besetzt'?1:0) - (a.castingStatus==='besetzt'?1:0));
    sorted.forEach(p => { if(!seen.has(p.role)){seen.add(p.role);result.push(p);} });
    return result;
  })();

  let runMin = timeToMin(group?.divider?.callTime || day?.callTime || "07:00");
  const schedule = (group?.shots || []).filter(sh => !sh.hidden || sh.type === "divider").map(sh => {
    if (sh.type === "divider") {
      const dur = sh.durationMin || 0;
      const e = { isDivider: true, ...sh, start: minToTime(runMin), end: minToTime(runMin + dur) };
      runMin += dur; return e;
    }
    const dur = (sh.setupMin || 0) + (sh.shootMin || 0);
    const sc = project.scenes.find(x => x.id === sh.scene);
    const k = sc ? sc.number : "?" + "." + sh.shotNum || "?";
    const e = { isDivider: false, ...sh, sc, klappe: k, start: minToTime(runMin), end: minToTime(runMin + dur) };
    runMin += dur; return e;
  });
  const probeStart = schedule.find(s => !s.isDivider)?.start || "-";
  const drehEnd = schedule.length > 0 ? schedule[schedule.length - 1]?.end || "-" : "-";

  const dispoData = day?.dispoData || {};
  const saveDay = patch => {
    const days = [...project.shootDays];
    days[dayIdx] = { ...days[dayIdx], ...patch };
    onChange({ ...project, shootDays: days });
  };
  const updDispoData = patch => {
    saveDay({ dispoData: { ...dispoData, ...patch } });
  }; const DEFAULT_GEWERKE = [
    { label: "Regie" }, { label: "Kamera" }, { label: "Licht" },
    { label: "Ton" }, { label: "Requisite" }, { label: "Kostüm" },
    { label: "Maske" }, { label: "Catering" }, { label: "Set-AL" },
  ];
  // Inherit arbRows from day 0 if not set for this day
  const day0DispoData = project.shootDays[0]?.dispoData || {};
  const inheritedArbRows = dayIdx === 0
    ? DEFAULT_GEWERKE.map((g, i) => ({ id: "arb_" + i, label: g.label, time: "" }))
    : (day0DispoData.arbRows || DEFAULT_GEWERKE.map((g, i) => ({ id: "arb_" + i, label: g.label, time: "" })));
  // probeStart als Zeitvorschlag (aus Shotlist)
  const probeStartSuggestion = schedule.find(s => !s.isDivider)?.start || "";
  const arbRows = dispoData.arbRows || inheritedArbRows.map(r => ({ ...r, time: "", info: "" }));
  const updArbRow = (id, patch) => updDispoData({ arbRows: arbRows.map(r => r.id === id ? { ...r, ...patch } : r) });
  const addArbRow = () => updDispoData({ arbRows: [...arbRows, { id: uid(), label: "", time: "", info: "" }] });
  const remArbRow = id => updDispoData({ arbRows: arbRows.filter(r => r.id !== id) });

  const castTimes = dispoData.castTimes || {};
  const updCastTime = (castId, field, val) => {
    const updated = { ...castTimes, [castId]: { ...(castTimes[castId] || {}), [field]: val } };
    const ct = updated[castId];
    let fahrdispo = dispoData.fahrdispo || [];
    // Auto-add fahrdispo entry when both Abholung and Ankunft are set for a cast member
    if (ct.abholung && ct.ankunft) {
      const castMember = cast.find(p => p.id === castId);
      // Check if entry already auto-created for this cast member
      const autoId = "auto_" + castId;
      const exists = fahrdispo.find(f => f.id === autoId);
      if (!exists && castMember) {
        fahrdispo = [...fahrdispo, {
          id: autoId, fahrer: "", abholungVon: castMember.name || castMember.role,
          abfahrt: ct.abholung, von: "", ankunft: ct.ankunft, an: ""
        }];
      } else if (exists) {
        // Update times if already exists
        fahrdispo = fahrdispo.map(f => f.id === autoId
          ? { ...f, abholungVon: castMember?.name || castMember?.role || f.abholungVon, abfahrt: ct.abholung, ankunft: ct.ankunft }
          : f
        );
      }
    }
    updDispoData({ castTimes: updated, fahrdispo });
  };

  const [weather, setWeather] = useState(null);
  const [sunrise, setSunrise] = useState("-");
  const [sunset, setSunset] = useState("-");

  const [weatherLoading, setWeatherLoading] = useState(false);

  // Extract a searchable city/place from an address string
  const extractCity = addr => {
    if (!addr) return "";
    // Try to find a PLZ+Stadt pattern like "10117 Berlin" or "90403 Nurnberg"
    const plzMatch = addr.match(/\d{4,5}\s+([A-Za-z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\s-]+)/);
    if (plzMatch) return plzMatch[1].trim().split(" ")[0];
    // Try last capitalized word(s) as city
    const words = addr.trim().split(/[,\s]+/).filter(w => w.length > 2);
    return words[words.length - 1] || addr;
  };

  const fetchWeather = async () => {
    const addr = day?.locationAddress || day?.locationTitle || day?.location;
    if (!day?.date) { alert("Bitte Datum im Drehtage-Tab eintragen."); return; }
    if (!addr) { alert("Bitte Drehort-Adresse im Drehtage-Tab eintragen."); return; }
    setWeatherLoading(true);
    try {
      // Strategy: Open-Meteo geocoding only accepts city names, not full addresses.
      // Extract city name first, then geocode.
      const city = extractCity(addr);

      const geoUrl = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=de&format=json";
      const geoRes = await fetch(geoUrl);
      if (!geoRes.ok) throw new Error("Geocoding nicht erreichbar");
      const geoData = await geoRes.json();
      if (!geoData?.results?.[0]) {
        throw new Error("Ort nicht gefunden fuer: '" + city + "'\nTipp: Trage im Drehtage-Tab die Adresse mit Stadtname ein, z.B. 'Berlin' oder '10117 Berlin'.");
      }
      const loc = geoData.results[0];
      const { latitude, longitude, timezone, name } = loc;

      // Fetch forecast + sunrise/sunset from Open-Meteo
      // Use archive API for past dates, forecast for future dates
      const shootDate = new Date(day.date + "T12:00");
      const today2 = new Date();
      today2.setHours(0,0,0,0);
      const isPast = shootDate < today2;
      const wBase = isPast
        ? "https://archive-api.open-meteo.com/v1/archive"
        : "https://api.open-meteo.com/v1/forecast";
      const dailyParams = isPast
        ? "temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset"
        : "temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset";
      const wUrl = wBase +
        "?latitude=" + latitude + "&longitude=" + longitude +
        "&daily=" + dailyParams +
        "&timezone=" + encodeURIComponent(timezone || "Europe/Berlin") +
        "&start_date=" + day.date + "&end_date=" + day.date;
      const wRes = await fetch(wUrl);
      if (!wRes.ok) throw new Error("Wetter-API Fehler: " + wRes.status + " (Datum: " + day.date + ")");
      const wData = await wRes.json();
      if (!wData?.daily) throw new Error("Keine Wetterdaten fuer dieses Datum.");
      const d = wData.daily;
      const parseSunTime = raw => {
        if (!raw) return '-';
        if (raw.includes('T')) return raw.split('T')[1].slice(0,5);
        return raw.slice(-5);
      };
      const weatherData = {
        tMax: d.temperature_2m_max?.[0] != null ? Math.round(d.temperature_2m_max[0]) : null,
        tMin: d.temperature_2m_min?.[0] != null ? Math.round(d.temperature_2m_min[0]) : null,
        rain: (d.precipitation_probability_max?.[0] ?? d.precipitation_sum?.[0]) != null ? Math.round(d.precipitation_probability_max?.[0] ?? d.precipitation_sum?.[0] ?? 0) : null,
        city: name || city,
        sunrise: parseSunTime(d.sunrise?.[0]),
        sunset: parseSunTime(d.sunset?.[0]),
      };
      setWeather(weatherData);
      setSunrise(weatherData.sunrise);
      setSunset(weatherData.sunset);
      updDispoData({ weather: weatherData });
    } catch(e) {
      alert("Wetterdaten konnten nicht geladen werden:\n" + e.message);
    } finally {
      setWeatherLoading(false);
    }
  };

  // ── Notfallkontakte (nächstes Krankenhaus/Feuerwehr/Polizei/ärztl. Notdienst) ──
  const [emergencyLoading, setEmergencyLoading] = useState(false);
  const fetchEmergency = async () => {
    const addr = day?.locationAddress || day?.locationTitle || day?.location;
    if (!addr) { alert("Bitte Drehort-Adresse im Drehtage-Tab eintragen."); return; }
    setEmergencyLoading(true);
    try {
      const city = extractCity(addr);
      const geoUrl = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=de&format=json";
      const geoRes = await fetch(geoUrl);
      if (!geoRes.ok) throw new Error("Geocoding nicht erreichbar");
      const geoData = await geoRes.json();
      if (!geoData?.results?.[0]) throw new Error("Ort nicht gefunden für: '" + city + "'");
      const LAT = geoData.results[0].latitude, LON = geoData.results[0].longitude;
      const q = '[out:json][timeout:60];(' +
        'nwr(around:15000,' + LAT + ',' + LON + ')[amenity~"^(hospital|fire_station|police|doctors|clinic)$"];' +
        ');out center tags;';
      const mirrors = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter",
        "https://maps.mail.ru/osm/tools/overpass/api/interpreter",
        "https://overpass.private.coffee/api/interpreter",
      ];
      const tryMirror = async (url) => {
        const ctrl = new AbortController();
        const to = setTimeout(() => ctrl.abort(), 55000);
        try {
          const res = await fetch(url, {
            method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "data=" + encodeURIComponent(q), signal: ctrl.signal });
          if (!res.ok) throw new Error("Status " + res.status);
          const j = await res.json();
          if (!j || !Array.isArray(j.elements)) throw new Error("Ungültige Antwort");
          return j;
        } finally { clearTimeout(to); }
      };
      let oData = null, lastErr = null;
      try {
        oData = await Promise.any(mirrors.map(tryMirror));
      } catch (agg) {
        lastErr = (agg && agg.errors && agg.errors[0]) || agg;
      }
      if (!oData) throw new Error("Kartendienst gerade nicht erreichbar. Bitte in ein paar Minuten erneut versuchen." + (lastErr ? " [" + (lastErr.message || lastErr) + "]" : ""));
      const els = oData.elements || [];
      const hav = (la1,lo1,la2,lo2) => { const R=6371, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180,
        a=Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
        return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); };
      const fmtA = t => [ t["addr:street"] ? (t["addr:street"]+" "+(t["addr:housenumber"]||"")).trim() : "",
        [t["addr:postcode"], t["addr:city"]].filter(Boolean).join(" ") ].filter(Boolean).join(", ");
      const pick = types => {
        let best=null, bestD=Infinity;
        els.forEach(el => {
          const t=el.tags||{}; if(!types.includes(t.amenity)) return;
          const la=el.lat ?? el.center?.lat, lo=el.lon ?? el.center?.lon; if(la==null) return;
          const d=hav(LAT,LON,la,lo);
          if(d<bestD){ bestD=d; best={ name:t.name||t.operator||"(ohne Namen)", addr:fmtA(t),
            phone:t.phone||t["contact:phone"]||t["emergency:phone"]||"", dist:Math.round(d*10)/10 }; }
        });
        return best;
      };
      const emergency = {
        hospital: pick(["hospital"]),
        fire:     pick(["fire_station"]),
        police:   pick(["police"]),
        doctor:   pick(["doctors","clinic"]),
        loadedFor: addr,
      };
      if (!emergency.hospital && !emergency.fire && !emergency.police && !emergency.doctor) {
        throw new Error("Keine Einrichtungen in der Nähe gefunden.");
      }
      updDispoData({ emergency });
    } catch(e) {
      alert("Notfallkontakte konnten nicht geladen werden:\n" + e.message);
    } finally {
      setEmergencyLoading(false);
    }
  };

  // Deduplicate drehorte by ADDRESS only (not by name - different Motive can share an address)
  // Haupt-Adresse des Drehtags
  const dayAddr = day?.locationAddress || day?.locationTitle || day?.location || "";
  // Szenen-Adressen mit Motivnamen (dedupliziert, nur wenn abweichend von Drehtag-Adresse)
  const sceneAddrMap = new Map();
  scenes.forEach(sc => {
    const addr = sc.locationAddress || sc.location || "";
    const motiv = sc.locationTitle || sc.title || "";
    if (addr && addr !== dayAddr) {
      if (!sceneAddrMap.has(addr)) sceneAddrMap.set(addr, motiv || addr);
    } else if (!addr && motiv && motiv !== dayAddr) {
      // Nur Motivname ohne Adresse
      if (!sceneAddrMap.has(motiv)) sceneAddrMap.set(motiv, motiv);
    }
  });
  const drehorts = []; // legacy - no longer used
  const sceneAddrsForDisplay = [...sceneAddrMap.entries()]; // [{addr, motiv}]

  const respPersons = st.respPersons || [
    { id: "rp1", label: "Produzent/in",       value: st.producer || "" },
    { id: "rp2", label: "Produktionsleitung", value: "" },
    { id: "rp3", label: "Regie",              value: st.director || "" },
    { id: "rp4", label: "Kamera",             value: st.dop || "" },
    { id: "rp5", label: "Szenenbild",         value: "" },
    { id: "rp6", label: "Kostümbild",        value: "" },
  ];

  const nextDay = project.shootDays[dayIdx + 1];
  const nextGroup = groups.find(g => {
    const linked = project.shootDays.find(d => d.id === g.divider.shootDayId);
    return linked && project.shootDays.indexOf(linked) === dayIdx + 1;
  }) || groups[dayIdx + 1];
  const nextScenes = project.scenes.filter(sc => nextGroup?.sceneIds?.has(sc.id));
  const nextCast = project.cast.filter(c => c.days.includes(dayIdx + 1));

  const tdS = { border: "1px solid var(--c-border)", padding: "8px 12px", verticalAlign: "top", fontSize: 11 };
  const sectionStyle = { width: "100%", borderCollapse: "collapse", borderBottom: "1px solid var(--c-border)", marginTop: 0 };
  const thS = { ...tdS, background: "var(--c-hover)", fontWeight: 700, fontSize: 10 };
  const editInp = { border: "none", borderBottom: "1px solid var(--c-border)", background: "transparent", fontSize: 10, fontFamily: "inherit", padding: "1px 2px", width: "100%", outline: "none", color: "var(--c-text)" };

  // Set-Liste: alle Crew die an diesem Tag dabei sind
  const crewAtDay = project.crew.filter(c => c.days.includes(dayIdx));
  const castAtDay = project.cast.filter(c => c.days.includes(dayIdx));

  return (
    <div style={{ background: "var(--c-card)", color: "var(--c-text)", borderRadius: 8, border: "2px solid var(--c-border)", margin: "0 0 32px 0", fontFamily:SF, fontSize: 11, overflow: "hidden" }}>
      {/* Set- und Cast-Liste ganz oben, wie in professioneller Vorlage */}
      {(crewAtDay.length > 0 || castAtDay.length > 0) && (
        <div style={{ padding: "6px 14px", borderBottom: "1px solid var(--c-border)", fontSize: 10 }}>
          {crewAtDay.length > 0 && (
            <div style={{ marginBottom: castAtDay.length > 0 ? 3 : 0 }}>
              <strong>Set:</strong> {crewAtDay.map(p => p.name || p.role).filter(Boolean).join(", ")}
            </div>
          )}
          {castAtDay.length > 0 && (
            <div>
              <strong>Darsteller:</strong>
              {(() => {
                const seen = new Set();
                const labels = [];
                castAtDay.forEach(p => {
                  if(seen.has(p.role)) return; seen.add(p.role);
                  labels.push(p.name || p.role || '');
                });
                return ' '+labels.filter(Boolean).join(', ');
              })()}
            </div>
          )}
        </div>
      )}
      <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "2px solid var(--c-border)" }}>
        <tbody><tr>
          <td style={{ padding: "8px 14px", width: "30%", verticalAlign: "middle" }}>
            {st.logo ? <img src={st.logo} alt="Logo" style={{ height: 40, objectFit: "contain" }} />
              : <div style={{ fontWeight: 700, fontSize: 13 }}>{st.company || "Produktionsfirma"}</div>}
          </td>
          <td style={{ padding: "8px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 16, fontWeight: 700 }}>{st.title || "Projekttitel"}</div>
          </td>
          <td style={{ padding: "8px 14px", width: "35%", textAlign: "right", fontSize: 10 }}>
            {respPersons.map(p => p.value ? (
              <div key={p.id} style={{ display: "flex", justifyContent: "flex-end", gap: 4, marginBottom: 1, whiteSpace: "nowrap" }}>
                <span style={{ color: "var(--c-dim)" }}>{p.label}:</span>
                <span style={{ fontWeight: 600 }}>{p.value}</span>
              </div>
            ) : null)}
          </td>
        </tr></tbody>
      </table>

      <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "1px solid var(--c-border)" }}>
        <tbody><tr style={{ background: "var(--c-card)", color: "var(--c-text)" }}>
          <td style={{ padding: "5px 14px", fontWeight: 700, fontSize: 12 }}>DISPOSITION</td>
          <td style={{ padding: "5px 14px", textAlign: "center", fontWeight: 700, fontSize: 12 }}>{day?.date ? fmtDate(day.date) : "Datum TBD"}</td>
          <td style={{ padding: "5px 14px", textAlign: "right", fontWeight: 700, fontSize: 12 }}>{dayIdx + 1}. Drehtag</td>
        </tr></tbody>
      </table>

      {(() => {
        const lunchItems = schedule.filter(s => s.isDivider && s.dividerType === "lunch");
        const lunchStartMin = lunchItems.length > 0 ? timeToMin(lunchItems[0].start) : null;
        const arbTimes = arbRows.map(r => r.time).filter(Boolean).map(timeToMin);
        const callMin = timeToMin(day.callTime || '07:00');
        const earliestArbMin = Math.min(callMin, ...(arbTimes.length > 0 ? arbTimes : [callMin]));
        let lunchWarning = null;
        if (lunchStartMin !== null) {
          const diffH = (lunchStartMin - earliestArbMin) / 60;
          if (diffH > 6) lunchWarning = "red";
          else if (diffH > 5.5) lunchWarning = "orange";
        }
        const lunchColor = lunchWarning === "red" ? "#ff3b30" : lunchWarning === "orange" ? "#d67d00" : "var(--c-dim)";

            // Build interleaved list: scenes + Motivwechsel dividers from schedule

            // Map scene IDs to their order in schedule

                sceneOrderInSchedule.push(s.scene);

            const orderedScenes = sceneOrderInSchedule.map(id => scenes.find(sc => sc.id === id)).filter(Boolean);

            const allScenes = [...orderedScenes, ...extraScenes];
            allScenes.forEach((sc, idx) => {
              // Check if there's a Motivwechsel divider before this scene in schedule

                const prevSceneId = allScenes[idx - 1]?.id;
                const prevIdx = schedule.findIndex(s => !s.isDivider && s.scene === prevSceneId);

      <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid var(--c-border)", borderBottom: "1px solid var(--c-border)" }}>

function Dispos({ project, onChange }) {
  const [activeDay, setActiveDay] = useState(0);
  const [printMode, setPrintMode] = useState(null); // null | 'one' | 'all'
  React.useEffect(() => {
    if (!printMode) return;
    const t = setTimeout(() => { window.print(); setPrintMode(null); }, 120);
    return () => clearTimeout(t);
  }, [printMode]);

  // Druckansicht: nur die A4-Seite(n) ausgeben — sieht im PDF aus wie die App-Ansicht
  if (printMode) {
    const days = printMode === 'all' ? project.shootDays.map((_, i) => i) : [activeDay];
    return (
      <div className="print-root">
        {days.map(i => (
          <div key={i} className="doc-a4 doc-page-break">
            <DispoDay project={project} dayIdx={i} onChange={() => {}} />
          </div>
        ))}
      </div>
    );
  }

  return (
    <div>
      <div className="dispo-top-bar no-print" style={{ marginBottom: 20 }}>
        <div style={{ ...S.row, flexWrap: "wrap", gap: 8 }}>
          <h1 style={{ ...S.h1, marginBottom: 0 }}>Tagesdispos</h1>
          <div style={{ flex: 1 }} />
          <select
            value={activeDay}
            onChange={e => setActiveDay(Number(e.target.value))}
            style={{ ...S.input, width: "auto", minWidth: 220, padding: "7px 12px", fontSize: 13, cursor: "pointer" }}>
            {project.shootDays.map((d, i) => (
              <option key={i} value={i}>
                Tag {i + 1}{d.date ? " - " + fmtDate(d.date) : ""}{d.locationTitle ? " - " + d.locationTitle : ""}
              </option>
            ))}
          </select>
          <button style={S.btn()} onClick={() => setPrintMode('one')}>Als PDF speichern</button>
          <button style={{ ...S.btn(), border: "1px solid #cfe6c8", color: "#1a8a4a" }} onClick={() => setPrintMode('all')}>Alle Dispos exportieren</button>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 12, color: C.mid }}>
            <input type="checkbox"
              checked={project.settings.showVordispo !== false}
              onChange={e => onChange({ ...project, settings: { ...project.settings, showVordispo: e.target.checked } })}
              style={{ accentColor: C.accent, width: 14, height: 14 }} />
            Vordispo anzeigen
          </label>
        </div>
      </div>
      {project.shootDays.length === 0
        ? <div style={{ color: C.dim }}>Bitte zuerst Drehtage anlegen.</div>
        : <div id="dispo-print-area" className="doc-a4">
            <DispoDay project={project} dayIdx={activeDay} onChange={onChange} />
          </div>}
    </div>
  );
}


// ─── AD-Sheet ──────────────────────────────────────────────────────────────
// Interaktives Drehtag-Sheet: Reihenfolge veränderbar, Pausen/extra Shots,
// Vergleich mit Plan, Verzögerungsanzeige. Keine Auswirkung auf die Shotlist.

function ADSheet({ project, onChange }) {
  const [dayIdx, setDayIdx] = React.useState(0);
  const shootDays = project.shootDays || [];
  const day = shootDays[dayIdx];

  // Storage: persisted in project.shootDays[dayIdx].adSheet via onChange
  const adSheet = day?.adSheet || {};
  const savedRows = adSheet.rows || null;
  const startTime = adSheet.startTime || day?.callTime || '07:00';

  const saveAdSheet = (patch) => {
    const days = [...shootDays];
    days[dayIdx] = { ...days[dayIdx], adSheet: { ...adSheet, ...patch } };
    onChange({ ...project, shootDays: days });
  };

  // Build planned rows from ALL shots in this day's group
  const plannedRows = React.useMemo(() => {
    if (!day) return [];
    const allShots = [...(project.shots||[])].sort((a,b)=>(a.shootOrder||0)-(b.shootOrder||0));
    // Find the day divider for this dayIdx
    const dayDividers = allShots.filter(s=>s.type==='divider'&&s.dividerType==='day');
    const thisDivider = dayDividers[dayIdx];
    const nextDivider = dayDividers[dayIdx+1];
    if (!thisDivider) return [];
    const startOrder = thisDivider.shootOrder||0;
    const endOrder = nextDivider?.shootOrder ?? Infinity;
    // All shots AND pause banners between this divider and the next
    const dayItems = allShots.filter(s =>
      (s.shootOrder||0) > startOrder &&
      (s.shootOrder||0) < endOrder &&
      (s.type==='shot' || (s.type==='divider' && s.dividerType!=='day'))
    );
    return dayItems.map(s => {
      if (s.type==='divider') {
        // Pause/location banner
        const label = s.dividerType==='lunch' ? 'Mittagspause'
          : s.dividerType==='location' ? 'Locationwechsel'
          : s.label || 'Pause';
        return {
          id: 'plan_'+s.id,
          shotId: s.id,
          type: 'pause',
          isPauseBanner: true,
          dividerType: s.dividerType,
          description: s.label || label,
          pauseMin: s.durationMin||45,
          done: false,
          cancelled: false,
          isPlan: true,
        };
      }
      const sc = (project.scenes||[]).find(sc=>sc.id===s.scene);
      return {
        id: 'plan_'+s.id,
        shotId: s.id,
        type: 'shot',
        hidden: !!s.hidden,
        scene: sc?.number||'',
        sceneTitle: sc?.title||'',
        shotNum: s.shotNum||'',
        shotLetter: s.shotLetter||'',
        description: s.description||'',
        setupMin: s.setupMin||0,
        shootMin: s.shootMin||0,
        notes: s.notes||'',
        isPlan: true,
        done: false,
        cancelled: false,
      };
    });
  }, [project.shots, project.scenes, shootDays, dayIdx]);

  // Get or initialize AD rows (merge saved + new shots from plan)
  const adRows = React.useMemo(() => {
    if (!savedRows || savedRows.length===0) {
      return plannedRows.map(r=>({...r, id:'ad_'+r.shotId, isPlan:false}));
    }
    const savedIds = new Set(savedRows.map(r=>r.id));
    const newItems = plannedRows
      .filter(r=>!savedIds.has('ad_'+r.shotId))
      .map(r=>({...r, id:'ad_'+r.shotId, isPlan:false}));
    return [...savedRows, ...newItems];
  }, [savedRows, plannedRows]);

  const setAdRows = (rows) => saveAdSheet({ rows });
  const setStartTime = (t) => saveAdSheet({ startTime: t });
  const resetToPlanned = () => {
    if(!window.confirm('AD-Sheet für diesen Tag zurücksetzen?')) return;
    saveAdSheet({ rows: null, startTime: day?.callTime||'07:00' });
  };

  const drag = useDrag(adRows, setAdRows);

  // Compute running schedule (exclude cancelled shots from time)
  const computeSchedule = (rows, start) => {
    let min = timeToMin(start);
    return rows.map(r => {
      const startM = min;
      const cancelled = !!r.cancelled;
      const dur = cancelled ? 0 : r.type==='pause'
        ? (r.pauseMin||30)
        : (r.setupMin||0)+(r.shootMin||0);
      min += dur;
      return {...r, _startM:startM, _endM:min, _dur:dur};
    });
  };

  const planned = computeSchedule(plannedRows, startTime);
  const scheduled = computeSchedule(adRows, startTime);

  // Delay: compare cumulative time — but only for non-pause, non-extra rows
  // Build a map: shotId → planned cumulative end
  // plannedDurByShot: planned duration per shot (for delay = duration change only)
  const plannedDurByShot = {};
  plannedRows.forEach(r => {
    if (r.type==='shot') plannedDurByShot[r.shotId] = (r.setupMin||0)+(r.shootMin||0);
    if (r.type==='pause' && r.isPauseBanner) plannedDurByShot[r.shotId] = r.pauseMin||45;
  });

  const totalDelay = (() => {
    const lastPlanned = planned[planned.length-1]?._endM;
    const lastActual = scheduled[scheduled.length-1]?._endM;
    if(lastPlanned==null||lastActual==null) return 0;
    return lastActual - lastPlanned;
  })();

  // First call: earliest of callTime AND all manually entered arbRow times
  const { firstWorkMin, firstCallDept, firstCallTime } = (() => {
    const arbRows = day?.dispoData?.arbRows || [];
    const callMin = timeToMin(day?.callTime || startTime);
    let earliest = callMin;
    let dept = 'Drehbeginn';
    let timeStr = day?.callTime || startTime;
    arbRows.forEach(r => {
      if (!r.time || !r.time.trim()) return;
      const m = timeToMin(r.time);
      if (m > 0 && m < earliest) {
        earliest = m; dept = r.label || 'Unbekannt'; timeStr = r.time;
      }
    });
    return { firstWorkMin: earliest, firstCallDept: dept, firstCallTime: timeStr };
  })();
  const lunchWarning = (() => {
    const lunch = scheduled.find(r=>r.isPauseBanner&&r.dividerType==='lunch');
    if (!lunch) return null;
    const diff = lunch._startM - firstWorkMin;
    if (diff > 6*60) return 'red';
    if (diff > 5.5*60) return 'yellow';
    return null;
  })();

  const updRow = (id, patch) => setAdRows(adRows.map(r=>r.id===id?{...r,...patch}:r));
  const remRow = (id) => { if(window.confirm('Eintrag entfernen?')) setAdRows(adRows.filter(r=>r.id!==id)); };

  const addPause = () => setAdRows([...adRows, {
    id:'pause_'+uid(), type:'pause', description:'Pause',
    pauseMin:30, done:false, cancelled:false, isPlan:false
  }]);
  const addExtraShot = () => setAdRows([...adRows, {
    id:'extra_'+uid(), type:'shot', scene:'', sceneTitle:'',
    shotNum:'X', shotLetter:'', description:'', setupMin:0, shootMin:0,
    notes:'', done:false, cancelled:false, isPlan:false, isExtra:true
  }]);

  const fmtMin = m => { const h=Math.floor(m/60)%24, mn=m%60; return pad(h)+':'+pad(mn); };

  const thS = {padding:'9px 8px', fontSize:10.5, fontWeight:600, color:C.dim,
    background:C.card, textAlign:'left', borderBottom:'1px solid '+C.border, whiteSpace:'nowrap'};
  const tdS = {padding:'5px 8px', verticalAlign:'middle', fontSize:11};
  const inp = {border:'none', background:'transparent', fontSize:12,
    fontFamily:'inherit', outline:'none', width:'100%', color:C.text};

  const [printing, doPrint] = usePrint();
  if (!shootDays.length) return <div style={{padding:32,color:C.dim}}>Bitte zuerst Drehtage anlegen.</div>;

  return (
    <div className={printing ? "print-root doc-a4 print-landscape" : undefined}>
      {printing && <h2 style={{ ...S.h1, fontSize:18, marginBottom:6 }}>AD-Sheet — Tag {dayIdx+1}{shootDays[dayIdx]?.date?" ("+fmtDate(shootDays[dayIdx].date)+")":""}</h2>}
      {/* Header */}
      <div className="no-print" style={{ ...S.row, marginBottom: 18, flexWrap:'wrap' }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>AD-Sheet</h1>
        <select value={dayIdx} onChange={e=>setDayIdx(Number(e.target.value))}
          style={{ ...S.input, width: 'auto', padding:'7px 12px' }}>
          {shootDays.map((d,i)=>(
            <option key={d.id} value={i}>Tag {i+1}{d.date?' – '+fmtDate(d.date):''}</option>
          ))}
        </select>
        <label style={{ fontSize:13, display:'flex', alignItems:'center', gap:8, color:C.mid }}>
          Drehbeginn
          <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)}
            style={{ ...S.input, width:'auto', padding:'7px 10px' }}/>
        </label>
        <div style={{ flex:1 }} />
        {totalDelay!==0 && (
          <div style={{ background: totalDelay>0?'#ff3b30':'#34c759', color:'#fff', borderRadius:980, padding:'5px 14px', fontSize:13, fontWeight:600 }}>
            {totalDelay>0?'+':''}{totalDelay} min
          </div>
        )}
        <button style={S.btn()} onClick={doPrint}>🖨 PDF</button>
        <button style={S.btn()} onClick={resetToPlanned}>↺ Reset</button>
      </div>

      <div style={{ fontSize:13, color:C.mid, marginBottom:16 }}>
        Erster Call <strong style={{ color:C.text, fontWeight:600 }}>{firstCallTime}</strong>{firstCallDept ? ' — '+firstCallDept : ''}
      </div>

      <div>
        <div className="no-print" style={{ display:'flex', gap:8, marginBottom:14, alignItems:'center', flexWrap:'wrap' }}>
          <button style={S.btn('xs')} onClick={addPause}><Icon name="plus" size={12}/> Pause</button>
          <button style={S.btn('xs')} onClick={addExtraShot}><Icon name="plus" size={12}/> Extra-Shot</button>
          <span style={{ fontSize:12, color:C.dim, marginLeft:6 }}>⠿ verschieben · ✓ gedreht · ✕ gestrichen</span>
        </div>

        <div style={{ ...S.card, padding:0, overflow:'hidden' }}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr>
                <th style={{...thS,width:28}}/>
                <th style={{...thS,width:52}}>Zeit</th>
                <th style={{...thS,width:48}}>Dauer</th>
                <th style={{...thS,width:38}}>Sz.</th>
                <th style={{...thS,width:55}}>Shot</th>
                <th style={thS}>Beschreibung</th>
                <th style={{...thS,width:48}}>Setup</th>
                <th style={{...thS,width:48}}>Dreh</th>
                <th style={{...thS,width:48}}>Soll</th>
                <th style={{...thS,width:48}}>±</th>
                <th style={{...thS,width:32}}>✓</th>
                <th style={{...thS,width:32}}>✕</th>
                <th style={{...thS,width:24}}/>
              </tr>
            </thead>
            <tbody>
              {scheduled.map((row,ri)=>{
                const isPause = row.type==='pause';
                const isDone = !!row.done;
                const isCancelled = !!row.cancelled;
                const isExtra = !!row.isExtra;
                // Delay: find matching planned shot for this shotId
                // Delay = only when this row's own duration changed vs plan
                const plannedDur = row.shotId ? plannedDurByShot[row.shotId] : null;
                const actualDur = row.type==='pause' ? (row.pauseMin||30) : (row.setupMin||0)+(row.shootMin||0);
                // No delay for user-added pauses/extra shots, or if cancelled
                const delay = (plannedDur!=null && !row.isExtra && !isCancelled)
                  ? actualDur - plannedDur
                  : null;
                const isPauseBanner = !!row.isPauseBanner;
                const isLunch = isPauseBanner && row.dividerType==='lunch';
                const isLocation = isPauseBanner && row.dividerType==='location';
                const lunchRowWarn = isLunch ? lunchWarning : null;
                const bg = isCancelled?'var(--t-warn)'
                  : isDone?'var(--t-green)'
                  : isLunch&&lunchRowWarn==='red'?'var(--t-warn)'
                  : isLunch&&lunchRowWarn==='yellow'?'var(--t-amber)'
                  : isLunch?'var(--t-amber)'          // lunch = orange-tinted
                  : isLocation?'var(--t-blue)'        // locationwechsel = light blue
                  : isPauseBanner?'var(--t-warn)'     // other plan pause
                  : isPause?'var(--t-amber)'           // user pause = yellow
                  : isExtra?'var(--t-blue)'           // extra shot = blue-tinted
                  : 'var(--c-card)';
                const textStyle = {
                  textDecoration: isCancelled?'line-through':isDone?'line-through':'none',
                  color: isCancelled?'#e88':isDone?'var(--c-dim)':'var(--c-text)',
                  opacity: isCancelled?0.6:1,
                };
                return (
                  <tr key={row.id} {...drag.row(row.id)}
                    style={{borderBottom:'1px solid var(--c-border)',
                      background:drag.over===row.id?'var(--t-green)':bg,
                      transition:'background 0.1s'}}>
                    {/* Handle */}
                    <td style={{...tdS,textAlign:'center',color:'var(--c-mid)'}}>
                      <span {...drag.handle(row.id)}
                        style={{cursor:'grab',fontSize:14,userSelect:'none'}}>⠿</span>
                    </td>
                    {/* Zeit */}
                    <td style={{...tdS,fontWeight:600,color:isCancelled?'var(--c-mid)':'var(--c-dim)',whiteSpace:'nowrap'}}>
                      {isCancelled?<s>{fmtMin(row._startM)}</s>:fmtMin(row._startM)}
                    </td>
                    {/* Dauer */}
                    <td style={{...tdS,color:'var(--c-dim)'}}>
                      {isCancelled?<s>{(row.setupMin||0)+(row.shootMin||0)} min</s>:
                        isPause?(row.pauseMin||30)+' min':
                        row._dur+' min'}
                    </td>
                    {/* Szene */}
                    <td style={{...tdS,...textStyle}}>
                      {isPause?'—':
                        <input style={{...inp,...textStyle,width:36}} value={row.scene||''} placeholder="–"
                          onChange={e=>updRow(row.id,{scene:e.target.value})}/>}
                    </td>
                    {/* Shot */}
                    <td style={{...tdS,...textStyle}}>
                      {!isPause&&(
                        <span style={{display:'flex',gap:2}}>
                          <input style={{...inp,...textStyle,width:28,fontWeight:isExtra?700:400,
                            color:isExtra?'#2e4ca8':textStyle.color}}
                            value={row.shotNum||''} placeholder="–"
                            onChange={e=>updRow(row.id,{shotNum:e.target.value})}/>
                          <input style={{...inp,...textStyle,width:18}}
                            value={row.shotLetter||''}
                            onChange={e=>updRow(row.id,{shotLetter:e.target.value})}/>
                        </span>
                      )}
                    </td>
                    {/* Beschreibung */}
                    <td style={tdS}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <input style={{...inp,...textStyle,
                        fontStyle:isPause?'italic':'normal',
                        color:isLunch?'#d66b00':isLocation?'#0081d6':isPause?'#d6ab00':textStyle.color}}
                        value={row.description||''} placeholder={isPause?'Pause...':'Beschreibung...'}
                        onChange={e=>updRow(row.id,{description:e.target.value})}/>
                      {isLunch&&lunchRowWarn&&(
                        <span style={{
                          background:lunchRowWarn==='red'?'#ff3b30':'#3aaa35',
                          color:'#fff',borderRadius:4,padding:'1px 6px',
                          fontSize:9,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>
                          {lunchRowWarn==='red'?'⚠ Zu spät!':'⚠ Bald 6h'}
                        </span>
                      )}
                    </div>
                    </td>
                    {/* Setup */}
                    <td style={tdS}>
                      {isPause?(
                        <input style={{...inp,width:38}} type="number"
                          value={row.pauseMin||30}
                          onChange={e=>updRow(row.id,{pauseMin:Number(e.target.value)})}/>
                      ):(
                        <input style={{...inp,width:38}} type="number" value={row.setupMin||0}
                          onChange={e=>updRow(row.id,{setupMin:Number(e.target.value)})}/>
                      )}
                    </td>
                    {/* Dreh */}
                    <td style={tdS}>
                      {!isPause&&(
                        <input style={{...inp,width:38}} type="number" value={row.shootMin||0}
                          onChange={e=>updRow(row.id,{shootMin:Number(e.target.value)})}/>
                      )}
                    </td>
                    {/* Plan-Ende */}
                    <td style={{...tdS,color:'var(--c-mid)',fontSize:10,whiteSpace:'nowrap'}}>
                      {plannedDur!=null ? plannedDur+' min' : '—'}
                    </td>
                    {/* Delay */}
                    <td style={{...tdS,fontWeight:600,whiteSpace:'nowrap',
                      color:delay==null?'var(--c-mid)':delay>0?'#ff3b30':delay<0?'#34c759':'var(--c-dim)'}}>
                      {delay==null?'—':(delay>0?'+':'')+delay}
                    </td>
                    {/* Done */}
                    <td style={{...tdS,textAlign:'center'}}>
                      <input type="checkbox" checked={!!isDone} disabled={isCancelled}
                        onChange={()=>updRow(row.id,{done:!isDone,cancelled:false})}
                        style={{width:15,height:15,cursor:'pointer',accentColor:'#34c759'}}/>
                    </td>
                    {/* Cancelled */}
                    <td style={{...tdS,textAlign:'center'}}>
                      <input type="checkbox" checked={!!isCancelled} disabled={isDone}
                        onChange={()=>updRow(row.id,{cancelled:!isCancelled,done:false})}
                        style={{width:15,height:15,cursor:'pointer',accentColor:'#ff3b30'}}/>
                    </td>
                    {/* Delete (only extra/pause) */}
                    <td style={{...tdS,textAlign:'center'}}>
                      {(isExtra||isPause)&&(
                        <span onClick={()=>remRow(row.id)}
                          style={{color:'var(--c-mid)',cursor:'pointer',fontSize:14}}>×</span>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {scheduled.length===0&&(
            <div style={{padding:32,textAlign:'center',color:'var(--c-mid)'}}>
              Keine Shots für diesen Drehtag in der Shotlist vorhanden.
            </div>
          )}
        </div>

        {scheduled.length>0&&(
          <div style={{marginTop:12,display:'flex',gap:20,fontSize:11,color:'var(--c-dim)',flexWrap:'wrap'}}>
            <span>Geplantes Ende: <strong>{fmtMin(planned[planned.length-1]?._endM||0)}</strong></span>
            <span>Aktuelles Ende: <strong>{fmtMin(scheduled[scheduled.length-1]._endM)}</strong></span>
            <span>Erledigt: <strong style={{color:'#34c759'}}>{scheduled.filter(r=>r.done).length}</strong></span>
            <span>Gestrichen: <strong style={{color:'#ff3b30'}}>{scheduled.filter(r=>r.cancelled).length}</strong></span>
            <span>Offen: <strong>{scheduled.filter(r=>!r.done&&!r.cancelled).length}</strong></span>
          </div>
        )}
      </div>
    </div>
  );
}


// ─── Continuity / Script Supervisor Sheet ────────────────────────────────────
// Takes pro Shot: Bewertung (schlecht/gut/am besten), Continuity-Notizen,
// Fehlclips Kamera/Ton, Nurtöne, stumme Aufnahmen

function TakeStopwatch({ value, onChange }) {
  const [running, setRunning] = React.useState(false);
  const [elapsed, setElapsed] = React.useState(0); // accumulated ms while paused
  const startRef = React.useRef(null);
  const [, force] = React.useState(0);
  React.useEffect(() => {
    if (!running) return;
    const id = setInterval(() => force(x => x + 1), 200);
    return () => clearInterval(id);
  }, [running]);
  const liveMs = elapsed + (running && startRef.current != null ? (Date.now() - startRef.current) : 0);
  const fmt = ms => { const t = Math.floor(ms / 1000); return pad(Math.floor(t / 60)) + ':' + pad(t % 60); };
  const toggle = () => {
    if (running) {
      const ms = elapsed + (Date.now() - startRef.current);
      setElapsed(ms); setRunning(false); onChange(fmt(ms));
    } else { startRef.current = Date.now(); setRunning(true); }
  };
  const reset = () => { setRunning(false); setElapsed(0); startRef.current = null; };
  const saveTime = () => {
    const ms = elapsed + (running && startRef.current != null ? (Date.now() - startRef.current) : 0);
    onChange(fmt(ms)); setRunning(false); setElapsed(0); startRef.current = null;
  };
  const swBtn = (bg, col) => ({ border: '1px solid ' + C.border, background: bg || C.card, color: col || C.mid,
    borderRadius: 6, width: 26, height: 24, cursor: 'pointer', fontSize: 12, lineHeight: 1, display: 'flex',
    alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit', padding: 0 });
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5, alignItems: 'flex-start' }}>
      <input
        value={running ? fmt(liveMs) : (value || '')}
        readOnly={running}
        placeholder="00:00"
        title="Dauer (mm:ss) — manuell überschreibbar"
        onChange={e => onChange(e.target.value)}
        style={{ border: '1px solid ' + C.border, borderRadius: 6, fontSize: 13, fontFamily: 'inherit',
          padding: '4px 6px', width: 64, textAlign: 'center', color: running ? C.accent : C.text,
          fontWeight: running ? 700 : 500, fontVariantNumeric: 'tabular-nums', background: running ? 'var(--t-green)' : C.card, outline: 'none' }} />
      <div style={{ display: 'flex', gap: 3 }}>
        <button onClick={toggle} title={running ? 'Pause' : 'Start / Fortsetzen'}
          style={swBtn(running ? 'var(--t-amber)' : 'var(--t-green)', running ? '#c38813' : C.accent)}>{running ? '⏸' : '▶'}</button>
        <button onClick={reset} title="Zurücksetzen" style={swBtn()}>↺</button>
        <button onClick={saveTime} title="Zeit in den Take übernehmen" style={swBtn('var(--t-green)', '#1a8a4a')}>✓</button>
      </div>
    </div>
  );
}

function ContinuityShotCard({ shot, project, onChange, onUpdExtra, onDelExtra, printing }) {
  const [lightbox, setLightbox] = React.useState(null); // photo src to show full-screen
  const updShot = (patch) => {
    if (onUpdExtra) { onUpdExtra(patch); return; }
    onChange({...project, shots:project.shots.map(s=>s.id===shot.id?{...s,...patch}:s)});
  };
  const [collapsed, setCollapsed] = React.useState(false);
  const sc = project.scenes.find(sc=>sc.id===shot.scene);
  // For extra shots (onUpdExtra set), read takes from shot prop directly
  const getTakes = () => {
    if (onUpdExtra) return shot.takes || [];
    return project.shots.find(s=>s.id===shot.id)?.takes || [];
  };
  const saveTakes = takes => {
    if (onUpdExtra) { onUpdExtra({takes}); return; }
    onChange({...project, shots:project.shots.map(s=>s.id===shot.id?{...s,takes}:s)});
  };

  const CLIP_TYPES = [
    { key: 'camFail',   label: 'Fehlclip Kamera', color: '#ff3b30', bg: 'var(--t-warn)', hasNum: false },
    { key: 'soundFail', label: 'Fehlclip Ton',     color: '#c96', bg: 'var(--t-warn)', hasNum: false },
    { key: 'soundOnly', label: 'Nurton',            color: '#3636a1', bg: 'var(--t-blue)', hasNum: true  },
    { key: 'mute',      label: 'Stumm',             color: 'var(--c-dim)', bg: 'var(--c-hover)', hasNum: true  },
  ];

  // Compute take numbers: normal takes + soundOnly + mute get numbers; camFail/soundFail don't
  const computeTakeNums = takes => {
    let n = 0;
    return takes.map(t => {
      const ct = CLIP_TYPES.find(c=>c.key===t.clipType);
      const getsNum = !t.clipType || (ct && ct.hasNum);
      return {...t, _num: getsNum ? ++n : null};
    });
  };

  const RATINGS = [
    { key: 'best',    label: 'Bester Take', color: '#34c759' },
    { key: 'good',    label: 'Gut',         color: '#3aaa35' },
    { key: 'bad',     label: 'Schlecht',    color: '#ff3b30' },
    { key: 'neutral', label: '—',           color: 'var(--c-mid)' },
  ];
  const ratingOf = r => RATINGS.find(x=>x.key===r)||RATINGS[3];

  const rowBg = take => {
    if (take.clipType) return CLIP_TYPES.find(ct=>ct.key===take.clipType)?.bg||'var(--c-card)';
    return take.rating==='best'?'var(--t-green)':take.rating==='good'?'var(--t-blue)':take.rating==='bad'?'var(--t-warn)':'var(--c-card)';
  };

  const addTake = (clipType=null) => {
    const takes = getTakes();
    saveTakes([...takes, {
      id:uid(), clipType, rating:'neutral',
      note:'', continuity:'', photos:[],
    }]);
  };
  const updTake = (takeId, patch) =>
    saveTakes(getTakes().map(t=>t.id===takeId?{...t,...patch}:t));
  const remTake = takeId =>
    saveTakes(getTakes().filter(t=>t.id!==takeId));

  const addPhotos = (takeId, files) => {
    const take = getTakes().find(t=>t.id===takeId);
    const existing = take?.photos||[];
    let pending = files.length;
    const newPhotos = [...existing];
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        newPhotos.push({ id:uid(), src:e.target.result, name:file.name });
        pending--;
        if (pending===0) updTake(takeId, {photos:newPhotos});
